function renderSuiviTables() {
  const today = new Date();
  const in60 = new Date(today.getTime() + 60*24*60*60*1000);
  const cols = '1fr 140px 110px 100px 110px 100px';

  function nomClient(ct) {
    const c = allClients.find(cl => cl.id === ct.client_id);
    return c ? (c.segment === 'Entreprise' ? c.nom : `${c.prenom} ${c.nom}`) : '—';
  }

  const produitFilter = document.getElementById('su-produit')?.value || '';
  const hideLamal = document.getElementById('su-hide-lamal')?.checked;

  const base = allContrats.filter(ct => {
    if (hideLamal && (ct.produit||'').toLowerCase().includes('lamal')) return false;
    if (produitFilter && ct.produit !== produitFilter) return false;
    return true;
  });

  const aRenouveler = base.filter(ct => ct.statut === 'renouveler');
  const echeanceProche = base.filter(ct => {
    if (ct.statut !== 'actif' || !ct.date_echeance) return false;
    const d = new Date(ct.date_echeance);
    return d >= today && d <= in60;
  });
  const actifs = base.filter(ct => ct.statut === 'actif');
  const totalPrimes = actifs.reduce((s, ct) => s + Number(ct.prime_annuelle || 0), 0);

  document.getElementById('su-stats').innerHTML = `
    ${statCard('Contrats actifs', actifs.length, '#4ade80')}
    ${statCard('Primes annuelles', 'CHF ' + totalPrimes.toLocaleString(), '#f59e0b')}
    ${statCard('À renouveler', aRenouveler.length, '#f87171')}
    ${statCard('Échéance < 60j', echeanceProche.length, '#fbbf24')}`;

  function table(list, emptyMsg) {
    if (!list.length) return `<div class="table-empty">${emptyMsg}</div>`;
    return `<div class="table-wrap"><div class="table-header" style="grid-template-columns:${cols}"><div>Produit</div><div>Client</div><div>Compagnie</div><div>Échéance</div><div>Prime/an</div><div>Statut</div></div>
      ${list.map(ct => `<div class="table-row" style="grid-template-columns:${cols};cursor:pointer" onclick="showClient('${ct.client_id}')">
        <div><div style="font-weight:700;font-size:13px;color:var(--text)">${ct.produit}</div><div style="font-size:11px;color:var(--text-muted)">${ct.numero_police || ''}</div></div>
        <div style="font-size:13px;color:var(--text)">${nomClient(ct)}</div>
        <div style="font-size:13px;color:var(--text)">${ct.compagnie}</div>
        <div style="font-size:12px;color:var(--text-muted)">${ct.date_echeance || ''}</div>
        <div style="font-weight:800;color:#f59e0b">CHF ${Number(ct.prime_annuelle||0).toLocaleString()}</div>
        <div>${badge(ct.statut === 'non_gere' ? 'Non géré' : ct.statut, ct.statut === 'actif' ? '#4ade80' : ct.statut === 'renouveler' ? '#f59e0b' : ct.statut === 'non_gere' ? '#64748b' : '#f87171')}</div>
      </div>`).join('')}</div>`;
  }

  document.getElementById('su-tables').innerHTML = `
    <div style="font-size:11px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">⚠ À renouveler (${aRenouveler.length})</div>
    ${table(aRenouveler, 'Aucun contrat à renouveler.')}
    <div style="font-size:11px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:1px;margin:24px 0 10px">⏳ Échéance dans moins de 60 jours (${echeanceProche.length})</div>
    ${table(echeanceProche, 'Aucune échéance proche.')}`;
}

          <td style="padding:9px 14px;font-size:12px;color:var(--text-muted)">${r.date_echeance || '—'}</td>

          <td style="padding:9px 14px;text-align:right"><button onclick="event.stopPropagation(); rouvrirRappel('${r.id}')" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">↺ Rouvrir</button></td>

async function traiterRappel(id) {
  const r = allRappels.find(x => x.id === id);
  if (r && r.outlook_event_id) {
    try { await deleteOutlookEvent(r.outlook_event_id); } catch(e) {}
    await dbPatch('rappels', id, { statut: 'traité', outlook_event_id: null });
    r.outlook_event_id = null;
  } else {
    await dbPatch('rappels', id, { statut: 'traité' });
  }
  if (r) r.statut = 'traité';
  navigate('rappels');
}

async function rouvrirRappel(id) {
  const r = allRappels.find(x => x.id === id);
  await dbPatch('rappels', id, { statut: 'ouvert' });
  if (r) r.statut = 'ouvert';
  if (r && r.date_echeance) {
    try {
      const eventId = await createOutlookEventFromRappel(r);
      if (eventId) {
        await dbPatch('rappels', id, { outlook_event_id: eventId });
        r.outlook_event_id = eventId;
      }
    } catch(e) {}
  }
  navigate('rappels');
}

  const cards = BORDS.map(b => {
    const commissions = allCommissionsAttente.filter(c => c.bordereau_id === b.id);
    const enAttentePourCompagnie = allCommissionsAttente.filter(c => c.compagnie === b.compagnie && c.statut === 'en_attente');
    const tauxCaution = b.taux_caution || 0;
    const montantCaution = Math.round((b.montant_brut||0) * (tauxCaution/100));
    const montantNetApresCaution = (b.montant_brut||0) - montantCaution;

    function splitAgent(c) {
      const montant = c.montant_final != null ? c.montant_final : (c.montant_estime || 0);

      </div>

        ${tauxCaution > 0 ? `<div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1;background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.3);border-radius:8px;padding:10px 14px">

            <div style="font-size:16px;font-weight:900;color:#a78bfa">CHF ${montantCaution.toLocaleString()}</div>
          </div>
          <div style="flex:1;background:var(--surface-alt);border-radius:8px;padding:10px 14px">
            <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">Net après caution</div>
            <div style="font-size:16px;font-weight:900;color:var(--text)">CHF ${montantNetApresCaution.toLocaleString()}</div>
          </div>
        </div>` : ''}
        <div style="display:flex;gap:10px;margin-bottom:14px">
          <div style="flex:1;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:8px;padding:10px 14px">
            <div style="font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:4px">Part Jonathan</div>
            <div style="font-size:16px;font-weight:900;color:#38bdf8">CHF ${pJ.toLocaleString()}</div>

        </div>

          const s = splitAgent(c);
          return `<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:${i < commissions.length-1 ? '1px solid var(--border)' : 'none'}">

              <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer"><input type="radio" name="val-etat" value="aucun"/> Ne pas changer l'état du contrat</label>
            </div>
          </div>

          <div class="form-field" style="grid-column:span 2">
            <label class="form-label">Montant estimé (CHF) — modifiable librement</label>
            <input class="form-input" id="val-montant-base" type="number" step="0.01" value="0.00" oninput="updateValidationPreview()"/>
          </div>

          <div class="form-field"><label class="form-label">Sens</label><select class="form-select" id="val-sens" onchange="updateValidationPreview()">
            <option value="credit">Crédit [+]</option>
            <option value="debit">Débit [-] (décommission)</option>
          </select></div>
          <div class="form-field"><label class="form-label">Déduction (%)</label><input class="form-input" id="val-deduction" type="number" step="0.1" min="0" max="100" value="0" oninput="updateValidationPreview()"/></div>

          <div class="form-field" style="grid-column:span 2">
            <label class="form-label">Montant final de la commission (CHF)</label>
            <input class="form-input" id="val-montant" type="number" step="0.01" style="font-size:22px;font-weight:800;text-align:center" value="0.00" readonly/>
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:20px">
          <button class="btn-secondary" onclick="document.getElementById('modal-validation').remove()">✕ Annuler</button>
          <button class="btn-save" onclick="saveValidationCommission('${bordereauId}')">✓ Valider</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function prefillMontantEstime() {
  const sel = document.getElementById('val-commission');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('val-montant-base').value = opt ? Number(opt.dataset.montant || 0).toFixed(2) : '0.00';
  updateValidationPreview();
}

function updateValidationPreview() {
  const montantBase = Number(document.getElementById('val-montant-base').value) || 0;
  const deduction = Number(document.getElementById('val-deduction').value) || 0;
  const sens = document.getElementById('val-sens').value;
  let montant = montantBase * (1 - deduction/100);
  if (sens === 'debit') montant = -Math.abs(montant);
  document.getElementById('val-montant').value = montant.toFixed(2);
}

async function saveValidationCommission(bordereauId) {
  const commId = document.getElementById('val-commission').value;
  if (!commId) { showError('Sélectionne une commission en attente.'); return; }
  const etat = document.querySelector('input[name="val-etat"]:checked').value;
  const montantEstime = Number(document.getElementById('val-montant-base').value) || 0;
  const montantFinal = Number(document.getElementById('val-montant').value) || 0;
  const deduction = Number(document.getElementById('val-deduction').value) || 0;
  const sens = document.getElementById('val-sens').value;
  const numeroPolice = document.getElementById('val-police').value.trim() || null;
  const mouvement = document.getElementById('val-mouvement').value;

  const btn = document.querySelector('#modal-validation .btn-save');
  if (btn) { btn.textContent = 'Validation...'; btn.disabled = true; }

  await dbPatch('commissions_attente', commId, {
    statut: 'reçue',
    bordereau_id: bordereauId,
    numero_police: numeroPolice,
    montant_estime: montantEstime,
    montant_final: montantFinal,
    sens, deduction_pct: deduction, mouvement,
  });

  const comm = allCommissionsAttente.find(c => c.id === commId);
  if (comm && comm.contrat_id && etat !== 'aucun') {
    const nouveauStatut = etat === 'vigueur' ? 'actif' : 'résilié';
    await dbPatch('contrats', comm.contrat_id, { statut: nouveauStatut, numero_police: numeroPolice || undefined });
    allContrats = await dbGet('contrats', 'select=*');
  }

  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  document.getElementById('modal-validation').remove();
  navigate('bordereaux');
}

// COMMISSIONS
function splitMontantAgent(montant, contratId) {
  const contrat = contratId ? allContrats.find(ct => ct.id === contratId) : null;
  const agent = contrat ? allAgents.find(a => a.id === contrat.apporteur_id) : null;
  const tauxAgent = (agent && agent.role !== 'signataire') ? (agent.taux || 0) : 0;
  const pA = Math.round(montant * tauxAgent / 100);
  const pJ = montant - pA;
  return { pJ, pA, agent };
}

function viewCommissions() {
  const COMMS = allCommissionsAttente.filter(c => c.statut === 'reçue');
  function montantC(c) { return c.montant_final != null ? c.montant_final : (c.montant_estime || 0); }

  let totalBrut = 0, partJ = 0, partA = 0;
  COMMS.forEach(c => { const m = montantC(c); const s = splitMontantAgent(m, c.contrat_id); totalBrut += m; partJ += s.pJ; partA += s.pA; });

  // ── Commissions de gestion (récurrentes) ──
  const gestion = COMMS.filter(c => (c.mouvement || '').toLowerCase().includes('gestion'));
  const parMoisGestion = {};
  const parCompagnieGestion = {};
  let totalGestion = 0;
  gestion.forEach(c => {
    const m = montantC(c);
    totalGestion += m;
    const b = c.bordereau_id ? allBordereaux.find(bd => bd.id === c.bordereau_id) : null;
    const moisKey = b ? b.mois : (c.date_creation || '').slice(0,7);
    parMoisGestion[moisKey] = (parMoisGestion[moisKey] || 0) + m;
    parCompagnieGestion[c.compagnie] = (parCompagnieGestion[c.compagnie] || 0) + m;
  });
  const moisGestionKeys = Object.keys(parMoisGestion).sort();
  const maxMoisGestion = Math.max(...moisGestionKeys.map(k => parMoisGestion[k]), 1);
  const compGestion = Object.entries(parCompagnieGestion).sort((a,b)=>b[1]-a[1]);

  const cols = '1fr 130px 90px 100px 110px';
  const rows = COMMS.map(c => {
    const m = montantC(c);
    const s = splitMontantAgent(m, c.contrat_id);
    return `<div class="table-row" style="grid-template-columns:${cols}">
      <div style="font-size:13px;font-weight:600;color:var(--text)">${c.client_nom || '—'}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.produit || ''}${c.mouvement ? ' · ' + c.mouvement : ''}</div>
      <div style="font-weight:800;color:var(--text)">CHF ${m.toLocaleString()}</div>
      <div style="font-weight:800;color:#38bdf8">CHF ${s.pJ.toLocaleString()}</div>
      <div>${s.pA > 0 ? `<div style="display:flex;align-items:center;gap:6px">${s.agent ? avatar(s.agent, 18) : ''}<span style="font-weight:700;color:#f59e0b">CHF ${s.pA.toLocaleString()}</span></div>` : '<span style="color:var(--text-dim)">—</span>'}</div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Commissions</h2>
      <button class="btn-add" onclick="navigate('fiche-commission')">📄 Générer une fiche de commission</button>
    </div>
    <div class="stat-grid" style="margin-bottom:24px">
      ${statCard('Brut total', 'CHF ' + totalBrut.toLocaleString(), '#e2e8f0')}
      ${statCard('Part Jonathan', 'CHF ' + partJ.toLocaleString(), '#38bdf8')}
      ${statCard('Part apporteurs', 'CHF ' + partA.toLocaleString(), '#f59e0b')}
    </div>

    <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px">🔁 Commissions de gestion (récurrentes)</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Suivi de ce qui a été reçu — total : <strong style="color:#4ade80">CHF ${totalGestion.toLocaleString()}</strong> sur ${gestion.length} mouvement(s)</div>
    <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:24px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px">Évolution par période</div>
        ${moisGestionKeys.length ? `<div style="display:flex;align-items:flex-end;gap:6px;height:110px">
          ${moisGestionKeys.map(k => {
            const h = Math.max(Math.round(parMoisGestion[k]/maxMoisGestion*100), 3);
            return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0">
              <div title="CHF ${Math.round(parMoisGestion[k]).toLocaleString()}" style="width:100%;max-width:28px;height:${h}px;background:linear-gradient(180deg,#4ade80,#16a34a);border-radius:4px 4px 2px 2px"></div>
              <div style="font-size:8.5px;color:var(--text-muted);margin-top:5px;white-space:nowrap;overflow:hidden;max-width:40px">${k}</div>
            </div>`;
          }).join('')}
        </div>` : '<div class="table-empty">Aucune commission de gestion encore rapprochée.</div>'}
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px">Par compagnie</div>
        ${compGestion.map(([comp,val]) => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:11.5px"><span style="color:var(--text)">${comp}</span><span style="color:#4ade80;font-weight:700">CHF ${Math.round(val).toLocaleString()}</span></div>
            <div style="height:6px;border-radius:3px;background:var(--border);margin-top:4px;overflow:hidden"><div style="height:100%;width:${compGestion.length?Math.round(val/compGestion[0][1]*100):0}%;background:#4ade80;border-radius:3px"></div></div>
          </div>`).join('') || '<div class="table-empty">—</div>'}
      </div>
    </div>

    <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px">Toutes les commissions reçues (${COMMS.length})</div>
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}"><div>Client</div><div>Produit / Mouvement</div><div>Brut</div><div>Jonathan</div><div>Apporteur</div></div>
      ${rows || '<div class="table-empty">Aucune commission reçue encore rapprochée.</div>'}
    </div>`;
}

function genererFicheCommission() {
  const agentId = document.getElementById('fs-agent').value;
  const mois = document.getElementById('fs-mois').value;
  const zone = document.getElementById('fiche-commission-resultat');
  if (!agentId || !mois) { zone.innerHTML = '<div class="table-empty">Sélectionne un agent et une période.</div>'; return; }

  const agent = allAgents.find(a => a.id === agentId);
  const bordereauxMois = allBordereaux.filter(b => b.mois === mois).map(b => b.id);
  const lignes = allCommissionsAttente.filter(c =>
    c.statut === 'reçue' && bordereauxMois.includes(c.bordereau_id) &&
    c.contrat_id && allContrats.find(ct => ct.id === c.contrat_id && ct.apporteur_id === agentId)
  );

  function montantC(c) { return c.montant_final != null ? c.montant_final : (c.montant_estime || 0); }
  const isSignataire = agent.role === 'signataire';
  let totalBrut = 0, totalPart = 0;
  const detail = lignes.map(c => {
    const m = montantC(c);
    const s = splitMontantAgent(m, c.contrat_id);
    const tauxAgent = isSignataire ? 100 : (agent.taux || 0);
    const part = isSignataire ? s.pJ : s.pA;
    totalBrut += m; totalPart += part;
    return { ...c, montant: m, part, tauxAgent };
  });

  const dateGen = new Date().toLocaleDateString('fr-CH', { day:'2-digit', month:'long', year:'numeric' });

  zone.innerHTML = `
    <div class="fiche-commission-print" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
        <div>
          <div style="font-size:16px;font-weight:900;color:var(--text)">FICHE DE COMMISSION</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Assurex Sàrl · Rue du Centre 142, 1025 St-Sulpice VD</div>
        </div>
        <button onclick="window.print()" style="background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer">🖨️ Imprimer / PDF</button>
      </div>
      <div style="display:flex;gap:30px;margin-bottom:20px;font-size:13px">
        <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase">Bénéficiaire</div><div style="font-weight:700;color:var(--text)">${agent.prenom} ${agent.nom} (${agent.role})</div></div>
        <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase">Période</div><div style="font-weight:700;color:var(--text)">${mois}</div></div>
        <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase">Généré le</div><div style="font-weight:700;color:var(--text)">${dateGen}</div></div>
      </div>

      <table style="width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:20px">
        <thead><tr style="color:var(--text-muted);font-size:10.5px;text-transform:uppercase">
          <th style="padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)">Client</th>
          <th style="padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)">Produit</th>
          <th style="padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)">Commission brute</th>
          <th style="padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)">Taux</th>
          <th style="padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)">Part due</th>
        </tr></thead>
        <tbody>${detail.map(d => `
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:7px 10px;color:var(--text)">${d.client_nom || '—'}</td>
            <td style="padding:7px 10px;color:var(--text-muted)">${d.produit || ''}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--text)">CHF ${d.montant.toLocaleString()}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--text-muted)">${d.tauxAgent}%</td>
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:#f59e0b">CHF ${d.part.toLocaleString()}</td>
          </tr>`).join('') || `<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--text-muted)">Aucune commission rapprochée pour cet agent sur cette période.</td></tr>`}
        </tbody>
      </table>

      <div style="display:flex;justify-content:flex-end;gap:30px;border-top:1px solid var(--border);padding-top:14px">
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Total brut</div><div style="font-size:16px;font-weight:800;color:var(--text)">CHF ${totalBrut.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Total dû à ${agent.prenom}</div><div style="font-size:20px;font-weight:900;color:#f59e0b">CHF ${totalPart.toLocaleString()}</div></div>
      </div>
    </div>`;
}

async function saveClient() {
  const prenom = document.getElementById('f-prenom').value.trim();
  const nom = document.getElementById('f-nom').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const adresse = document.getElementById('f-adresse').value.trim();
  const npa = document.getElementById('f-npa').value.trim();
  const missing = [];
  if (!prenom) missing.push('Prénom');
  if (!nom) missing.push('Nom');
  if (!email) missing.push('Email');
  if (!adresse) missing.push('Adresse');
  if (!npa) missing.push('NPA');
  if (missing.length > 0) { alert('Champs obligatoires manquants : ' + missing.join(', ')); return; }
  const body = {
    prenom, nom,
    date_naissance: document.getElementById('f-dob').value || null,
    nationalite: document.getElementById('f-nationalite').value || null,
    etat_civil: document.getElementById('f-etat').value || null,
    enfants: parseInt(document.getElementById('f-enfants').value) || 0,
    avs: document.getElementById('f-avs').value || null,
    langue: document.getElementById('f-langue').value,
    email: document.getElementById('f-email').value || null,
    mobile: document.getElementById('f-mobile').value || null,
    tel: document.getElementById('f-tel').value || null,
    adresse: document.getElementById('f-adresse').value || null,
    npa: document.getElementById('f-npa').value || null,
    ville: document.getElementById('f-ville').value || null,
    canton: document.getElementById('f-canton').value || null,
    banque: document.getElementById('f-banque').value || null,
    iban: document.getElementById('f-iban').value || null,
    profession: document.getElementById('f-profession').value || null,
    employeur: document.getElementById('f-employeur').value || null,
    revenu: parseInt(document.getElementById('f-revenu').value) || 0,
    taux_activite: parseInt(document.getElementById('f-taux').value) || 100,
    statut: document.getElementById('f-statut').value,
    segment: 'Privé',
    apporteur_id: document.getElementById('f-agent').value || null,
    apporteur_externe: document.getElementById('f-apporteur-ext').value.trim() || null,
    notes: document.getElementById('f-notes').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const result = await dbPost('clients', body);
  if (result && !result.error) {
    allClients = await dbGet('clients', 'select=*');
    currentView = 'clients';
    renderSidebar();
    document.getElementById('main-content').innerHTML = viewClients();
  } else {
    btn.textContent = 'Erreur — réessayer';
    btn.disabled = false;
    const detail = result && result.detail ? JSON.stringify(result.detail) : 'connexion';
    alert('Erreur lors de l\'enregistrement (' + detail + '). Vérifiez les champs et réessayez.');
  }
}

function ajouterPlaqueDemandeOffre() {

  row.style.cssText = 'display:flex;gap:10px';

function genererEmailDemandeOffre() {
  const checked = [...document.querySelectorAll('.do-cie-checkbox:checked')];
  if (!checked.length) { showError('Sélectionne au moins une compagnie.'); return; }
  const cies = checked.map(el => (window._doContacts || []).find(c => c.id === el.value)).filter(Boolean);
  const emails = cies.map(c => c.email).filter(Boolean);
  const sansEmail = cies.filter(c => !c.email).map(c => c.compagnie);

  const val = id => document.getElementById(id)?.value || '';
  const chk = id => document.getElementById(id)?.checked;
  const nomClient = val('do-client') ? (document.getElementById('do-client').selectedOptions[0]?.text || '') : (val('do-prospect-nom') || 'Client');

  let besoins = [];
  if (chk('do-perte-gain')) besoins.push('Perte de gain maladie' + (chk('do-pg-14j')?' (délai 14j)':chk('do-pg-30j')?' (délai 30j)':chk('do-pg-60j')?' (délai 60j)':''));
  if (chk('do-laa')) besoins.push('LAA');
  if (chk('do-laaf')) besoins.push('LAAF (indépendant)');
  if (chk('do-lpp')) besoins.push('LPP');
  if (chk('do-3a')) besoins.push('Vie 3a');
  if (chk('do-3b')) besoins.push('Vie 3B');
  if (chk('do-rc-commerce')) besoins.push('RC/commerce');
  if (chk('do-cyber')) besoins.push('Cyber');
  if (chk('do-pj')) besoins.push('Protection juridique');
  if (chk('do-construction')) besoins.push('Construction & maître ouvrage');
  if (chk('do-perte-exploit')) besoins.push("Perte d'exploitation");
  if (val('do-inventaire')) besoins.push(`Inventaire (CHF ${val('do-inventaire')})`);

  const lignesInfos = [
    val('do-activite') ? `Activité principale : ${val('do-activite')}` : '',
    val('do-ca') ? `Chiffre d'affaires : CHF ${val('do-ca')}` : '',
    val('do-nb-collab') ? `Nombre de collaborateurs : ${val('do-nb-collab')}` : '',
    val('do-lieu-risque') ? `Lieu du risque : ${val('do-lieu-risque')}` : '',
  ].filter(Boolean);

  const corps = `Bonjour,

Je me permets de solliciter une offre pour le client suivant :

Client : ${nomClient}
${lignesInfos.join('\n')}

Couvertures souhaitées :
${besoins.length ? besoins.map(b => '- ' + b).join('\n') : '- Voir détails ci-dessous'}

Je reste à votre disposition pour toute information complémentaire.

Meilleures salutations,
${currentUser ? currentUser.prenom + ' ' + currentUser.nom : ''}
Assurex Sàrl`;

  const sujet = `Demande d'offre — ${nomClient}`;
  const mailto = `mailto:${emails.join(',')}?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
  window.location.href = mailto;

  if (sansEmail.length) {
    showError(`⚠ Pas d'email enregistré pour : ${sansEmail.join(', ')} — ajoute-les dans Paramètres → Contacts compagnies.`);
  }
}

async function saveDemandeOffre() {
  const val = id => document.getElementById(id)?.value || null;
  const chk = id => document.getElementById(id)?.checked || false;

  const plaques = [...document.querySelectorAll('.do-plaque-numero')].map((el, i) => ({
    numero: el.value, modele: document.querySelectorAll('.do-plaque-modele')[i]?.value || '',
  })).filter(p => p.numero || p.modele);

  const donnees = {
    identite: { contact: val('do-contact'), adresse: val('do-adresse'), tel: val('do-tel'), email: val('do-email'), avs: val('do-avs'), activite: val('do-activite'), lieu_risque: val('do-lieu-risque'), suva: val('do-suva'), independant: val('do-independant') },
    base_calcul: { ca: val('do-ca'), nb_collab: val('do-nb-collab'), ap_h: val('do-ap-h'), ap_f: val('do-ap-f'), anp_h: val('do-anp-h'), anp_f: val('do-anp-f'), exc_avs_h: val('do-exc-avs-h'), exc_avs_f: val('do-exc-avs-f'), masse_chef: val('do-masse-chef') },
    assurances_personnes: { perte_gain: chk('do-perte-gain'), pg_14j: chk('do-pg-14j'), pg_30j: chk('do-pg-30j'), pg_60j: chk('do-pg-60j'), laa: chk('do-laa'), laaf: chk('do-laaf'), laac: chk('do-laac'), semi_privee: chk('do-semi-privee'), lpp: chk('do-lpp') },
    assurances_vie: { a3a: chk('do-3a'), a3a_indep: chk('do-3a-indep'), a3b: chk('do-3b'), risque_pure: chk('do-risque-pure'), versement_unique: chk('do-versement-unique'), budget_epargne: val('do-budget-epargne'), pa: val('do-pa') },
    assurances_choses: { inventaire: val('do-inventaire'), rc_commerce: chk('do-rc-commerce'), prejudice_fortune: chk('do-prejudice-fortune'), cyber: chk('do-cyber'), pj: chk('do-pj'), construction: chk('do-construction'), technique: chk('do-technique'), perte_exploit: chk('do-perte-exploit') },
    complementaires: { cct: val('do-cct'), couverture_salaire: val('do-couverture-salaire') },
    lpp: { taux_min_legal: val('do-taux-min-legal'), ded_coord: val('do-ded-coord'), exc_h: val('do-lpp-exc-h'), exc_f: val('do-lpp-exc-f'), cap_invalidite: val('do-cap-invalidite'), cap_deces: val('do-cap-deces'), amelio_rentes: chk('do-amelio-rentes'), amelio_epargne: chk('do-amelio-epargne'), amelio_tranches: chk('do-amelio-tranches'), amelio_rendement: chk('do-amelio-rendement') },
    rc: { risque: val('do-rc-risque'), lieux: val('do-rc-lieux'), marchandises: chk('do-marchandises'), transports: chk('do-transports'), transports_speciaux: chk('do-transports-speciaux'), machines: chk('do-machines'), vol: chk('do-vol'), all_risk: chk('do-all-risk'), inventaire: val('do-rc-inventaire'), prejudice_fortune: chk('do-rc-prejudice-fortune'), cv_details: val('do-rc-cv-details') },
    vehicules: plaques,
  };

  const clientId = val('do-client');
  const body = {
    client_id: clientId || null,
    prospect_nom: clientId ? null : val('do-prospect-nom'),
    agent_id: currentUser.id && allAgents.find(a=>a.email===currentUser.email) ? allAgents.find(a=>a.email===currentUser.email).id : null,
    donnees,
  };

  const res = await dbPost('demandes_offre', body);
  if (res && res.error) { showError('Erreur: ' + (res.detail || res.status)); return; }
  logAction('create_demande_offre', 'demandes_offre', res && res[0] ? res[0].id : null, body.prospect_nom || 'Client existant');
  showError('✓ Demande d\'offre enregistrée.');
  navigate('suivi');
}

async function saveOpportunite() {
  const titre = document.getElementById('o-titre').value.trim();
  if (!titre) { alert('Titre obligatoire.'); return; }
  const body = {
    titre,
    client_id: document.getElementById('o-client').value || null,
    prospect_nom: document.getElementById('o-client').value ? null : (document.getElementById('o-prospect-nom').value.trim() || null),
    compagnie: document.getElementById('o-compagnie').value || null,
    montant_potentiel: parseInt(document.getElementById('o-montant').value) || 0,
    probabilite: parseInt(document.getElementById('o-prob').value) || 50,
    stade: document.getElementById('o-stade').value,
    date_echeance: document.getElementById('o-date').value || null,
    apporteur_id: document.getElementById('o-agent').value || null,
    notes: document.getElementById('o-notes').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  await dbPost('opportunites', body);
  allOpportunites = await dbGet('opportunites', 'select=*');
  navigate('opportunites');
}

async function saveRappel() {
  const titre = document.getElementById('r-titre').value.trim();
  if (!titre) { alert('Titre obligatoire.'); return; }
  const body = {
    titre,
    client_id: document.getElementById('r-client').value || null,
    type: document.getElementById('r-type').value,
    urgence: document.getElementById('r-urgence').value,
    date_echeance: document.getElementById('r-date').value || null,
    apporteur_id: document.getElementById('r-agent').value || null,
    notes: document.getElementById('r-notes').value || null,
    statut: 'ouvert',
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const created = await dbPost('rappels', body);
  if (created && created.error) { showError('Erreur lors de la création: ' + (created.detail || created.status)); btn.textContent = '✓ Enregistrer'; btn.disabled = false; return; }

  // Si un fichier a été sélectionné, on l'upload une fois le rappel créé (on a alors son ID)
  const fileInput = document.getElementById('r-file-input');
  const file = fileInput && fileInput.files[0];
  if (file && created && created[0] && created[0].id) {
    const newId = created[0].id;
    try {
      const ext = file.name.split('.').pop();
      const path = `rappels/${newId}-${Date.now()}.${ext}`;
      const uploadToken = await getValidAccessToken() || SUPABASE_KEY;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${uploadToken}`, 'Content-Type': file.type || 'application/octet-stream' },
        body: file,
      });
      if (uploadRes.ok) {
        await dbPatch('rappels', newId, { piece_jointe_path: path, piece_jointe_nom: file.name, piece_jointe_url: null });
      }
    } catch (e) { /* upload échoué, le rappel reste créé sans pièce jointe */ }
  }

  // Création de l'événement Outlook correspondant (si une date d'échéance est définie)
  if (created && created[0] && created[0].id && body.date_echeance) {
    try {
      const eventId = await createOutlookEventFromRappel(created[0]);
      if (eventId) await dbPatch('rappels', created[0].id, { outlook_event_id: eventId });
    } catch (e) { /* sync Outlook échouée, le rappel reste créé dans le CRM */ }
  }

  allRappels = await dbGet('rappels', 'select=*');
  navigate('rappels');
}

// ═══ ACCÈS SÉCURISÉ AUX PIÈCES JOINTES (bucket privé → URL signée temporaire) ═══
async function ouvrirPieceJointe(path) {
  if (!path) return;
  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/documents/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ expiresIn: 60 }),
    });
    if (!r.ok) { showError("Impossible d'ouvrir le document (accès refusé)."); return; }
    const data = await r.json();
    if (data.signedURL) window.open(`${SUPABASE_URL}/storage/v1${data.signedURL}`, '_blank');
  } catch(e) { showError("Erreur lors de l'ouverture du document."); }
}

async function saveEditContrat(contratId, clientId) {
  const periodicite = parseInt(document.getElementById('ect-periodicite').value) || 12;
  const primeInput = parseFloat(document.getElementById('ect-prime').value) || 0;
  const primeAnnuelle = Math.round(primeInput * periodicite);
  const body = {
    produit: document.getElementById('ect-produit').value.trim(),
    compagnie: document.getElementById('ect-compagnie').value.trim(),
    numero_police: document.getElementById('ect-police').value.trim() || null,
    date_echeance: document.getElementById('ect-echeance').value || null,
    prime_annuelle: primeAnnuelle,
    statut: document.getElementById('ect-statut').value,
    modules: document.getElementById('ect-modules').value.trim() || null,
  };
  const btn = document.querySelector('#modal-edit-contrat .btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }
  const r = await dbPatch('contrats', contratId, body);
  if (r && r.error) { showError('Erreur: ' + (r.detail || r.status)); if (btn) { btn.textContent = '✓ Enregistrer'; btn.disabled = false; } return; }
  logAction('edit_contrat', 'contrats', contratId, `${body.produit} — ${body.compagnie}`);

  // Police passée en "Non géré" : créer le rappel de transfert 6 mois avant échéance (si pas déjà fait)
  if (body.statut === 'non_gere' && body.date_echeance) {
    const dejaCree = allRappels.some(r => r.client_id === clientId && r.type === 'Contrat' && (r.titre||'').includes(body.produit) && (r.titre||'').includes(body.compagnie));
    if (!dejaCree) {
      const client = allClients.find(c => c.id === clientId);
      const nomClient = client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '';
      const dEch = new Date(body.date_echeance);
      dEch.setMonth(dEch.getMonth() - 6);
      await dbPost('rappels', {
        titre: `Reprendre "${body.produit}" de ${nomClient} (actuellement ${body.compagnie}, non partenaire)`,
        client_id: clientId, type: 'Contrat', urgence: 'moyenne',
        date_echeance: dEch.toISOString().split('T')[0],
        notes: `Police actuellement chez ${body.compagnie} (compagnie non partenaire) — échéance le ${body.date_echeance}. Objectif : proposer un transfert vers une compagnie partenaire pour générer une commission.`,
        statut: 'ouvert',
      });
      allRappels = await dbGet('rappels', 'select=*');
    }
  }

  allContrats = await dbGet('contrats', 'select=*');
  document.getElementById('modal-edit-contrat').remove();
  showClient(clientId);
}

async function uploadPieceJointe() {
  const input = document.getElementById('rd-file-input');
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('rd-upload-status');
  statusEl.textContent = 'Envoi en cours...';

  try {
    const ext = file.name.split('.').pop();
    const path = `rappels/${currentRappelId}-${Date.now()}.${ext}`;
    const uploadToken2 = await getValidAccessToken() || SUPABASE_KEY;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${uploadToken2}`, 'Content-Type': file.type || 'application/octet-stream' },
      body: file,
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      statusEl.textContent = "Erreur lors de l'envoi: " + errText;
      return;
    }
    await dbPatch('rappels', currentRappelId, { piece_jointe_path: path, piece_jointe_nom: file.name, piece_jointe_url: null });
    allRappels = await dbGet('rappels', 'select=*');
    showRappel(currentRappelId);
  } catch (e) {
    statusEl.textContent = "Erreur lors de l'envoi du fichier.";
  }
}

async function supprimerPieceJointe() {
  await dbPatch('rappels', currentRappelId, { piece_jointe_url: null, piece_jointe_path: null, piece_jointe_nom: null });
  allRappels = await dbGet('rappels', 'select=*');
  showRappel(currentRappelId);
}

// ═══ AGENT IA — Remplissage Demande d'offre depuis texte libre ═══
async function remplirDemandeOffreParIA() {
  const texte = document.getElementById('do-texte-libre').value.trim();
  if (!texte) { showError('Décris la situation du client d\'abord.'); return; }
  const statusEl = document.getElementById('do-ia-status');
  statusEl.textContent = '🤖 Analyse en cours...';
  statusEl.style.color = 'var(--text-muted)';

  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(AI_FUNCTION_URL, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'parse_demande_offre', texte }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || 'Erreur inconnue');

    let nbRemplis = 0;
    Object.entries(data).forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (!el) return;
      if (el.type === 'checkbox') { el.checked = !!val; }
      else { el.value = val; }
      nbRemplis++;
    });

    statusEl.textContent = `✓ ${nbRemplis} champ(s) rempli(s) automatiquement — vérifie avant d'enregistrer.`;
    statusEl.style.color = '#4ade80';
  } catch (e) {
    statusEl.textContent = '✗ Erreur : ' + e.message;
    statusEl.style.color = '#f87171';
  }
}

// ═══ AGENT IA — Import bordereau PDF ═══
async function importBordereauPdf(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('bord-pdf-status');
  statusEl.textContent = '🤖 Lecture du PDF en cours...';
  statusEl.style.color = 'var(--text-muted)';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(AI_FUNCTION_URL, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'parse_bordereau', pdf_base64: base64 }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || 'Erreur inconnue');

    document.getElementById('b-compagnie').value = data.compagnie || '';
    document.getElementById('b-mois').value = data.mois || '';
    document.getElementById('b-montant').value = data.montant_brut || '';

    window._bordereauLignesExtraites = data.lignes || [];
    const zone = document.getElementById('bord-lignes-extraites');
    if (data.lignes && data.lignes.length) {
      zone.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px">
          <div style="font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:10px">📋 ${data.lignes.length} ligne(s) détectée(s) — à vérifier avant d'enregistrer</div>
          ${data.lignes.map(l => `<div style="font-size:11.5px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border)">${l.client_nom || '—'} · ${l.produit || ''} · ${l.type_mouvement || ''} · CHF ${l.credit || l.debit || 0}</div>`).join('')}
        </div>`;
    }
    statusEl.textContent = '✓ Champs remplis automatiquement — vérifie avant d\'enregistrer.';
    statusEl.style.color = '#4ade80';
  } catch (e) {
    statusEl.textContent = '✗ Erreur : ' + e.message;
    statusEl.style.color = '#f87171';
  }
}

function initSegmentContrat() {
  const segmentSelect = document.getElementById('ct-segment');
  if (!segmentSelect) return;
  if (contratClientId) {
    const client = allClients.find(c => c.id === contratClientId);
    if (client) segmentSelect.value = client.segment === 'Entreprise' ? 'entreprise' : 'prive';
  }
  updateCategorieOptions();
}

function syncSegmentFromClient() {
  const clientSelect = document.getElementById('ct-client');
  const segmentSelect = document.getElementById('ct-segment');
  if (!clientSelect || !segmentSelect) return;
  const selectedOption = clientSelect.options[clientSelect.selectedIndex];
  const segment = selectedOption ? selectedOption.getAttribute('data-segment') : null;
  if (segment) {
    segmentSelect.value = segment;
    updateCategorieOptions();
  }
}

function getCategoriesPourSegment(segment) {
  return Object.keys(CATALOGUE_PRODUITS).filter(cat =>
    CATALOGUE_PRODUITS[cat].some(p => p.segment === segment || p.segment === 'tous')
  );
}

function updateCategorieOptions() {
  const segmentSelect = document.getElementById('ct-segment');
  const catSelect = document.getElementById('ct-categorie');
  if (!segmentSelect || !catSelect) return;
  const segment = segmentSelect.value;
  const categoriesDisponibles = getCategoriesPourSegment(segment);
  const categoriePrecedente = catSelect.value;
  catSelect.innerHTML = categoriesDisponibles.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  if (categoriesDisponibles.includes(categoriePrecedente)) catSelect.value = categoriePrecedente;
  updateProduitOptions();
}

function updateProduitOptions() {
  const segmentSelect = document.getElementById('ct-segment');
  const catSelect = document.getElementById('ct-categorie');
  const produitInput = document.getElementById('ct-produit');
  const datalist = document.getElementById('produits-suggestions');
  if (!segmentSelect || !catSelect || !produitInput || !datalist) return;
  const segment = segmentSelect.value;
  const categorie = catSelect.value;
  const tousProduits = CATALOGUE_PRODUITS[categorie] || [];
  const produits = tousProduits.filter(p => p.segment === segment || p.segment === 'tous');
  datalist.innerHTML = produits.map(p => `<option value="${p.label}">`).join('');
  produitInput.value = '';
  updateModulesOptions();
  updateCommissionPreview();
}

function getProduitParId(produitId) {
  for (const categorie in CATALOGUE_PRODUITS) {
    const trouve = CATALOGUE_PRODUITS[categorie].find(p => p.id === produitId);
    if (trouve) return trouve;
  }
  return null;
}

function getProduitSelectionne() {
  const catSelect = document.getElementById('ct-categorie');
  const produitInput = document.getElementById('ct-produit');
  if (!catSelect || !produitInput) return null;
  const texteTape = produitInput.value.trim().toLowerCase();
  if (!texteTape) return null;
  const categorie = catSelect.value;
  const produitsCategorie = CATALOGUE_PRODUITS[categorie] || [];
  let trouve = produitsCategorie.find(p => p.label.toLowerCase() === texteTape);
  if (trouve) return trouve;
  // Fallback : recherche dans tout le catalogue si pas trouvé dans la catégorie active
  for (const cat in CATALOGUE_PRODUITS) {
    trouve = CATALOGUE_PRODUITS[cat].find(p => p.label.toLowerCase() === texteTape);
    if (trouve) return trouve;
  }
  return null;
}

function updateModulesOptions() {
  const modulesList = document.getElementById('ct-modules-list');
  const combinablesField = document.getElementById('ct-combinables-field');
  const combinablesList = document.getElementById('ct-combinables-list');
  if (!modulesList) return;
  const produit = getProduitSelectionne();
  const modules = produit ? produit.modules : [];
  if (modules.length === 0) {
    modulesList.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">Aucun module complémentaire pour ce produit.</span>';
    document.getElementById('ct-modules-field').style.display = 'none';
  } else {
    document.getElementById('ct-modules-field').style.display = 'block';
    modulesList.innerHTML = modules.map((m, i) => `
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);cursor:pointer">
        <input type="checkbox" class="ct-module-checkbox" value="${m}" style="width:15px;height:15px;cursor:pointer"/>${m}
      </label>`).join('');
  }

  if (combinablesField && combinablesList) {
    const combinablesIds = produit ? (produit.combinables || []) : [];
    if (combinablesIds.length === 0) {
      combinablesField.style.display = 'none';
      combinablesList.innerHTML = '';
    } else {

function getCompagniesConnues() {
  const base = ['Swiss Life', 'AXA', 'Helsana', 'Sanitas', 'Allianz', 'Zurich', 'Generali', 'Baloise', 'CSS', 'Groupe Mutuel', 'Visana', 'SWICA'];
  let memorisees = [];
  try { memorisees = JSON.parse(localStorage.getItem('compagnies_memorisees') || '[]'); } catch (e) {}
  const toutes = [...new Set([...base, ...memorisees])];
  return toutes.sort();
}

function memoriserCompagnie(nom) {
  if (!nom) return;
  let memorisees = [];
  try { memorisees = JSON.parse(localStorage.getItem('compagnies_memorisees') || '[]'); } catch (e) {}
  if (!memorisees.some(c => c.toLowerCase() === nom.toLowerCase())) {
    memorisees.push(nom);
    localStorage.setItem('compagnies_memorisees', JSON.stringify(memorisees));
  }
}

function calculerCommissionEstimee() {
  const produit = getProduitSelectionne();
  const produitId = produit ? produit.id : null;
  const primeMensuelle = parseFloat(document.getElementById('ct-prime-mensuelle').value) || 0;
  if (produitId === 'sante_complementaire') {
    const montant = Math.round(primeMensuelle * TAUX_COMMISSION.sante_facteur_mensuel);
    return { montant, detail: `CHF ${primeMensuelle} x ${TAUX_COMMISSION.sante_facteur_mensuel} (taux santé)` };
  }
  if (produitId === 'vie_3a') {
    const duree = parseFloat(document.getElementById('ct-duree')?.value) || 1;
    const capitalProduction = primeMensuelle * 12 * duree;
    const montant = Math.round(capitalProduction * (TAUX_COMMISSION.vie_taux_capital / 100));
    return { montant, detail: `${TAUX_COMMISSION.vie_taux_capital}% de CHF ${capitalProduction.toLocaleString()} (capital de production : ${primeMensuelle} x 12 x ${duree} an(s))` };
  }
  const montant = parseFloat(document.getElementById('ct-manuel')?.value) || 0;
  return { montant, detail: 'Saisie manuelle' };
}

function updateCommissionPreview() {
  const produit = getProduitSelectionne();
  const produitId = produit ? produit.id : null;
  if (!produitId) return;
  document.getElementById('ct-duree-field').style.display = produitId === 'vie_3a' ? 'block' : 'none';
  document.getElementById('ct-manuel-field').style.display = (produitId !== 'sante_complementaire' && produitId !== 'vie_3a') ? 'block' : 'none';
  const { montant, detail } = calculerCommissionEstimee();
  document.getElementById('commission-preview-value').textContent = 'CHF ' + montant.toLocaleString();
  document.getElementById('commission-preview-detail').textContent = detail;
}

function getProduitLabel(categorie, produitId) {
  const produits = CATALOGUE_PRODUITS[categorie] || [];
  const produit = produits.find(p => p.id === produitId);
  return produit ? produit.label : produitId;
}

async function creerContratEtCommission(clientId, compagnie, produitLabel, primeMensuelle, modules, montantCommission, detailCommission, plaques) {
  const contratBody = {
    client_id: clientId,
    compagnie,
    produit: produitLabel,
    modules: modules && modules.length > 0 ? modules.join(', ') : null,
    plaques: plaques && plaques.length > 0 ? plaques.join(', ') : null,
    numero_police: document.getElementById('ct-police').value.trim() || null,
    prime_annuelle: Math.round(primeMensuelle * (parseInt(document.getElementById('ct-periodicite')?.value) || 12)),
    date_debut: document.getElementById('ct-date').value || null,
    date_echeance: document.getElementById('ct-echeance').value || null,
    statut: document.getElementById('ct-statut').value,
  };
  const rContrat = await dbPost('contrats', contratBody);
  if (rContrat && rContrat.error) return { error: true, detail: rContrat.detail || rContrat.status };
  logAction('create_contrat', 'contrats', rContrat && rContrat[0] ? rContrat[0].id : null, `${produitLabel} — ${compagnie}`);

  const client = allClients.find(c => c.id === clientId);

  // Police non gérée (hors collaboration) : pas de commission, mais rappel automatique 6 mois avant échéance
  if (contratBody.statut === 'non_gere') {
    if (contratBody.date_echeance) {
      const dEch = new Date(contratBody.date_echeance);
      dEch.setMonth(dEch.getMonth() - 6);
      const nomClient = client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '';
      await dbPost('rappels', {
        titre: `Reprendre "${produitLabel}" de ${nomClient} (actuellement ${compagnie}, non partenaire)`,
        client_id: clientId,
        type: 'Contrat',
        urgence: 'moyenne',
        date_echeance: dEch.toISOString().split('T')[0],
        notes: `Police actuellement chez ${compagnie} (compagnie non partenaire) — échéance le ${contratBody.date_echeance}. Objectif : proposer un transfert vers une compagnie partenaire pour générer une commission.`,
        statut: 'ouvert',
      });
      allRappels = await dbGet('rappels', 'select=*');
    }
    return { error: false, contrat: rContrat && rContrat[0] ? rContrat[0] : null };
  }
  const commissionBody = {
    client_id: clientId,
    client_nom: client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '',
    compagnie,
    produit: produitLabel,
    montant_estime: montantCommission,
    detail_calcul: detailCommission,
    statut: 'en_attente',
    date_creation: new Date().toISOString().split('T')[0],
    contrat_id: rContrat && rContrat[0] ? rContrat[0].id : null,
  };
  const rComm = await dbPost('commissions_attente', commissionBody);
  return { error: false, commissionError: rComm && rComm.error, contrat: rContrat && rContrat[0] ? rContrat[0] : null };
}

async function saveContrat() {
  const clientSelectEl = document.getElementById('ct-client');
  const clientId = clientSelectEl ? clientSelectEl.value : contratClientId;
  if (!clientId) { showError('Sélectionne un client.'); return; }

  const compagnie = document.getElementById('ct-compagnie').value.trim();
  const produitSelectionne = getProduitSelectionne();
  const primeMensuelle = parseFloat(document.getElementById('ct-prime-mensuelle').value) || 0;
  if (!compagnie || !primeMensuelle) { showError('Compagnie et prime mensuelle sont obligatoires.'); return; }
  if (!produitSelectionne) { showError('Sélectionne un produit valide dans la liste proposée.'); return; }

  // Vérifier que les produits combinés cochés ont bien une prime renseignée
  const combinablesCoches = Array.from(document.querySelectorAll('.ct-combinable-checkbox:checked')).map(cb => cb.value);
  for (const id of combinablesCoches) {
    const input = document.querySelector(`.ct-combinable-prime-input[data-produit-id="${id}"]`);
    if (!input || !parseFloat(input.value)) { showError('Renseigne la prime mensuelle pour chaque produit combiné coché.'); return; }
  }

  const produitLabel = produitSelectionne.label;
  const modulesChoisis = Array.from(document.querySelectorAll('.ct-module-checkbox:checked')).map(cb => cb.value);
  const { montant: commissionEstimee, detail } = calculerCommissionEstimee();

  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;

  const plaquesValeurs = Array.from(document.querySelectorAll('.ct-plaque-input')).map(inp => inp.value.trim()).filter(Boolean);
  const resultPrincipal = await creerContratEtCommission(clientId, compagnie, produitLabel, primeMensuelle, modulesChoisis, commissionEstimee, detail, plaquesValeurs);
  if (resultPrincipal.error) { showError('Erreur lors de la création du contrat: ' + resultPrincipal.detail); btn.textContent = '✓ Enregistrer le contrat'; btn.disabled = false; return; }

  memoriserCompagnie(compagnie);

  // Créer un contrat + commission distincts pour chaque produit combiné coché
  for (const id of combinablesCoches) {
    const produitCombinable = getProduitParId(id);
    const input = document.querySelector(`.ct-combinable-prime-input[data-produit-id="${id}"]`);
    const primeCombinable = parseFloat(input.value) || 0;
    const montantCombinable = parseFloat((primeCombinable * 12 * 0.1).toFixed(0)); // estimation par défaut, ajustable manuellement ensuite
    await creerContratEtCommission(clientId, compagnie, produitCombinable.label, primeCombinable, [], montantCombinable, 'Produit combiné — commission estimée à ajuster');
  }

  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  allContrats = await dbGet('contrats', 'select=*');

  // Si ce contrat provient d'une opportunité passée en "Gagné", on la lie au contrat créé
  if (prefillOpportunite && prefillOpportunite.id && resultPrincipal.contrat && resultPrincipal.contrat.id) {
    await dbPatch('opportunites', prefillOpportunite.id, { contrat_id: resultPrincipal.contrat.id });
    allOpportunites = await dbGet('opportunites', 'select=*');
    prefillOpportunite = null;
  }

  if (contratClientId) {
    showClient(contratClientId);
  } else {
    navigate('suivi');
  }
}

          Connecte ton compte Outlook pour afficher tes rendez-vous et synchroniser tes rappels.
        </div>
        <button class="btn-add" onclick="loginMicrosoft()">
          <svg width="14" height="14" viewBox="0 0 21 21" style="vertical-align:-2px;margin-right:6px"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
          Connecter Outlook
        </button>
      </div>`;
  }

  if (calendarEvents.length === 0) {
    refreshAgenda();
    return `
      <h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Agenda</h2>
      <div class="loader">Chargement des événements Outlook...</div>`;
  }

  const grouped = {};
  calendarEvents.forEach(ev => {
    const d = new Date(ev.start.dateTime).toLocaleDateString('fr-CH', { weekday: 'long', day: 'numeric', month: 'long' });
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(ev);
  });

  const days = Object.keys(grouped).map(day => {
    const events = grouped[day].map(ev => {
      const start = new Date(ev.start.dateTime).toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
      const end = new Date(ev.end.dateTime).toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
      return `<div style="display:flex;gap:14px;padding:11px 18px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--accent);font-weight:700;min-width:90px">${start} - ${end}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${ev.subject || 'Sans titre'}</div>
          ${ev.location && ev.location.displayName ? `<div style="font-size:11px;color:var(--text-muted)">${ev.location.displayName}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${day}</div>
      <div class="table-wrap">${events}</div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Agenda — ${currentUser.email}</h2>
      <button class="btn-secondary" onclick="refreshAgenda()">↻ Actualiser</button>
    </div>
    ${days || '<div class="table-empty">Aucun événement à venir.</div>'}`;
}

// ═══ RECENSEMENT FINMA OFFICIEL (OZ Assure) — basé sur le vrai formulaire FINMA ═══
// Catégories exactes du chapitre 3.2/3.5 du recensement annuel FINMA (art. 190b OS)
// Important : Assurance Maladie (Lamal) est EXCLUE du recensement (hors périmètre LSA)
function classifyFinmaCategorie(produit) {
  const p = (produit || '').toLowerCase();
  if (p.includes('lamal')) return 'exclu_lamal';
  if (p.includes('complémentaire') && p.includes('maladie')) return 'maladie_complementaire';
  if ((p.includes('vie') && (p.includes('3a') || p.includes('3b')))) return 'vie_3a_3b';
  if (p.includes('vie')) return 'autres_vie_lsa';
  if (p.includes('laa') || p.includes('ijm') || p.includes('perte de gain')) return 'ijm_laac';
  return 'autres_lsa';
}

function isClientCommercialHeuristic(nom, titre) {
  if (titre && /madame|monsieur|mme|m\./i.test(titre)) return false;
  if (!nom) return false;
  return /\b(sa|sàrl|gmbh|ag|sc|sci|holding)\b\.?$/i.test(nom.trim()) || !titre;
}

    dbGet('commissions_oz', 'select=*'),
  ]);
  const annee = new Date().getFullYear() - 1; // exercice = année précédente, comme le vrai recensement

  // ── 3.2 / 3.3 : polices et clients (privés vs commerciaux), hors LAMal ──
  const clientsSegment = {}; // nom -> 'prive'|'commercial'
  (contrats || []).forEach(c => {
    if (!clientsSegment[c.client_nom]) {
      clientsSegment[c.client_nom] = isClientCommercialHeuristic(c.client_nom, c.titre_client) ? 'commercial' : 'prive';
    }
  });
  const nbClientsPrive = Object.values(clientsSegment).filter(s => s === 'prive').length;

async function viewOzAssure() {
  if (!currentUser || currentUser.role !== 'signataire') {
    return `<div class="table-empty">Accès réservé.</div>`;
  }
  const [commRows, contratRows] = await Promise.all([
    dbGet('commissions_oz', 'select=*&order=date_mouvement.asc'),
    dbGet('contrats_oz', 'select=*&order=client_nom.asc'),
  ]);
  const data = commRows || [];
  const contrats = contratRows || [];

  function chf(v) { return 'CHF ' + Math.round(v).toLocaleString('fr-CH'); }
  function dch(v) { return v ? new Date(v).toLocaleDateString('fr-CH') : '—'; }
  const PALETTE = ['#38bdf8','#f59e0b','#a78bfa','#4ade80','#f87171','#fb923c','#22d3ee','#e879f9','#64748b'];
  const today = new Date();

  // ── Commissions ──
  const parAnnee = {};
  const parCompagnie = {};
  const parMois = {};
  const parClientComm = {};
  const parProduitComm = {};
  let totalVieComm = 0, totalNonVieComm = 0;
  let totalDebit = 0, totalCredit = 0;

  data.forEach(r => {
    const date = r.date_mouvement || '';
    const annee = date.slice(0, 4);
    const mois = date.slice(0, 7);
    const net = Number(r.credit || 0) - Number(r.debit || 0);
    parAnnee[annee] = (parAnnee[annee] || 0) + net;
    parCompagnie[r.compagnie] = (parCompagnie[r.compagnie] || 0) + net;
    parMois[mois] = (parMois[mois] || 0) + net;
    if (r.client_nom && r.client_nom !== '-') parClientComm[r.client_nom] = (parClientComm[r.client_nom] || 0) + net;
    const catLabel = (r.produit || 'Autre').trim();
    parProduitComm[catLabel] = (parProduitComm[catLabel] || 0) + net;
    const isVie = PRODUITS_VIE_KEYWORDS.some(kw => (r.produit||'').toLowerCase().includes(kw));
    if (isVie) totalVieComm += net; else totalNonVieComm += net;
    totalDebit += Number(r.debit || 0);
    totalCredit += Number(r.credit || 0);
  });

  const totalNet = totalCredit - totalDebit;
  const annees = Object.keys(parAnnee).sort();
  const compagnies = Object.entries(parCompagnie).sort((a,b) => b[1]-a[1]);
  const produitsComm = Object.entries(parProduitComm).sort((a,b) => b[1]-a[1]);
  const mois = Object.keys(parMois).sort();
  const nbClientsComm = Object.keys(parClientComm).length;
  const moyenneMensuelle = mois.length ? totalNet / mois.length : 0;

  // ── Contrats / Volume de primes ──
  const contratsActifs = contrats.filter(c => !c.date_fin || new Date(c.date_fin) >= today);
  const volumeTotal = contrats.reduce((s,c) => s + Number(c.prime_annuelle||0), 0);
  const volumeActif = contratsActifs.reduce((s,c) => s + Number(c.prime_annuelle||0), 0);
  const sansPrimeAnnuelle = contrats.filter(c => Number(c.prime_annuelle||0) === 0 && Number(c.prime||0) > 0).length;

  // ── Segmentation du volume de primes par type de produit (actifs uniquement) ──
  const parProduitPrime = {};
  const parProduitPrimeVie = {}, parProduitPrimeNonVie = {};
  let volumeVie = 0, volumeNonVie = 0;
  contratsActifs.forEach(c => {
    const prime = Number(c.prime_annuelle||0);
    if (!prime) return;
    const catLabel = (c.produit || 'Autre').trim();
    parProduitPrime[catLabel] = (parProduitPrime[catLabel] || 0) + prime;
    const isVie = PRODUITS_VIE_KEYWORDS.some(kw => (c.produit||'').toLowerCase().includes(kw));
    if (isVie) { volumeVie += prime; parProduitPrimeVie[catLabel] = (parProduitPrimeVie[catLabel]||0) + prime; }
    else { volumeNonVie += prime; parProduitPrimeNonVie[catLabel] = (parProduitPrimeNonVie[catLabel]||0) + prime; }
  });
  const produitsPrime = Object.entries(parProduitPrime).sort((a,b) => b[1]-a[1]);
  const maxProduitPrime = produitsPrime.length ? produitsPrime[0][1] : 1;

  function ozDetailHtml(obj, segTotal, color) {
    const items = Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0, 5);
    if (!items.length) return '';
    return `<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px">
      ${items.map(([label, val]) => `
        <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:5px">
          <div style="color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%">${label}</div>
          <div style="color:${color};font-weight:700;white-space:nowrap">${Math.round(val).toLocaleString('fr-CH')} CHF · ${segTotal>0?Math.round(val/segTotal*100):0}%</div>
        </div>`).join('')}
    </div>`;
  }

  // ── Données clients (agrégées depuis contrats_oz) ──
  const clientsMap = {};
  contrats.forEach(c => {
    const key = c.client_nom || '—';
    if (!clientsMap[key]) clientsMap[key] = {
      nom: key, titre: c.titre_client, npa: c.npa, naissance: c.date_naissance,
      tel: c.tel_mobile || c.tel_perso, nbContrats: 0, primeAnnuelle: 0,
    };
    clientsMap[key].nbContrats++;
    clientsMap[key].primeAnnuelle += Number(c.prime_annuelle||0);
  });
  const clientsList = Object.values(clientsMap).sort((a,b) => b.primeAnnuelle - a.primeAnnuelle);
  const topClientsComm = Object.entries(parClientComm).sort((a,b) => b[1]-a[1]).slice(0, 8);

  // ── Donut SVG : répartition par compagnie (commissions) ──
  const totalCompagnies = compagnies.reduce((s,[,v]) => s+v, 0) || 1;
  let cumul = 0;
  const R = 70, C = 2 * Math.PI * R;
  const donutSegments = compagnies.map(([comp, val], i) => {
    const frac = val / totalCompagnies;
    const dash = frac * C;
    const offset = cumul * C;
    cumul += frac;
    return `<circle cx="90" cy="90" r="${R}" fill="none" stroke="${PALETTE[i % PALETTE.length]}" stroke-width="22"
      stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 90 90)"/>`;
  }).join('');

  // ── Bar chart : évolution mensuelle ──
  const maxMois = Math.max(...mois.map(m => parMois[m]), 1);
  const moisLabels = { '01':'Jan','02':'Fév','03':'Mar','04':'Avr','05':'Mai','06':'Jun','07':'Jul','08':'Aoû','09':'Sep','10':'Oct','11':'Nov','12':'Déc' };
  const barsHtml = mois.map(m => {

  modal.innerHTML = `

        <div class="form-field" style="grid-column:span 2"><label class="form-label">Email</label><input class="form-input" id="cc-email" type="email" value="${existant ? (existant.email||'') : ''}"/></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn-secondary" onclick="document.getElementById('modal-contact-cie').remove()">Annuler</button>
        <button class="btn-save" onclick="saveContactCompagnie(${existant ? `'${existant.id}'` : 'null'})">✓ Enregistrer</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveContactCompagnie(id) {
  const body = {
    compagnie: document.getElementById('cc-nom').value.trim(),
    libelle_contact: document.getElementById('cc-libelle').value.trim() || null,
    email: document.getElementById('cc-email').value.trim() || null,
  };
  if (!body.compagnie) { showError('Le nom de la compagnie est obligatoire.'); return; }
  if (id) await dbPatch('compagnies_contacts', id, body);
  else await dbPost('compagnies_contacts', body);
  document.getElementById('modal-contact-cie').remove();
  navigate('contacts-compagnies');
}

async function viewAuditLog() {
  if (!currentUser || currentUser.role !== 'signataire') {
    return `<h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Journal d'audit</h2>
      <div class="table-empty">Accès réservé au signataire.</div>`;
  }
  const logs = await dbGet('audit_log', 'select=*&order=created_at.desc&limit=200');
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Journal d'audit</h2>
      <div style="font-size:12px;color:var(--text-muted)">200 dernières actions — traçabilité nLPD</div>
    </div>
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:140px 1fr 200px 160px"><div>Date/heure</div><div>Action</div><div>Détail</div><div>Utilisateur</div></div>
      ${(logs || []).map(l => `<div class="table-row" style="grid-template-columns:140px 1fr 200px 160px">
        <div style="font-size:11px;color:var(--text-muted)">${new Date(l.created_at).toLocaleString('fr-CH', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' })}</div>
        <div style="font-size:12.5px;font-weight:600;color:var(--text)">${ACTION_LABELS[l.action] || l.action}</div>
        <div style="font-size:12px;color:var(--text-muted)">${l.detail || ''}</div>
        <div style="font-size:12px;color:var(--text-muted)">${l.user_email}</div>
      </div>`).join('') || '<div class="table-empty">Aucune entrée pour le moment.</div>'}
    </div>`;
}

function viewAgents() {
  const agents = allAgents.length > 0 ? allAgents : [currentUser];
  return `
    <h2 style="margin:0 0 20px;font-size:18px;font-weight:800;color:var(--text)">Paramètres — Agents</h2>
    ${agents.map(a => {
      const color = agentColor(a);
      const nbClients = allClients.filter(c => c.apporteur_id === a.id).length;
      const ca = allClients.filter(c => c.apporteur_id === a.id).reduce((s,c)=>s+caClient(c.id),0);
      const isEditing = editingAgentId === a.id;
      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
          ${avatar(a, 44)}
          <div>
            <div style="font-size:15px;font-weight:800;color:var(--text)">${a.prenom} ${a.nom}</div>
            <div style="font-size:12px;color:var(--text-muted)">${a.email} · ${a.tel || ''}</div>
          </div>
          ${currentUser.role === 'signataire' ? `<button class="btn-save" style="margin-left:auto" onclick="toggleEditAgent('${a.id}')">${isEditing ? 'Annuler' : 'Modifier'}</button>` : ''}
        </div>
        ${isEditing ? `<div style="background:var(--surface-alt);border-radius:10px;padding:16px;margin-bottom:14px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div class="form-field"><label class="form-label">Prénom</label><input id="edit-prenom-${a.id}" class="form-input" value="${a.prenom || ''}"></div>
            <div class="form-field"><label class="form-label">Nom</label><input id="edit-nom-${a.id}" class="form-input" value="${a.nom || ''}"></div>
            <div class="form-field"><label class="form-label">Email</label><input id="edit-email-${a.id}" class="form-input" value="${a.email || ''}"></div>
            <div class="form-field"><label class="form-label">Téléphone</label><input id="edit-tel-${a.id}" class="form-input" value="${a.tel || ''}"></div>
            <div class="form-field"><label class="form-label">Taux commission (%)</label>
              <select id="edit-taux-select-${a.id}" class="form-input" onchange="toggleTauxLibre('${a.id}')">
                <option value="0" ${a.taux === 0 ? 'selected' : ''}>0%</option>
                <option value="50" ${a.taux === 50 ? 'selected' : ''}>50%</option>
                <option value="100" ${a.taux === 100 ? 'selected' : ''}>100%</option>
                <option value="autre" ${![0,50,100].includes(a.taux) ? 'selected' : ''}>Autre…</option>
              </select>
              <input id="edit-taux-${a.id}" type="number" class="form-input" value="${a.taux || ''}" placeholder="Saisir le taux exact" style="margin-top:6px;${[0,50,100].includes(a.taux) ? 'display:none' : ''}">
            </div>
            <div class="form-field"><label class="form-label">Rôle</label>
              <select id="edit-role-${a.id}" class="form-input">
                <option value="signataire" ${a.role === 'signataire' ? 'selected' : ''}>Signataire</option>
                <option value="apporteur" ${a.role === 'apporteur' ? 'selected' : ''}>Apporteur</option>
              </select>
            </div>
          </div>
          <button class="btn-save" onclick="saveAgent('${a.id}')">💾 Enregistrer</button>
        </div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px">
          ${[['Rôle', a.role], ['Taux commission', a.taux + '%'], ['Clients', nbClients], ['CA géré', 'CHF ' + ca.toLocaleString()]].map(([l,v]) =>
            `<div style="background:var(--surface-alt);border-radius:9px;padding:10px 14px">
              <div style="color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:4px">${l}</div>
              <div style="color:var(--text);font-size:13px;font-weight:700">${v}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('')}
    ${currentUser.role === 'signataire' ? `<button class="btn-save" style="margin-top:4px" onclick="navigate('nouveau-agent')">+ Ajouter un agent</button>` : ''}
    <div style="margin-top:20px">
      <button onclick="logout()" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">🚪 Se déconnecter</button>
    </div>`;
}

function toggleTauxLibre(id) {
  const select = document.getElementById(`edit-taux-select-${id}`);
  const input = document.getElementById(`edit-taux-${id}`);
  if (select.value === 'autre') {
    input.style.display = 'block';
    input.value = '';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = select.value;
  }
}

function printForm() {
  window.print();
}

function toggleEditAgent(id) {
  editingAgentId = editingAgentId === id ? null : id;
  navigate('agents');
}

async function saveAgent(id) {
  const body = {
    prenom: document.getElementById(`edit-prenom-${id}`).value.trim(),
    nom: document.getElementById(`edit-nom-${id}`).value.trim(),
    email: document.getElementById(`edit-email-${id}`).value.trim(),
    tel: document.getElementById(`edit-tel-${id}`).value.trim(),
    taux: Number(document.getElementById(`edit-taux-${id}`).value) || 0,
    role: document.getElementById(`edit-role-${id}`).value,
  };
  if (!body.prenom || !body.nom || !body.email) { showError('Prénom, nom et email sont obligatoires.'); return; }
  const r = await dbPatch('agents', id, body);
  if (r && r.error) { showError('Erreur lors de la mise à jour: ' + (r.detail || r.status)); return; }
  allAgents = await dbGet('agents', 'select=*');
  editingAgentId = null;
  navigate('agents');
}

function viewNouvelAgent() {
  return `
    <button onclick="navigate('agents')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:5px">← Retour aux agents</button>
    <h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Nouvel agent</h2>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="form-field"><label class="form-label">Prénom *</label><input id="new-prenom" class="form-input"></div>
        <div class="form-field"><label class="form-label">Nom *</label><input id="new-nom" class="form-input"></div>
        <div class="form-field"><label class="form-label">Email *</label><input id="new-email" class="form-input" placeholder="prenom@cofidex.ch"></div>
        <div class="form-field"><label class="form-label">Téléphone</label><input id="new-tel" class="form-input"></div>
        <div class="form-field"><label class="form-label">Taux commission (%)</label><input id="new-taux" type="number" class="form-input" value="50"></div>
        <div class="form-field"><label class="form-label">Rôle</label>
          <select id="new-role" class="form-input">
            <option value="apporteur">Apporteur</option>
            <option value="signataire">Signataire</option>
          </select>
        </div>
      </div>
      <button class="btn-save" onclick="createAgent()">💾 Créer l'agent</button>
    </div>`;
}

async function createAgent() {
  const body = {
    prenom: document.getElementById('new-prenom').value.trim(),
    nom: document.getElementById('new-nom').value.trim(),
    email: document.getElementById('new-email').value.trim(),
    tel: document.getElementById('new-tel').value.trim(),
    taux: Number(document.getElementById('new-taux').value) || 50,
    role: document.getElementById('new-role').value,
  };
  if (!body.prenom || !body.nom || !body.email) { showError('Prénom, nom et email sont obligatoires.'); return; }
  const r = await dbPost('agents', body);
  if (r && r.error) { showError('Erreur lors de la création: ' + (r.detail || r.status)); return; }
  allAgents = await dbGet('agents', 'select=*');
  navigate('agents');
}

// ═══ INIT ═══
initMSAL();
tryRestoreSession();
</script>
</body>
</html>
