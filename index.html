// ═══ UPLOAD POLICE PDF (fiche client → onglet Contrats) ═══
async function uploadPolicePdf(contratId, input) {
  const file = input.files[0];
  if (!file) return;
  if (file.type !== 'application/pdf') { showError('Seuls les fichiers PDF sont acceptés.'); return; }
  if (file.size > 10 * 1024 * 1024) { showError('Fichier trop lourd — maximum 10 Mo.'); return; }

  const ct = allContrats.find(x => x.id === contratId);
  const nomFichier = (ct ? `${ct.compagnie}_${ct.produit}_${ct.numero_police || contratId}` : contratId)
    .replace(/[^a-zA-Z0-9_-]/g, '_').substring(0, 60);
  const path = `polices/${contratId}/${nomFichier}.pdf`;

  showError('⏳ Upload en cours...');
  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/pdf' },
      body: file,
    });
    if (!uploadRes.ok) {
      const err = await uploadRes.json().catch(() => ({}));
      // Si fichier déjà existant, on écrase (UPSERT)
      const upRes2 = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
        method: 'PUT',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/pdf' },
        body: file,
      });
      if (!upRes2.ok) throw new Error('Échec de l\'upload');
    }
    const r = await dbPatch('contrats', contratId, { police_url: path, police_nom: file.name });
    if (r && r.error) throw new Error(errMsg(r));
    allContrats = await dbGet('contrats', 'select=*');
    showError('✓ Police PDF archivée avec succès.');
    logAction('upload_police', 'contrats', contratId, file.name);
    // Recharger la fiche client
    const ct2 = allContrats.find(x => x.id === contratId);
    if (ct2) showClient(ct2.client_id);
  } catch(e) {
    showError('Erreur upload : ' + e.message);
  }
}

async function ouvrirPieceJointe(path) {
  if (!path) return;
  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(`${SUPABASE_URL}/storage/v1/object/sign/documents/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ expiresIn: 60 }),
    });
    if (!r.ok) { showError("Impossible d'ouvrir le document (accès refusé)."); return; }
    const data = await r.json();
    if (data.signedURL) window.open(`${SUPABASE_URL}/storage/v1${data.signedURL}`, '_blank');
  } catch(e) { showError("Erreur lors de l'ouverture du document."); }
}

async function deleteContrat(contratId, clientId, returnTo) {
  if (!confirm('Supprimer définitivement ce contrat ? Les commissions liées seront également supprimées. Cette action est irréversible.')) return;
  const token = await getValidAccessToken() || SUPABASE_KEY;
  // Supprimer les commissions liées d'abord (contrainte FK)
  await fetch(`${SUPABASE_URL}/rest/v1/commissions_attente?contrat_id=eq.${contratId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
  });
  // Supprimer le contrat
  const r = await fetch(`${SUPABASE_URL}/rest/v1/contrats?id=eq.${contratId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
  });
  if (!r.ok) { showError('Erreur lors de la suppression du contrat.'); return; }
  logAction('delete_contrat', 'contrats', contratId, null);
  allContrats = await dbGet('contrats', 'select=*');
  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  const modal = document.getElementById('modal-edit-contrat');
  if (modal) modal.remove();
  if (returnTo) { navigate(returnTo); } else { showClient(clientId); }
}

function updateApercuPrimeAnnuelle() {
  const prime = parseFloat(document.getElementById('ect-prime')?.value) || 0;
  const perio = parseInt(document.getElementById('ect-periodicite')?.value) || 1;
  const annuelle = Math.round(prime * perio);
  const el = document.getElementById('ect-apercu-annuel');
  if (el) el.innerHTML = `Prime annuelle calculée : <strong style="color:#f59e0b">CHF ${annuelle.toLocaleString()}</strong> (${prime.toLocaleString()} × ${perio} échéance${perio>1?'s':''})`;
}

  const ancienContrat = allContrats.find(c => c.id === contratId);

    prime_annuelle: primeAnnuelle,
    periodicite: periodicite,
    statut: document.getElementById('ect-statut').value,
    commissionne,
    apporteur_id: document.getElementById('ect-apporteur').value || null,
    modules: document.getElementById('ect-modules').value.trim() || null,
  };
  const btn = document.querySelector('#modal-edit-contrat .btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }
  const r = await dbPatch('contrats', contratId, body);
  if (r && r.error) { showError('Erreur: ' + errMsg(r)); if (btn) { btn.textContent = '✓ Enregistrer'; btn.disabled = false; } return; }
  logAction('edit_contrat', 'contrats', contratId, `${body.produit} — ${body.compagnie}`);

  // ── Contrat passé en "Annulé" : supprimer la commission en attente liée ──
  // Un contrat annulé n'a jamais réellement pris effet (réserve refusée, non abouti),
  // donc toute commission encore "en attente" pour lui n'a plus aucune raison d'exister.
  // On ne touche JAMAIS aux commissions déjà "reçue" (argent réel déjà encaissé) —
  // dans ce cas c'est le statut "Extourné" qu'il faut utiliser, pas l'annulation.
  if (body.statut === 'annulé' && ancienStatut !== 'annulé') {
    const commissionsEnAttenteLiees = allCommissionsAttente.filter(c => c.contrat_id === contratId && c.statut === 'en_attente');
    for (const c of commissionsEnAttenteLiees) {
      const token = await getValidAccessToken() || SUPABASE_KEY;
      await fetch(`${SUPABASE_URL}/rest/v1/commissions_attente?id=eq.${c.id}`, {
        method: 'DELETE',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
      });
    }
    if (commissionsEnAttenteLiees.length) {
      logAction('suppr_commission_contrat_annule', 'commissions_attente', null, `${commissionsEnAttenteLiees.length} commission(s) en attente supprimée(s) — contrat ${body.produit} annulé`);
      showError(`Contrat annulé — ${commissionsEnAttenteLiees.length} commission(s) en attente liée(s) ont été supprimée(s) automatiquement.`);
    }
    allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  }

  // Police passée en "Non commissionné" : créer le rappel de transfert 6 mois avant échéance (si pas déjà fait)
  if (!commissionne && body.date_echeance) {
    const dejaCree = allRappels.some(r => r.client_id === clientId && r.type === 'Contrat' && (r.titre||'').includes(body.produit) && (r.titre||'').includes(body.compagnie));
    if (!dejaCree) {
      const client = allClients.find(c => c.id === clientId);
      const nomClient = client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '';
      const dEch = new Date(body.date_echeance);
      dEch.setMonth(dEch.getMonth() - 6);
      await dbPost('rappels', {
        titre: `Reprendre "${body.produit}" de ${nomClient} (actuellement ${body.compagnie}, non partenaire)`,
        client_id: clientId, type: 'Contrat', urgence: 'moyenne',
        date_echeance: dEch.toISOString().split('T')[0],
        notes: `Police actuellement chez ${body.compagnie} (compagnie non partenaire) — échéance le ${body.date_echeance}. Objectif : proposer un transfert vers une compagnie partenaire pour générer une commission.`,
        statut: 'ouvert',
      });
      allRappels = await dbGet('rappels', 'select=*');
    }
  }

  allContrats = await dbGet('contrats', 'select=*');
  document.getElementById('modal-edit-contrat').remove();
  if (returnTo) { navigate(returnTo); } else { showClient(clientId); }
}

// ═══ IMPORT DE FLOTTE PAR PDF (IA) — avec écran de vérification avant import ═══
async function importFlottePdf(clientId, input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('flotte-import-status-'+clientId);
  statusEl.innerHTML = '🤖 Lecture du PDF en cours (peut prendre 30-60 secondes pour une grande flotte)...';
  statusEl.style.color = 'var(--accent)';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(AI_FUNCTION_URL, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'parse_flotte', pdf_base64: base64 }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || 'Erreur inconnue');

    const vehicules = data.vehicules || [];
    if (!vehicules.length) {
      statusEl.innerHTML = '⚠ Aucun véhicule détecté dans ce PDF.';
      statusEl.style.color = '#f59e0b';
      return;
    }
    statusEl.innerHTML = `✓ ${vehicules.length} véhicule(s) détecté(s) — vérifie la liste avant de confirmer l'import.`;
    statusEl.style.color = '#4ade80';
    showModalVerifFlotte(clientId, vehicules);

  } catch(e) {
    statusEl.innerHTML = '✗ ' + e.message + ' — réessaie ou saisis les véhicules manuellement.';
    statusEl.style.color = '#f87171';
  }
  input.value = '';
}

async function confirmerImportFlotte(clientId) {
  const vehicules = window._flotteAImporter || [];
  const contratId = document.getElementById('verif-flotte-contrat').value || null;
  const cases = document.querySelectorAll('.verif-veh-check');
  const aImporter = [];
  cases.forEach(cb => { if (cb.checked) aImporter.push(vehicules[parseInt(cb.dataset.idx)]); });

  if (!aImporter.length) { showError('Aucun véhicule sélectionné.'); return; }

  const btn = document.querySelector('#modal-verif-flotte .btn-save');
  if (btn) { btn.textContent = 'Import en cours...'; btn.disabled = true; }

  for (const v of aImporter) {
    await dbPost('vehicules', {
      client_id: clientId,
      contrat_id: contratId,
      marque: v.marque || null,
      modele: v.modele || null,
      cylindree: v.cylindree || null,
      numero_plaque: v.numero_plaque || null,
      prime_brute: Number(v.prime_brute) || 0,
      prime_nette: Number(v.prime_nette) || 0,
    });
  }

  logAction('import_flotte_pdf', 'vehicules', null, `${aImporter.length} véhicule(s) importé(s)`);
  allVehicules = await dbGet('vehicules', 'select=*');
  if (contratId) await recalculerPrimeFlotte(contratId);

  document.getElementById('modal-verif-flotte').remove();
  showError(`✓ ${aImporter.length} véhicule(s) importé(s) avec succès${contratId ? ' et prime du contrat flotte recalculée' : ''}.`);
  showClient(clientId);
}

async function recalculerPrimeFlotte(contratId) {
  if (!contratId) return;
  const vehiculesDuContrat = allVehicules.filter(v => v.contrat_id === contratId);
  const totalBrut = vehiculesDuContrat.reduce((s, v) => s + Number(v.prime_brute || 0), 0);
  await dbPatch('contrats', contratId, { prime_annuelle: Math.round(totalBrut) });
  allContrats = await dbGet('contrats', 'select=*');
}

async function saveVehicule(clientId, vehiculeId) {
  const marque = document.getElementById('veh-marque').value.trim();
  const plaque = document.getElementById('veh-plaque').value.trim();
  if (!marque || !plaque) { showError('Marque et n° de plaque obligatoires.'); return; }
  const ancienVehicule = vehiculeId ? allVehicules.find(x => x.id === vehiculeId) : null;
  const ancienContratId = ancienVehicule ? ancienVehicule.contrat_id : null;
  const nouveauContratId = document.getElementById('veh-contrat').value || null;
  const body = {
    client_id: clientId,
    marque,
    modele: document.getElementById('veh-modele').value.trim() || null,
    cylindree: document.getElementById('veh-cylindree').value.trim() || null,
    numero_plaque: plaque,
    contrat_id: nouveauContratId,
    numero_police: document.getElementById('veh-police').value.trim() || null,
    prime_brute: Number(document.getElementById('veh-prime-brute').value) || 0,
    prime_nette: Number(document.getElementById('veh-prime-nette').value) || 0,
  };
  const r = vehiculeId ? await dbPatch('vehicules', vehiculeId, body) : await dbPost('vehicules', body);
  if (r && r.error) { showError('Erreur : ' + errMsg(r)); return; }
  logAction(vehiculeId ? 'edit_vehicule' : 'create_vehicule', 'vehicules', vehiculeId || null, `${marque} — ${plaque}`);
  allVehicules = await dbGet('vehicules', 'select=*');

  // Recalcul automatique de la prime du/des contrat(s) flotte concerné(s)
  await recalculerPrimeFlotte(nouveauContratId);
  if (ancienContratId && ancienContratId !== nouveauContratId) await recalculerPrimeFlotte(ancienContratId);

  document.getElementById('modal-vehicule').remove();
  showClient(clientId);
}

async function deleteVehicule(vehiculeId, clientId) {
  if (!confirm('Supprimer ce véhicule de la flotte ?')) return;
  const vehicule = allVehicules.find(v => v.id === vehiculeId);
  const contratConcerne = vehicule ? vehicule.contrat_id : null;
  const token = await getValidAccessToken() || SUPABASE_KEY;
  await fetch(`${SUPABASE_URL}/rest/v1/vehicules?id=eq.${vehiculeId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
  });
  logAction('delete_vehicule', 'vehicules', vehiculeId, null);
  allVehicules = await dbGet('vehicules', 'select=*');
  await recalculerPrimeFlotte(contratConcerne);
  document.getElementById('modal-vehicule')?.remove();
  showClient(clientId);
}

async function uploadPieceJointe() {
  const input = document.getElementById('rd-file-input');
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('rd-upload-status');
  statusEl.textContent = 'Envoi en cours...';

  try {
    const ext = file.name.split('.').pop();
    const path = `rappels/${currentRappelId}-${Date.now()}.${ext}`;
    const uploadToken2 = await getValidAccessToken() || SUPABASE_KEY;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${uploadToken2}`, 'Content-Type': file.type || 'application/octet-stream' },
      body: file,
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      statusEl.textContent = "Erreur lors de l'envoi: " + errText;
      return;
    }
    await dbPatch('rappels', currentRappelId, { piece_jointe_path: path, piece_jointe_nom: file.name, piece_jointe_url: null });
    allRappels = await dbGet('rappels', 'select=*');
    showRappel(currentRappelId);
  } catch (e) {
    statusEl.textContent = "Erreur lors de l'envoi du fichier.";
  }
}

async function supprimerPieceJointe() {
  await dbPatch('rappels', currentRappelId, { piece_jointe_url: null, piece_jointe_path: null, piece_jointe_nom: null });
  allRappels = await dbGet('rappels', 'select=*');
  showRappel(currentRappelId);
}

      body: JSON.stringify({ action: 'parse_demande_offre', texte }),
    });
    const data = await r.json();

      const el = document.getElementById(id);
      if (!el) return;
      if (el.type === 'checkbox') { el.checked = !!val; }
      else { el.value = val; }
      nbRemplis++;
    });

    statusEl.textContent = `✓ ${nbRemplis} champ(s) rempli(s) automatiquement — vérifie avant d'enregistrer.`;
    statusEl.style.color = '#4ade80';
  } catch (e) {
    statusEl.textContent = '✗ Erreur : ' + e.message;
    statusEl.style.color = '#f87171';
  }
}

async function importBordereauPdf(input) {
  const file = input.files[0];
  if (!file) return;
  window._bordereauPdfFile = file; // conservé pour pièce jointe quoi qu'il arrive ensuite
  const statusEl = document.getElementById('bord-pdf-status');
  statusEl.textContent = '🤖 Lecture du PDF en cours...';
  statusEl.style.color = 'var(--text-muted)';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(AI_FUNCTION_URL, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'parse_bordereau', pdf_base64: base64 }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || 'Erreur inconnue');

    document.getElementById('b-compagnie').value = data.compagnie || '';
    document.getElementById('b-mois').value = data.mois || '';
    document.getElementById('b-montant').value = data.montant_brut || '';

    window._bordereauLignesExtraites = data.lignes || [];
    const zone = document.getElementById('bord-lignes-extraites');
    if (data.lignes && data.lignes.length) {
      zone.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px">
          <div style="font-size:12.5px;font-weight:700;color:var(--text);margin-bottom:10px">📋 ${data.lignes.length} ligne(s) détectée(s) — à vérifier avant d'enregistrer</div>
          ${data.lignes.map(l => `<div style="font-size:11.5px;color:var(--text-muted);padding:4px 0;border-bottom:1px solid var(--border)">${l.client_nom || '—'} · ${l.produit || ''} · ${l.type_mouvement || ''} · CHF ${l.credit || l.debit || 0}</div>`).join('')}
        </div>`;
    }
    statusEl.textContent = '✓ Champs remplis automatiquement — vérifie avant d\'enregistrer.';
    statusEl.style.color = '#4ade80';
  } catch (e) {
    statusEl.textContent = '✗ Erreur : ' + e.message;
    statusEl.style.color = '#f87171';
  }
}

function suggererCautionCompagnie() {
  const nomSaisi = document.getElementById('b-compagnie').value.trim();
  const hint = document.getElementById('b-compagnie-hint');
  if (!nomSaisi) { hint.textContent = ''; return; }

  const contact = (allCompagniesContacts||[]).find(c => c.compagnie.toLowerCase() === nomSaisi.toLowerCase());
  const dernierBordereauCompagnie = [...allBordereaux]
    .filter(b => (b.compagnie||'').toLowerCase() === nomSaisi.toLowerCase())
    .sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0))[0];

  let msgs = [];
  if (contact) msgs.push(`✓ Compagnie partenaire enregistrée${contact.libelle_contact ? ' — ' + contact.libelle_contact : ''}${contact.email ? ' (' + contact.email + ')' : ''}`);
  if (dernierBordereauCompagnie) {
    const cautionField = document.getElementById('b-caution');
    if (!cautionField.dataset.touched && dernierBordereauCompagnie.taux_caution) {
      cautionField.value = dernierBordereauCompagnie.taux_caution;
      msgs.push(`💡 Taux de caution repris du dernier bordereau ${dernierBordereauCompagnie.numero || ''} (${dernierBordereauCompagnie.taux_caution}%)`);
    }
  }
  if (!contact && nomSaisi.length > 2) msgs.push(`⚠ Compagnie non enregistrée dans Paramètres → Contacts compagnies`);
  hint.innerHTML = msgs.join('<br/>');
}

async function saveBordereau() {
  const compagnie = document.getElementById('b-compagnie').value.trim();
  const mois = `${document.getElementById('b-mois-select').value} ${document.getElementById('b-annee-select').value}`;
  const montant = parseInt(document.getElementById('b-montant').value) || 0;
  const tauxCaution = parseFloat(document.getElementById('b-caution').value) || 0;
  if (!compagnie) { alert('Compagnie obligatoire.'); return; }
  const body = {
    numero: window._bordereauNumero || null,
    compagnie, mois,
    montant_brut: montant,
    taux_caution: tauxCaution,
    statut: document.getElementById('b-statut').value,
    date_reception: document.getElementById('b-date').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const r = await dbPost('bordereaux', body);
  if (r && r.error) { showError("Erreur lors de l'enregistrement: " + errMsg(r)); btn.textContent = '✓ Enregistrer'; btn.disabled = false; return; }

  const nouveauBordereau = r && r[0] ? r[0] : null;

  // Si un PDF a été importé, on l'archive en pièce jointe rattachée au numéro du bordereau
  if (nouveauBordereau && window._bordereauPdfFile) {
    try {
      const file = window._bordereauPdfFile;
      const ext = file.name.split('.').pop();
      const path = `bordereaux/${body.numero || nouveauBordereau.id}-${Date.now()}.${ext}`;
      const uploadToken = await getValidAccessToken() || SUPABASE_KEY;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${uploadToken}`, 'Content-Type': file.type || 'application/pdf' },
        body: file,
      });
      if (uploadRes.ok) {
        await dbPatch('bordereaux', nouveauBordereau.id, { pdf_url: path, pdf_nom: file.name });
      }
    } catch(e) { /* le bordereau reste créé même si l'archivage du PDF échoue */ }
  }

  window._bordereauPdfFile = null;
  allBordereaux = await dbGet('bordereaux', 'select=*');
  navigate('bordereaux');
}

async function importPolicePdfAI(input) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('police-import-status');
  const label = document.getElementById('police-import-label');
  statusEl.textContent = '🤖 Lecture du PDF en cours...';
  statusEl.style.color = 'var(--accent)';
  label.style.opacity = '0.5';
  label.style.pointerEvents = 'none';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(AI_FUNCTION_URL, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'parse_police', pdf_base64: base64 }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || 'Erreur inconnue');

    // Pré-remplir le formulaire avec les données extraites
    if (data.compagnie) document.getElementById('ct-compagnie').value = data.compagnie;
    if (data.produit) {
      document.getElementById('ct-produit').value = data.produit;
      updateModulesOptions();
    }
    if (data.numero_police) document.getElementById('ct-police').value = data.numero_police;
    if (data.date_debut) document.getElementById('ct-date').value = data.date_debut;
    if (data.date_echeance) document.getElementById('ct-echeance').value = data.date_echeance;
    if (data.prime_mensuelle) {
      document.getElementById('ct-prime-mensuelle').value = data.prime_mensuelle;
      document.getElementById('ct-periodicite').value = '12';
    } else if (data.prime_annuelle) {
      document.getElementById('ct-prime-mensuelle').value = Math.round(data.prime_annuelle / 12);
      document.getElementById('ct-periodicite').value = '12';
    }

    // Trouver le client si nom détecté
    if (data.client_nom) {
      const nom = data.client_nom.toLowerCase();
      const clientTrouve = allClients.find(c => {
        const n = (c.prenom + ' ' + c.nom).toLowerCase();
        const n2 = c.nom.toLowerCase();
        return n.includes(nom) || nom.includes(n2) || n2.includes(nom);
      });
      if (clientTrouve && !contratClientId) {
        const sel = document.getElementById('ct-client');
        if (sel) { sel.value = clientTrouve.id; syncSegmentFromClient(); }
      }
    }

    updateCommissionPreview();

    // Conserver le fichier pour l'archiver après création du contrat
    window._policePdfFileFromImport = file;

    statusEl.innerHTML = `<span style="color:#4ade80;font-weight:700">✓ Formulaire pré-rempli depuis le PDF</span> — vérifie les données, précise si le contrat sera commissionné ou non, puis enregistre.`;

  } catch(e) {
    statusEl.textContent = '✗ ' + e.message + ' — remplis manuellement le formulaire ci-dessous.';
    statusEl.style.color = '#f87171';
  } finally {
    label.style.opacity = '1';
    label.style.pointerEvents = 'auto';
  }
}

      <button class="btn-secondary" onclick="prefillOpportunite=null; navigate(contratClientId ? 'clients' : 'suivi')">Annuler</button>
      <button class="btn-save" onclick="saveContrat()">✓ Enregistrer le contrat</button>
    </div>`;
}

function initSegmentContrat() {
  const segmentSelect = document.getElementById('ct-segment');
  if (!segmentSelect) return;
  if (contratClientId) {
    const client = allClients.find(c => c.id === contratClientId);
    if (client) segmentSelect.value = client.segment === 'Entreprise' ? 'entreprise' : 'prive';
  }
  updateCategorieOptions();
}

function syncSegmentFromClient() {
  const clientSelect = document.getElementById('ct-client');
  const segmentSelect = document.getElementById('ct-segment');
  if (!clientSelect || !segmentSelect) return;
  const selectedOption = clientSelect.options[clientSelect.selectedIndex];
  const segment = selectedOption ? selectedOption.getAttribute('data-segment') : null;
  if (segment) {
    segmentSelect.value = segment;
    updateCategorieOptions();
  }
}

function getCategoriesPourSegment(segment) {
  return Object.keys(CATALOGUE_PRODUITS).filter(cat =>
    CATALOGUE_PRODUITS[cat].some(p => p.segment === segment || p.segment === 'tous')
  );
}

function updateCategorieOptions() {
  const segmentSelect = document.getElementById('ct-segment');
  const catSelect = document.getElementById('ct-categorie');
  if (!segmentSelect || !catSelect) return;
  const segment = segmentSelect.value;
  const categoriesDisponibles = getCategoriesPourSegment(segment);
  const categoriePrecedente = catSelect.value;
  catSelect.innerHTML = categoriesDisponibles.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  if (categoriesDisponibles.includes(categoriePrecedente)) catSelect.value = categoriePrecedente;
  updateProduitOptions();
}

function updateProduitOptions() {
  const segmentSelect = document.getElementById('ct-segment');
  const catSelect = document.getElementById('ct-categorie');
  const produitInput = document.getElementById('ct-produit');
  const datalist = document.getElementById('produits-suggestions');
  if (!segmentSelect || !catSelect || !produitInput || !datalist) return;
  const segment = segmentSelect.value;
  const categorie = catSelect.value;
  const tousProduits = CATALOGUE_PRODUITS[categorie] || [];
  const produits = tousProduits.filter(p => p.segment === segment || p.segment === 'tous');
  datalist.innerHTML = produits.map(p => `<option value="${p.label}">`).join('');
  produitInput.value = '';
  // Pré-remplir la compagnie si le produit a une compagnie fixe
  produitInput.oninput = function() {
    const val = this.value.trim().toLowerCase();
    const prodTrouve = produits.find(p => p.label.toLowerCase() === val);
    if (prodTrouve && prodTrouve.compagnie_fixe) {
      const compField = document.getElementById('ct-compagnie');
      if (compField && !compField.value) compField.value = prodTrouve.compagnie_fixe;
    }
    updateModulesOptions();
    updateCommissionPreview();
  };
  updateModulesOptions();
  updateCommissionPreview();
}

function getProduitParId(produitId) {
  for (const categorie in CATALOGUE_PRODUITS) {
    const trouve = CATALOGUE_PRODUITS[categorie].find(p => p.id === produitId);
    if (trouve) return trouve;
  }
  return null;
}

function getProduitSelectionne() {
  const catSelect = document.getElementById('ct-categorie');
  const produitInput = document.getElementById('ct-produit');
  if (!catSelect || !produitInput) return null;
  const texteTape = produitInput.value.trim().toLowerCase();
  if (!texteTape) return null;
  const categorie = catSelect.value;
  const produitsCategorie = CATALOGUE_PRODUITS[categorie] || [];
  let trouve = produitsCategorie.find(p => p.label.toLowerCase() === texteTape);
  if (trouve) return trouve;
  // Fallback : recherche dans tout le catalogue si pas trouvé dans la catégorie active
  for (const cat in CATALOGUE_PRODUITS) {
    trouve = CATALOGUE_PRODUITS[cat].find(p => p.label.toLowerCase() === texteTape);
    if (trouve) return trouve;
  }
  return null;
}

function updateModulesOptions() {
  const modulesList = document.getElementById('ct-modules-list');
  const combinablesField = document.getElementById('ct-combinables-field');
  const combinablesList = document.getElementById('ct-combinables-list');
  if (!modulesList) return;
  const produit = getProduitSelectionne();
  const modules = produit ? produit.modules : [];
  if (modules.length === 0) {
    modulesList.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">Aucun module complémentaire pour ce produit.</span>';
    document.getElementById('ct-modules-field').style.display = 'none';
  } else {
    document.getElementById('ct-modules-field').style.display = 'block';
    modulesList.innerHTML = modules.map((m, i) => `
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);cursor:pointer">
        <input type="checkbox" class="ct-module-checkbox" value="${m}" style="width:15px;height:15px;cursor:pointer"/>${m}
      </label>`).join('');
  }

  if (combinablesField && combinablesList) {
    const combinablesIds = produit ? (produit.combinables || []) : [];
    if (combinablesIds.length === 0) {
      combinablesField.style.display = 'none';
      combinablesList.innerHTML = '';
    } else {
      combinablesField.style.display = 'block';
      combinablesList.innerHTML = combinablesIds.map(id => {
        const p = getProduitParId(id);
        return p ? `
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);cursor:pointer">
          <input type="checkbox" class="ct-combinable-checkbox" value="${p.id}" onchange="toggleCombinablePrime('${p.id}')" style="width:15px;height:15px;cursor:pointer"/>+ ${p.label}
        </label>` : '';
      }).join('') + '<div id="ct-combinables-primes" style="width:100%;margin-top:8px"></div>';
    }
  }

  const plaquesField = document.getElementById('ct-plaques-field');
  if (plaquesField) {
    if (produit && produit.flotte) {
      plaquesField.style.display = 'block';
      if (document.getElementById('ct-plaques-list').children.length === 0) ajouterPlaqueFlotte();
    } else {
      plaquesField.style.display = 'none';
      document.getElementById('ct-plaques-list').innerHTML = '';
    }
  }
}

function ajouterPlaqueFlotte() {
  const list = document.getElementById('ct-plaques-list');
  if (!list) return;
  const ligne = document.createElement('div');
  ligne.style.cssText = 'display:flex;gap:8px;align-items:center';
  ligne.innerHTML = `
    <input class="form-input ct-plaque-input" placeholder="VD 123456" style="flex:1"/>
    <input class="form-input ct-plaque-marque-input" placeholder="Marque / modèle (optionnel)" style="flex:1"/>
    <button type="button" onclick="this.parentElement.remove()" style="background:var(--red-dim);color:var(--red);border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">✕</button>
  `;
  list.appendChild(ligne);
}

function toggleCombinablePrime(produitId) {
  const checkbox = document.querySelector(`.ct-combinable-checkbox[value="${produitId}"]`);
  const primesZone = document.getElementById('ct-combinables-primes');
  if (!checkbox || !primesZone) return;
  const produit = getProduitParId(produitId);
  const existant = document.getElementById(`ct-combinable-prime-${produitId}`);
  if (checkbox.checked && !existant) {
    const div = document.createElement('div');
    div.id = `ct-combinable-prime-${produitId}`;
    div.style.cssText = 'margin-top:6px';
    div.innerHTML = `<label class="form-label">Prime annuelle pour "${produit.label}" (CHF)</label><input class="form-input ct-combinable-prime-input" data-produit-id="${produitId}" type="number" placeholder="540"/><div style="font-size:10.5px;color:var(--text-muted);margin-top:3px">Casco/ménage sont facturés annuellement — indique le montant annuel, pas mensuel.</div>`;
    primesZone.appendChild(div);
  } else if (!checkbox.checked && existant) {
    existant.remove();
  }

function getCompagniesConnues() {
  const base = ['Swiss Life', 'AXA', 'Helsana', 'Sanitas', 'Allianz', 'Zurich', 'Generali', 'Baloise', 'CSS', 'Groupe Mutuel', 'Visana', 'SWICA'];
  // Source prioritaire : Paramètres → Contacts compagnies (Supabase, synchronisé pour toute l'équipe)
  const depuisParametres = (allCompagniesContacts || []).map(c => c.compagnie).filter(Boolean);
  let memorisees = [];
  try { memorisees = JSON.parse(localStorage.getItem('compagnies_memorisees') || '[]'); } catch (e) {}
  // Dédoublonnage insensible à la casse/espaces (cf. piège récurrent déjà rencontré sur "la Mobilière")
  const vues = new Map();
  [...depuisParametres, ...base, ...memorisees].forEach(nom => {
    const cle = nom.trim().toLowerCase();
    if (!vues.has(cle)) vues.set(cle, nom.trim());
  });
  return [...vues.values()].sort();
}

function memoriserCompagnie(nom) {
  if (!nom) return;
  let memorisees = [];
  try { memorisees = JSON.parse(localStorage.getItem('compagnies_memorisees') || '[]'); } catch (e) {}
  if (!memorisees.some(c => c.toLowerCase() === nom.toLowerCase())) {
    memorisees.push(nom);
    localStorage.setItem('compagnies_memorisees', JSON.stringify(memorisees));
  }
}

function calculerCommissionEstimee() {
  const produit = getProduitSelectionne();
  const produitId = produit ? produit.id : null;
  const primeMensuelle = parseFloat(document.getElementById('ct-prime-mensuelle').value) || 0;
  const periodicite = parseInt(document.getElementById('ct-periodicite')?.value) || 12;
  const primeAnnuelle = Math.round(primeMensuelle * periodicite);

  // ── Santé / complémentaire ──────────────────────────────────────────────
  if (produitId === 'sante_complementaire') {
    const montant = Math.round(primeMensuelle * TAUX_COMMISSION.sante_facteur_mensuel);
    return { montant, detail: `CHF ${primeMensuelle}/mois × ${TAUX_COMMISSION.sante_facteur_mensuel} (taux santé) = CHF ${montant}` };
  }

  // ── Vie / 3a ────────────────────────────────────────────────────────────
  if (produitId === 'vie_3a') {
    const duree = parseFloat(document.getElementById('ct-duree')?.value) || 1;
    const capitalProduction = primeMensuelle * 12 * duree;
    const montant = Math.round(capitalProduction * (TAUX_COMMISSION.vie_taux_capital / 100));
    return { montant, detail: `${TAUX_COMMISSION.vie_taux_capital}% × CHF ${capitalProduction.toLocaleString()} (capital = ${primeMensuelle} × 12 × ${duree} ans) = CHF ${montant}` };
  }

  // ── LPP (prévoyance professionnelle 2e pilier) ─────────────────────────
  // Formule COG Swiss Life : prime annuelle × FP 1.20 × taux 6.3%
  // Source : Annexe B convention SL1102, valable dès 01.01.2024
  if (produitId === 'lpp_entreprise') {
    if (primeAnnuelle < 2000) {
      return { montant: 0, detail: `Prime annuelle CHF ${primeAnnuelle} < CHF 2\'000 minimum — aucune COG Swiss Life` };
    }
    const cogAnnuelle = Math.round(primeAnnuelle * TAUX_COMMISSION.lpp_fp * (TAUX_COMMISSION.lpp_taux / 100));
    const cogTrimestrielle = Math.round(cogAnnuelle / 4);
    return {
      montant: cogAnnuelle,
      detail: `COG Swiss Life : CHF ${primeAnnuelle} × ${TAUX_COMMISSION.lpp_fp} (FP) × ${TAUX_COMMISSION.lpp_taux}% = CHF ${cogAnnuelle}/an (CHF ${cogTrimestrielle}/trimestre, versée en mars/juin/sept/déc)`,
    };
  }

  // ── LAMal — forfait unique CHF 70.- à la signature ─────────────────────
  if (produitId === 'lamal' || (produitId && produitId.toLowerCase().includes('lamal'))) {
    return {
      montant: TAUX_COMMISSION.lamal_forfait,
      detail: `LAMal : forfait unique CHF ${TAUX_COMMISSION.lamal_forfait} à la signature`,
    };
  }
  const montant = parseFloat(document.getElementById('ct-manuel')?.value) || 0;
  return { montant, detail: montant > 0 ? 'Saisie manuelle' : 'Saisis le montant estimé ci-dessous' };
}

function updateCommissionPreview() {
  const produit = getProduitSelectionne();
  const produitId = produit ? produit.id : null;
  if (!produitId) return;
  document.getElementById('ct-duree-field').style.display = produitId === 'vie_3a' ? 'block' : 'none';
  document.getElementById('ct-manuel-field').style.display = (produitId !== 'sante_complementaire' && produitId !== 'vie_3a') ? 'block' : 'none';
  const { montant, detail } = calculerCommissionEstimee();
  document.getElementById('commission-preview-value').textContent = 'CHF ' + montant.toLocaleString();
  document.getElementById('commission-preview-detail').textContent = detail;
}

function getProduitLabel(categorie, produitId) {
  const produits = CATALOGUE_PRODUITS[categorie] || [];
  const produit = produits.find(p => p.id === produitId);
  return produit ? produit.label : produitId;
}

async function creerContratEtCommission(clientId, compagnie, produitLabel, primeMensuelle, modules, montantCommission, detailCommission, plaques, dejaAnnuelle) {
  const commissionne = document.getElementById('ct-commissionne').value !== 'non';
  const contratBody = {
    client_id: clientId,
    apporteur_id: document.getElementById('ct-apporteur').value || null,
    compagnie,
    produit: produitLabel,
    modules: modules && modules.length > 0 ? modules.join(', ') : null,
    plaques: plaques && plaques.length > 0 ? plaques.join(', ') : null,
    numero_police: document.getElementById('ct-police').value.trim() || null,
    prime_annuelle: dejaAnnuelle ? Math.round(primeMensuelle) : Math.round(primeMensuelle * (parseInt(document.getElementById('ct-periodicite')?.value) || 12)),
    date_debut: document.getElementById('ct-date').value || null,
    date_echeance: document.getElementById('ct-echeance').value || null,
    statut: document.getElementById('ct-statut').value,
    commissionne,
  };
  const rContrat = await dbPost('contrats', contratBody);
  if (rContrat && rContrat.error) return { error: true, detail: rContrat.detail || rContrat.status };
  logAction('create_contrat', 'contrats', rContrat && rContrat[0] ? rContrat[0].id : null, `${produitLabel} — ${compagnie}`);

  const client = allClients.find(c => c.id === clientId);

  // Contrat non commissionné OU créé directement en "Annulé" : pas de commission générée
  if (!commissionne || contratBody.statut === 'annulé') {
    if (!commissionne && contratBody.date_echeance) {
      const dEch = new Date(contratBody.date_echeance);
      dEch.setMonth(dEch.getMonth() - 6);
      const nomClient = client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '';
      await dbPost('rappels', {
        titre: `Reprendre "${produitLabel}" de ${nomClient} (actuellement ${compagnie}, non partenaire)`,
        client_id: clientId,
        type: 'Contrat',
        urgence: 'moyenne',
        date_echeance: dEch.toISOString().split('T')[0],
        notes: `Police actuellement chez ${compagnie} (compagnie non partenaire) — échéance le ${contratBody.date_echeance}. Objectif : proposer un transfert vers une compagnie partenaire pour générer une commission.`,
        statut: 'ouvert',
      });
      allRappels = await dbGet('rappels', 'select=*');
    }
    return { error: false, contrat: rContrat && rContrat[0] ? rContrat[0] : null };
  }
  const commissionBody = {
    client_id: clientId,
    client_nom: client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '',
    compagnie,
    produit: produitLabel,
    montant_estime: montantCommission,
    detail_calcul: detailCommission,
    statut: 'en_attente',
    date_creation: new Date().toISOString().split('T')[0],
    contrat_id: rContrat && rContrat[0] ? rContrat[0].id : null,
  };
  const rComm = await dbPost('commissions_attente', commissionBody);
  return { error: false, commissionError: rComm && rComm.error, contrat: rContrat && rContrat[0] ? rContrat[0] : null };
}

async function saveContrat() {
  const clientSelectEl = document.getElementById('ct-client');
  const clientId = clientSelectEl ? clientSelectEl.value : contratClientId;
  if (!clientId) { showError('Sélectionne un client.'); return; }

  const compagnie = document.getElementById('ct-compagnie').value.trim();
  const produitSelectionne = getProduitSelectionne();
  const primeMensuelle = parseFloat(document.getElementById('ct-prime-mensuelle').value) || 0;
  if (!compagnie || !primeMensuelle) { showError('Compagnie et prime sont obligatoires.'); return; }
  if (!produitSelectionne) { showError('Sélectionne un produit valide dans la liste proposée.'); return; }

  // Vérifier que les produits combinés cochés ont bien une prime renseignée
  const combinablesCoches = Array.from(document.querySelectorAll('.ct-combinable-checkbox:checked')).map(cb => cb.value);
  for (const id of combinablesCoches) {
    const input = document.querySelector(`.ct-combinable-prime-input[data-produit-id="${id}"]`);
    if (!input || !parseFloat(input.value)) { showError('Renseigne la prime annuelle pour chaque produit combiné coché.'); return; }
  }

  const produitLabel = produitSelectionne.label;
  const modulesChoisis = Array.from(document.querySelectorAll('.ct-module-checkbox:checked')).map(cb => cb.value);
  const { montant: commissionEstimee, detail } = calculerCommissionEstimee();

  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;

  const plaquesValeurs = Array.from(document.querySelectorAll('.ct-plaque-input')).map(inp => inp.value.trim()).filter(Boolean);
  const resultPrincipal = await creerContratEtCommission(clientId, compagnie, produitLabel, primeMensuelle, modulesChoisis, commissionEstimee, detail, plaquesValeurs);
  if (resultPrincipal.error) { showError('Erreur lors de la création du contrat: ' + resultPrincipal.detail); btn.textContent = '✓ Enregistrer le contrat'; btn.disabled = false; return; }

  memoriserCompagnie(compagnie);

  // Créer un contrat + commission distincts pour chaque produit combiné coché
  for (const id of combinablesCoches) {
    const produitCombinable = getProduitParId(id);
    const input = document.querySelector(`.ct-combinable-prime-input[data-produit-id="${id}"]`);
    const primeCombinableAnnuelle = parseFloat(input.value) || 0;
    const montantCombinable = Math.round(primeCombinableAnnuelle * 0.1); // estimation par défaut (10% fictif) — ajustable manuellement ensuite
    await creerContratEtCommission(clientId, compagnie, produitCombinable.label, primeCombinableAnnuelle, [], montantCombinable, 'Produit combiné — commission estimée à ajuster', null, true);
  }

  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  allContrats = await dbGet('contrats', 'select=*');

  // Si ce contrat provient d'une opportunité passée en "Gagné", on la lie au contrat créé
  if (prefillOpportunite && prefillOpportunite.id && resultPrincipal.contrat && resultPrincipal.contrat.id) {
    await dbPatch('opportunites', prefillOpportunite.id, { contrat_id: resultPrincipal.contrat.id });
    allOpportunites = await dbGet('opportunites', 'select=*');
    prefillOpportunite = null;
  }

  if (contratClientId) {
    showClient(contratClientId);
  } else {
    navigate('suivi');
  }
}

async function deleteCommission(commId) {
  const c = allCommissionsAttente.find(x => x.id === commId);
  const label = c ? `${c.client_nom} — ${c.produit}` : commId;
  if (!confirm(`Supprimer définitivement cette commission ?\n${label}\n\nCette action est irréversible.`)) return;
  const token = await getValidAccessToken() || SUPABASE_KEY;
  const r = await fetch(`${SUPABASE_URL}/rest/v1/commissions_attente?id=eq.${commId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
  });
  if (!r.ok) { showError('Erreur lors de la suppression.'); return; }
  logAction('delete_commission', 'commissions_attente', commId, label);
  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  document.getElementById('modal-edit-commission')?.remove();
  // Rerendre sans réinitialiser les filtres
  renderToutesCommissions();
}

async function saveEditCommission(commId) {
  const original = allCommissionsAttente.find(x => x.id === commId);
  const etaitDejaExtourne = original && original.statut === 'extourné';
  const nouveauStatut = document.getElementById('ec-statut').value;
  const montantFinalVal = document.getElementById('ec-montant-final').value;

  // ── Correction / retour en arrière ────────────────────────────────────────
  // Si on repasse une commission liée à un bordereau (reçue, versé, extournée...)
  // vers "En attente", c'est qu'une erreur de rapprochement doit être corrigée.
  // Le système défait alors AUTOMATIQUEMENT tout ce qui avait été fait lors du
  // rapprochement, pour ne jamais laisser de données à moitié cohérentes.
  const statutsLiesAUnBordereau = ['reçue', 'versé_oz', 'versé_cofidex', 'extourné'];
  const estUnRetourEnArriere = original && statutsLiesAUnBordereau.includes(original.statut) && nouveauStatut === 'en_attente';

  const body = {
    client_nom: document.getElementById('ec-client').value.trim(),
    compagnie: document.getElementById('ec-compagnie').value.trim(),
    produit: document.getElementById('ec-produit').value.trim(),
    montant_estime: Number(document.getElementById('ec-montant-estime').value) || 0,
    montant_final: estUnRetourEnArriere ? null : (montantFinalVal === '' ? null : Number(montantFinalVal)),
    bordereau_id: estUnRetourEnArriere ? null : (original ? original.bordereau_id : null),
    date_reception: estUnRetourEnArriere ? null : (document.getElementById('ec-date-reception').value || null),
    numero_police: document.getElementById('ec-police').value.trim() || null,
    statut: nouveauStatut,
    detail_calcul: estUnRetourEnArriere
      ? `Rapprochement annulé le ${fmtDate(new Date().toISOString())} — remise en attente pour correction (était : ${statutCommissionLabel(original.statut)}, ${original.bordereau_id ? 'lié à un bordereau' : 'sans bordereau'})`
      : (document.getElementById('ec-detail').value.trim() || null),
  };
  const btn = document.querySelector('#modal-edit-commission .btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }
  const r = await dbPatch('commissions_attente', commId, body);
  if (r && r.error) { showError('Erreur: ' + errMsg(r)); if (btn) { btn.textContent = '✓ Enregistrer'; btn.disabled = false; } return; }
  logAction(estUnRetourEnArriere ? 'annuler_rapprochement_commission' : 'edit_commission', 'commissions_attente', commId, body.client_nom);

  if (estUnRetourEnArriere) {
    showError(`↺ Rapprochement annulé pour ${body.client_nom} — la commission est de nouveau "En attente", déliée du bordereau, prête à être re-rapprochée correctement.`);
  }

  // ── Passage vers "Extourné" : générer automatiquement la commission NÉGATIVE ──
  // correspondante, en attente de rapprochement (débit) sur un futur bordereau de
  // la même compagnie — exactement comme une commission normale, mais en négatif.
  if (body.statut === 'extourné' && !etaitDejaExtourne) {
    const montantOriginal = Math.abs(body.montant_final != null ? body.montant_final : (body.montant_estime || 0));
    if (montantOriginal > 0) {
      await dbPost('commissions_attente', {
        client_id: original ? original.client_id : null,
        contrat_id: original ? original.contrat_id : null,
        client_nom: body.client_nom,
        compagnie: body.compagnie,
        produit: body.produit,
        montant_estime: -montantOriginal,
        detail_calcul: `↩ Reprise automatique suite à l'extourne de la commission d'origine (CHF ${montantOriginal.toLocaleString()}). À rapprocher avec la ligne de débit correspondante sur le prochain bordereau ${body.compagnie}.`,
        statut: 'en_attente',
        date_creation: new Date().toISOString().split('T')[0],
      });
      showError(`✓ Commission extournée. Une commission de CHF -${montantOriginal.toLocaleString()} a été créée en attente pour ${body.compagnie} — rapproche-la avec "+ Rapprocher une commission" quand le bordereau de reprise arrive.`);
    }
  }

  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  document.getElementById('modal-edit-commission').remove();
  // Rerendre sans réinitialiser les filtres — les sélections restent actives
  renderToutesCommissions();
}

function renderToutesCommissions() {
  const search = (document.getElementById('tc-search')?.value || '').toLowerCase().trim();
  const statutFilter = document.getElementById('tc-statut')?.value || '';
  const tri = document.getElementById('tc-tri')?.value || 'montant_desc';

  function numeroBordereauDe(c) {
    if (!c.bordereau_id) return '';
    const b = allBordereaux.find(bd => bd.id === c.bordereau_id);
    return b ? (b.numero || '') : '';
  }
  function montantC(c) { return c.montant_final != null ? c.montant_final : (c.montant_estime || 0); }

  const filtered = allCommissionsAttente.filter(c => {
    // Cette page ne montre QUE les données Assurex — le passé OZ Assure a sa propre page dédiée
    if (c.statut === 'versé_oz') return false;
    // Exclure les commissions liées à un contrat marqué "non commissionné" ou "annulé"
    // (un contrat annulé n'a jamais réellement pris effet — aucune commission n'a de sens ici,
    // à la différence d'"extourné" qui représente un contrat policé puis repris)
    if (c.contrat_id) {
      const ct = allContrats.find(x => x.id === c.contrat_id);
      if (ct && (ct.commissionne === false || ct.statut === 'annulé')) return false;
    }
    if (statutFilter && c.statut !== statutFilter) return false;
    if (search) {
      const haystack = `${c.client_nom||''} ${c.compagnie||''} ${c.produit||''} ${numeroBordereauDe(c)}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (tri === 'montant_desc') return montantC(b) - montantC(a);
    return new Date(b.date_creation||0) - new Date(a.date_creation||0);
  });

  const totalAttente = filtered.filter(c => c.statut === 'en_attente').reduce((s,c) => s + montantC(c), 0);
  const totalRecuBrut = filtered.filter(c => c.statut === 'reçue').reduce((s,c) => s + montantC(c), 0);
  const totalExtourne = filtered.filter(c => c.statut === 'extourné').reduce((s,c) => s + montantC(c), 0);
  const totalRecuNet = totalRecuBrut - totalExtourne;

  document.getElementById('tc-stats').innerHTML = `
    ${statCard('En attente', 'CHF ' + totalAttente.toLocaleString(), '#f59e0b')}
    ${statCard('Reçues (brut)', 'CHF ' + totalRecuBrut.toLocaleString(), '#4ade80')}
    ${statCard('Extournées', '– CHF ' + totalExtourne.toLocaleString(), '#f87171', 'contrat policé puis annulé')}
    ${statCard('Net Assurex encaissé', 'CHF ' + totalRecuNet.toLocaleString(), '#38bdf8')}
    ${statCard('Total dossiers', filtered.length, '#a78bfa')}`;

  const cols = '1fr 120px 110px 110px 100px 90px';
  const rows = filtered.map(c => {
    const numBord = numeroBordereauDe(c);
    return `<div class="table-row" style="grid-template-columns:${cols};cursor:pointer" onclick="showModalEditCommission('${c.id}')">
      <div><div style="font-size:13px;font-weight:700;color:var(--text)">${c.client_id ? `<span onclick="event.stopPropagation(); showClient('${c.client_id}')" style="cursor:pointer;color:var(--accent);text-decoration:underline dotted">${c.client_nom || '—'}</span>` : (c.client_nom || '—')}${getClientMiniLogos(allClients.find(x => x.id === c.client_id))}</div><div style="font-size:11px;color:var(--text-muted)">${c.produit || ''}</div>${c.detail_calcul ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px;font-style:italic">${c.detail_calcul.split('[')[0].trim()}</div>` : `<div style="font-size:10px;color:#f59e0b;margin-top:2px">⚠ Détail du calcul manquant — clique pour préciser</div>`}</div>
      <div style="font-size:12px;color:var(--text-muted)">${c.compagnie || ''}</div>
      <div style="font-size:11px;color:var(--text-muted)">${numBord ? `<span style="font-family:monospace">${numBord}</span>` : '—'}</div>
      <div style="font-size:12px;color:var(--text-muted)">${c.date_creation || ''}</div>
      <div style="font-weight:800;color:#f59e0b;text-align:right">CHF ${montantC(c).toLocaleString()}</div>
      <div>${badge(statutCommissionLabel(c.statut), statutCommissionColor(c.statut))}</div>
    </div>`;
  }).join('');

  document.getElementById('tc-table').innerHTML = `
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}"><div>Client / Produit</div><div>Compagnie</div><div>N° bordereau</div><div>Créée le</div><div>Montant</div><div>Statut</div></div>
      ${rows || '<div class="table-empty">Aucune commission ne correspond à ces filtres.</div>'}
    </div>`;
}

function viewAgenda() {

  if (!isConnected) {

        <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px;max-width:380px;margin-left:auto;margin-right:auto">
          Connecte ton compte Outlook pour afficher tes rendez-vous et synchroniser tes rappels.
        </div>
        <button class="btn-add" onclick="loginMicrosoft()">
          <svg width="14" height="14" viewBox="0 0 21 21" style="vertical-align:-2px;margin-right:6px"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
          Connecter Outlook
        </button>
      </div>`;
  }

  if (calendarEvents.length === 0) {
    refreshAgenda();
    return `
      <h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Agenda</h2>
      <div class="loader">Chargement des événements Outlook...</div>`;
  }

  const grouped = {};
  calendarEvents.forEach(ev => {
    const d = new Date(ev.start.dateTime).toLocaleDateString('fr-CH', { weekday: 'long', day: 'numeric', month: 'long' });
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(ev);
  });

  const days = Object.keys(grouped).map(day => {
    const events = grouped[day].map(ev => {
      const start = new Date(ev.start.dateTime).toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
      const end = new Date(ev.end.dateTime).toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
      return `<div style="display:flex;gap:14px;padding:11px 18px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--accent);font-weight:700;min-width:90px">${start} - ${end}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${ev.subject || 'Sans titre'}</div>
          ${ev.location && ev.location.displayName ? `<div style="font-size:11px;color:var(--text-muted)">${ev.location.displayName}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${day}</div>
      <div class="table-wrap">${events}</div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Agenda — ${currentUser.email}</h2>
      <button class="btn-secondary" onclick="refreshAgenda()">↻ Actualiser</button>
    </div>
    ${days || '<div class="table-empty">Aucun événement à venir.</div>'}`;
}

// ═══ RECENSEMENT FINMA OFFICIEL (OZ Assure) — basé sur le vrai formulaire FINMA ═══
// Catégories exactes du chapitre 3.2/3.5 du recensement annuel FINMA (art. 190b OS)
// Important : Assurance Maladie (Lamal) est EXCLUE du recensement (hors périmètre LSA)
function classifyFinmaCategorie(produit) {
  const p = (produit || '').toLowerCase();
  if (p.includes('lamal')) return 'exclu_lamal';
  if (p.includes('complémentaire') && p.includes('maladie')) return 'maladie_complementaire';
  if ((p.includes('vie') && (p.includes('3a') || p.includes('3b')))) return 'vie_3a_3b';
  if (p.includes('vie')) return 'autres_vie_lsa';
  if (p.includes('laa') || p.includes('ijm') || p.includes('perte de gain')) return 'ijm_laac';
  return 'autres_lsa';
}

function isClientCommercialHeuristic(nom, titre) {
  if (titre && /madame|monsieur|mme|m\./i.test(titre)) return false;
  if (!nom) return false;
  return /\b(sa|sàrl|gmbh|ag|sc|sci|holding)\b\.?$/i.test(nom.trim()) || !titre;
}

  const annee = new Date().getFullYear() - 1; // exercice = année précédente, comme le vrai recensement

  // ── 3.2 / 3.3 : polices et clients (privés vs commerciaux), hors LAMal ──
  const clientsSegment = {}; // nom -> 'prive'|'commercial'
  (contrats || []).forEach(c => {
    if (!clientsSegment[c.client_nom]) {
      clientsSegment[c.client_nom] = isClientCommercialHeuristic(c.client_nom, c.titre_client) ? 'commercial' : 'prive';
    }
  });
  const nbClientsPrive = Object.values(clientsSegment).filter(s => s === 'prive').length;
  const nbClientsCommercial = Object.values(clientsSegment).filter(s => s === 'commercial').length;

  const policesPrive = { maladie_complementaire: 0, vie_3a_3b: 0, autres_vie_lsa: 0, autres_lsa: 0 };
  const policesCommercial = { ijm_laac: 0, autres_lsa: 0 };
  (contrats || []).forEach(c => {

async function viewOzAssure() {
  if (!currentUser || currentUser.role !== 'signataire') {
    return `<div class="table-empty">Accès réservé.</div>`;
  }
  const [commRows, contratRows] = await Promise.all([
    dbGet('commissions_oz', 'select=*&order=date_mouvement.asc'),
    dbGet('contrats_oz', 'select=*&order=client_nom.asc'),
  ]);
  const data = commRows || [];
  const contrats = contratRows || [];

  function chf(v) { return 'CHF ' + Math.round(v).toLocaleString('fr-CH'); }
  function dch(v) { return v ? new Date(v).toLocaleDateString('fr-CH') : '—'; }
  const PALETTE = ['#38bdf8','#f59e0b','#a78bfa','#4ade80','#f87171','#fb923c','#22d3ee','#e879f9','#64748b'];
  const today = new Date();

  // ── Commissions ──
  const parAnnee = {};
  const parCompagnie = {};
  const parMois = {};
  const parClientComm = {};
  const parProduitComm = {};
  let totalVieComm = 0, totalNonVieComm = 0;
  let totalDebit = 0, totalCredit = 0;

  data.forEach(r => {
    const date = r.date_mouvement || '';
    const annee = date.slice(0, 4);
    const mois = date.slice(0, 7);
    const net = Number(r.credit || 0) - Number(r.debit || 0);
    parAnnee[annee] = (parAnnee[annee] || 0) + net;
    parCompagnie[r.compagnie] = (parCompagnie[r.compagnie] || 0) + net;
    parMois[mois] = (parMois[mois] || 0) + net;
    if (r.client_nom && r.client_nom !== '-') parClientComm[r.client_nom] = (parClientComm[r.client_nom] || 0) + net;
    const catLabel = (r.produit || 'Autre').trim();
    parProduitComm[catLabel] = (parProduitComm[catLabel] || 0) + net;
    const isVie = PRODUITS_VIE_KEYWORDS.some(kw => (r.produit||'').toLowerCase().includes(kw));
    if (isVie) totalVieComm += net; else totalNonVieComm += net;
    totalDebit += Number(r.debit || 0);
    totalCredit += Number(r.credit || 0);
  });

  const totalNet = totalCredit - totalDebit;
  const annees = Object.keys(parAnnee).sort();
  const compagnies = Object.entries(parCompagnie).sort((a,b) => b[1]-a[1]);
  const produitsComm = Object.entries(parProduitComm).sort((a,b) => b[1]-a[1]);
  const mois = Object.keys(parMois).sort();
  const nbClientsComm = Object.keys(parClientComm).length;
  const moyenneMensuelle = mois.length ? totalNet / mois.length : 0;

  // ── Contrats / Volume de primes ──
  const contratsActifs = contrats.filter(c => !c.date_fin || new Date(c.date_fin) >= today);
  const volumeTotal = contrats.reduce((s,c) => s + Number(c.prime_annuelle||0), 0);
  const volumeActif = contratsActifs.reduce((s,c) => s + Number(c.prime_annuelle||0), 0);
  const sansPrimeAnnuelle = contrats.filter(c => Number(c.prime_annuelle||0) === 0 && Number(c.prime||0) > 0).length;

  // ── Segmentation du volume de primes par type de produit (actifs uniquement) ──
  const parProduitPrime = {};
  const parProduitPrimeVie = {}, parProduitPrimeNonVie = {};
  let volumeVie = 0, volumeNonVie = 0;
  contratsActifs.forEach(c => {
    const prime = Number(c.prime_annuelle||0);
    if (!prime) return;
    const catLabel = (c.produit || 'Autre').trim();
    parProduitPrime[catLabel] = (parProduitPrime[catLabel] || 0) + prime;
    const isVie = PRODUITS_VIE_KEYWORDS.some(kw => (c.produit||'').toLowerCase().includes(kw));
    if (isVie) { volumeVie += prime; parProduitPrimeVie[catLabel] = (parProduitPrimeVie[catLabel]||0) + prime; }
    else { volumeNonVie += prime; parProduitPrimeNonVie[catLabel] = (parProduitPrimeNonVie[catLabel]||0) + prime; }
  });
  const produitsPrime = Object.entries(parProduitPrime).sort((a,b) => b[1]-a[1]);
  const maxProduitPrime = produitsPrime.length ? produitsPrime[0][1] : 1;

  function ozDetailHtml(obj, segTotal, color) {
    const items = Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0, 5);
    if (!items.length) return '';
    return `<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px">
      ${items.map(([label, val]) => `
        <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:5px">
          <div style="color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%">${label}</div>
          <div style="color:${color};font-weight:700;white-space:nowrap">${Math.round(val).toLocaleString('fr-CH')} CHF · ${segTotal>0?Math.round(val/segTotal*100):0}%</div>
        </div>`).join('')}
    </div>`;
  }

  // ── Données clients (agrégées depuis contrats_oz) ──
  const clientsMap = {};
  contrats.forEach(c => {
    const key = c.client_nom || '—';
    if (!clientsMap[key]) clientsMap[key] = {
      nom: key, titre: c.titre_client, npa: c.npa, naissance: c.date_naissance,
      tel: c.tel_mobile || c.tel_perso, nbContrats: 0, primeAnnuelle: 0,
    };
    clientsMap[key].nbContrats++;
    clientsMap[key].primeAnnuelle += Number(c.prime_annuelle||0);
  });
  const clientsList = Object.values(clientsMap).sort((a,b) => b.primeAnnuelle - a.primeAnnuelle);
  const topClientsComm = Object.entries(parClientComm).sort((a,b) => b[1]-a[1]).slice(0, 8);

  // ── Donut SVG : répartition par compagnie (commissions) ──

  const R = 70, C = 2 * Math.PI * R;
  const donutSegments = compagnies.map(([comp, val], i) => {
    const frac = val / totalCompagnies;
    const dash = frac * C;
    const offset = cumul * C;
    cumul += frac;
    return `<circle cx="90" cy="90" r="${R}" fill="none" stroke="${PALETTE[i % PALETTE.length]}" stroke-width="22"
      stroke-dasharray="${dash.toFixed(1)} ${(C-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 90 90)"/>`;
  }).join('');

  // ── Bar chart : évolution mensuelle ──
  const maxMois = Math.max(...mois.map(m => parMois[m]), 1);

      <div title="${chf(val)}" style="width:100%;max-width:22px;height:${h}px;background:linear-gradient(180deg,#38bdf8,#0ea5e9);border-radius:4px 4px 2px 2px;"></div>
      <div style="font-size:8.5px;color:var(--text-muted);margin-top:5px;white-space:nowrap">${moisLabels[mm]}<br>'${y.slice(2)}</div>
    </div>`;

    </div>

    <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:12px 16px;margin-bottom:24px;font-size:12.5px;color:var(--text)">

    <div class="stat-grid" style="margin-bottom:14px">

      </div>`).join('') || '<div class="table-empty">Aucune compagnie enregistrée.</div>'}

}

function showFormContactCompagnie(id) {
  const existant = id ? (window._contactsCompagnies || []).find(c => c.id === id) : null;
  const modal = document.createElement('div');
  modal.id = 'modal-contact-cie';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:440px">
      <h3 style="margin:0 0 20px;font-size:16px;font-weight:800;color:var(--text)">${existant ? 'Modifier' : 'Ajouter'} une compagnie</h3>
      <div class="form-grid">
        <div class="form-field" style="grid-column:span 2"><label class="form-label">Nom de la compagnie *</label><input class="form-input" id="cc-nom" value="${existant ? existant.compagnie : ''}"/></div>
        <div class="form-field" style="grid-column:span 2"><label class="form-label">Libellé contact (agence/courtier)</label><input class="form-input" id="cc-libelle" value="${existant ? (existant.libelle_contact||'') : ''}"/></div>
        <div class="form-field" style="grid-column:span 2"><label class="form-label">Email</label><input class="form-input" id="cc-email" type="email" value="${existant ? (existant.email||'') : ''}"/></div>
      </div>
      <div style="display:flex;gap:10px;margin-top:20px">
        <button class="btn-secondary" onclick="document.getElementById('modal-contact-cie').remove()">Annuler</button>
        <button class="btn-save" onclick="saveContactCompagnie(${existant ? `'${existant.id}'` : 'null'})">✓ Enregistrer</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveContactCompagnie(id) {
  const body = {
    compagnie: document.getElementById('cc-nom').value.trim(),
    libelle_contact: document.getElementById('cc-libelle').value.trim() || null,
    email: document.getElementById('cc-email').value.trim() || null,
  };
  if (!body.compagnie) { showError('Le nom de la compagnie est obligatoire.'); return; }
  if (id) await dbPatch('compagnies_contacts', id, body);
  else await dbPost('compagnies_contacts', body);
  allCompagniesContacts = await dbGet('compagnies_contacts', 'select=*&order=compagnie.asc');
  document.getElementById('modal-contact-cie').remove();
  navigate('contacts-compagnies');
}

async function viewAuditLog() {
  if (!currentUser || currentUser.role !== 'signataire') {
    return `<h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Journal d'audit</h2>
      <div class="table-empty">Accès réservé au signataire.</div>`;
  }
  const logs = await dbGet('audit_log', 'select=*&order=created_at.desc&limit=200');
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Journal d'audit</h2>
      <div style="font-size:12px;color:var(--text-muted)">200 dernières actions — traçabilité nLPD</div>
    </div>
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:140px 1fr 200px 160px"><div>Date/heure</div><div>Action</div><div>Détail</div><div>Utilisateur</div></div>
      ${(logs || []).map(l => `<div class="table-row" style="grid-template-columns:140px 1fr 200px 160px">
        <div style="font-size:11px;color:var(--text-muted)">${new Date(l.created_at).toLocaleString('fr-CH', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' })}</div>
        <div style="font-size:12.5px;font-weight:600;color:var(--text)">${ACTION_LABELS[l.action] || l.action}</div>
        <div style="font-size:12px;color:var(--text-muted)">${l.detail || ''}</div>
        <div style="font-size:12px;color:var(--text-muted)">${l.user_email}</div>
      </div>`).join('') || '<div class="table-empty">Aucune entrée pour le moment.</div>'}
    </div>`;
}

function viewAgents() {
  const agents = allAgents.length > 0 ? allAgents : [currentUser];
  return `
    <h2 style="margin:0 0 20px;font-size:18px;font-weight:800;color:var(--text)">Paramètres — Agents</h2>
    ${agents.map(a => {
      const color = agentColor(a);
      const nbClients = allClients.filter(c => c.apporteur_id === a.id).length;
      const ca = allClients.filter(c => c.apporteur_id === a.id).reduce((s,c)=>s+caClient(c.id),0);
      // Commissions GÉNÉRÉES = uniquement celles déjà incluses dans une fiche de paie
      // (l'argent qui entre via un bordereau n'est "attribué" à un agent qu'au moment
      // où une fiche de paie est effectivement créée — avant ça, c'est 0 par définition).
      const commissionsPayees = allCommissionsAttente.filter(cm => cm.fiche_paie_id);
      let commGeneree = 0;
      commissionsPayees.forEach(cm => {
        const montant = cm.montant_final != null ? cm.montant_final : (cm.montant_estime || 0);
        const s = splitMontantAgent(montant, cm.contrat_id);
        if (a.role === 'signataire') commGeneree += s.pJ;
        else if (s.agent && s.agent.id === a.id) commGeneree += s.pA;
      });
      const partAgent = commGeneree; // déjà la part exacte de l'agent (pJ ou pA selon son rôle)
      const isEditing = editingAgentId === a.id;
      return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
          ${avatar(a, 44)}
          <div>
            <div style="font-size:15px;font-weight:800;color:var(--text)">${a.prenom} ${a.nom}</div>
            <div style="font-size:12px;color:var(--text-muted)">${a.email} · ${a.tel || ''}</div>
          </div>
          ${currentUser.role === 'signataire' ? `<button class="btn-save" style="margin-left:auto" onclick="toggleEditAgent('${a.id}')">${isEditing ? 'Annuler' : 'Modifier'}</button>` : ''}
        </div>
        ${isEditing ? `<div style="background:var(--surface-alt);border-radius:10px;padding:16px;margin-bottom:14px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
            <div class="form-field"><label class="form-label">Prénom</label><input id="edit-prenom-${a.id}" class="form-input" value="${a.prenom || ''}"></div>
            <div class="form-field"><label class="form-label">Nom</label><input id="edit-nom-${a.id}" class="form-input" value="${a.nom || ''}"></div>
            <div class="form-field"><label class="form-label">Email</label><input id="edit-email-${a.id}" class="form-input" value="${a.email || ''}"></div>
            <div class="form-field"><label class="form-label">Téléphone</label><input id="edit-tel-${a.id}" class="form-input" value="${a.tel || ''}"></div>
            <div class="form-field"><label class="form-label">Taux commission (%)</label>
              <select id="edit-taux-select-${a.id}" class="form-input" onchange="toggleTauxLibre('${a.id}')">
                <option value="0" ${a.taux === 0 ? 'selected' : ''}>0%</option>
                <option value="50" ${a.taux === 50 ? 'selected' : ''}>50%</option>
                <option value="100" ${a.taux === 100 ? 'selected' : ''}>100%</option>
                <option value="autre" ${![0,50,100].includes(a.taux) ? 'selected' : ''}>Autre…</option>
              </select>
              <input id="edit-taux-${a.id}" type="number" class="form-input" value="${a.taux || ''}" placeholder="Saisir le taux exact" style="margin-top:6px;${[0,50,100].includes(a.taux) ? 'display:none' : ''}">
            </div>
            <div class="form-field"><label class="form-label">Rôle</label>
              <select id="edit-role-${a.id}" class="form-input">
                <option value="signataire" ${a.role === 'signataire' ? 'selected' : ''}>Signataire</option>
                <option value="apporteur" ${a.role === 'apporteur' ? 'selected' : ''}>Apporteur</option>
              </select>
            </div>
          </div>
          <button class="btn-save" onclick="saveAgent('${a.id}')">💾 Enregistrer</button>
        </div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px">
          ${[['Rôle', a.role], ['Taux commission', a.taux + '%'], ['Clients', nbClients]].map(([l,v]) =>
            `<div style="background:var(--surface-alt);border-radius:9px;padding:10px 14px">
              <div style="color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:4px">${l}</div>
              <div style="color:var(--text);font-size:13px;font-weight:700">${v}</div>
            </div>`).join('')}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);border-radius:9px;padding:10px 14px">
            <div style="color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:4px">CA géré</div>
            <div style="color:#38bdf8;font-size:14px;font-weight:800">CHF ${ca.toLocaleString()}</div>
          </div>
          <div style="background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.2);border-radius:9px;padding:10px 14px">
            <div style="color:var(--text-muted);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:4px">Commissions générées (via fiche de paie)</div>
            <div style="color:#4ade80;font-size:14px;font-weight:800">CHF ${Math.round(commGeneree).toLocaleString()}</div>
          </div>
        </div>
      </div>`;
    }).join('')}
    ${currentUser.role === 'signataire' ? `<button class="btn-save" style="margin-top:4px" onclick="navigate('nouveau-agent')">+ Ajouter un agent</button>` : ''}
    <div style="margin-top:20px">
      <button onclick="logout()" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">🚪 Se déconnecter</button>
    </div>`;
}

function toggleTauxLibre(id) {
  const select = document.getElementById(`edit-taux-select-${id}`);
  const input = document.getElementById(`edit-taux-${id}`);
  if (select.value === 'autre') {
    input.style.display = 'block';
    input.value = '';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = select.value;
  }
}

function printForm() {
  window.print();
}

function toggleEditAgent(id) {
  editingAgentId = editingAgentId === id ? null : id;
  navigate('agents');
}

async function saveAgent(id) {
  const body = {
    prenom: document.getElementById(`edit-prenom-${id}`).value.trim(),
    nom: document.getElementById(`edit-nom-${id}`).value.trim(),
    email: document.getElementById(`edit-email-${id}`).value.trim(),
    tel: document.getElementById(`edit-tel-${id}`).value.trim(),
    taux: Number(document.getElementById(`edit-taux-${id}`).value) || 0,
    role: document.getElementById(`edit-role-${id}`).value,
  };
  if (!body.prenom || !body.nom || !body.email) { showError('Prénom, nom et email sont obligatoires.'); return; }
  const r = await dbPatch('agents', id, body);
  if (r && r.error) { showError('Erreur lors de la mise à jour: ' + errMsg(r)); return; }
  allAgents = await dbGet('agents', 'select=*');
  editingAgentId = null;
  navigate('agents');
}

function viewNouvelAgent() {
  return `
    <button onclick="navigate('agents')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:5px">← Retour aux agents</button>
    <h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Nouvel agent</h2>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
        <div class="form-field"><label class="form-label">Prénom *</label><input id="new-prenom" class="form-input"></div>
        <div class="form-field"><label class="form-label">Nom *</label><input id="new-nom" class="form-input"></div>
        <div class="form-field"><label class="form-label">Email *</label><input id="new-email" class="form-input" placeholder="prenom@cofidex.ch"></div>
        <div class="form-field"><label class="form-label">Téléphone</label><input id="new-tel" class="form-input"></div>
        <div class="form-field"><label class="form-label">Taux commission (%)</label><input id="new-taux" type="number" class="form-input" value="50"></div>
        <div class="form-field"><label class="form-label">Rôle</label>
          <select id="new-role" class="form-input">
            <option value="apporteur">Apporteur</option>
            <option value="signataire">Signataire</option>
          </select>
        </div>
      </div>
      <button class="btn-save" onclick="createAgent()">💾 Créer l'agent</button>
    </div>`;
}

async function createAgent() {
  const body = {
    prenom: document.getElementById('new-prenom').value.trim(),
    nom: document.getElementById('new-nom').value.trim(),
    email: document.getElementById('new-email').value.trim(),
    tel: document.getElementById('new-tel').value.trim(),
    taux: Number(document.getElementById('new-taux').value) || 50,
    role: document.getElementById('new-role').value,
  };
  if (!body.prenom || !body.nom || !body.email) { showError('Prénom, nom et email sont obligatoires.'); return; }
  const r = await dbPost('agents', body);
  if (r && r.error) { showError('Erreur lors de la création: ' + errMsg(r)); return; }
  allAgents = await dbGet('agents', 'select=*');
  navigate('agents');
}
