<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Assurex</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Assurex CRM"/>
<meta name="theme-color" content="#0f172a"/>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #111827; color: #e2e8f0; min-height: 100vh; font-weight: 700; }
  :root {
    --bg: #111827; --surface: #1a2235; --surface-alt: #1f2a40;
    --surface-hover: #243050; --border: #2a3550;
    --accent: #38bdf8; --accent-dim: rgba(56,189,248,0.1); --accent-border: rgba(56,189,248,0.3);
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #334155;
    --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.1);
    --red: #f87171; --red-dim: rgba(248,113,113,0.1);
    --green: #4ade80; --green-dim: rgba(74,222,128,0.1);
    --purple: #a78bfa; --navy: #0f172a;
  }
  input, select, textarea, button { font-family: inherit; }
  .hidden { display: none !important; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.06) 0%, transparent 60%);
  }
  .login-box { width: 100%; max-width: 420px; padding: 0 24px; }
  .login-logo { text-align: center; margin-bottom: 36px; }
  .login-logo img.assurex-login-logo { width: 200px; filter: brightness(0) invert(1); margin-bottom: 8px; }
  .exgroupe-mention-bottom { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 18px; }
  .exgroupe-mention-bottom span { font-size: 9px; color: var(--text-dim); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .exgroupe-logo { width: 90px; height: auto; opacity: 0.6; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
  .login-card h2 { font-size: 17px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 24px; }
  .rex-banner { display: flex; flex-direction: column; align-items: center; margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.08); }
  .rex-mascotte { width: 64px; height: auto; margin-bottom: 6px; filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35)); }
  .rex-wordmark { width: 110px; height: auto; }
  .btn-microsoft {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1a1a1a; border: none; border-radius: 10px;
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px;
    transition: opacity 0.15s;
  }
  .btn-microsoft:hover { opacity: 0.9; }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
  .divider span { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .field-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.8px; text-transform: uppercase; }
  .field-input {
    width: 100%; background: var(--surface-alt); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none;
  }
  .field-input:focus { border-color: var(--accent-border); }
  .field-wrap { margin-bottom: 14px; }
  .pass-wrap { position: relative; }
  .pass-wrap .field-input { padding-right: 40px; }
  .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
  .btn-primary {
    width: 100%; background: var(--accent); color: var(--navy); border: none;
    border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 800; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .error-box { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--red); margin-bottom: 16px; font-weight: 600; }
  .demo-box { margin-top: 18px; background: var(--surface-alt); border-radius: 9px; padding: 12px 14px; border: 1px solid var(--border); }
  .demo-box .demo-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .demo-item { display: flex; justify-content: space-between; padding: 5px 0; cursor: pointer; border: none; background: none; width: 100%; }
  .demo-item:hover .demo-email { opacity: 0.8; }
  .demo-email { font-size: 11px; font-weight: 700; }
  .demo-pass { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .login-footer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--text-dim); }

  /* APP */
  #app { display: none; min-height: 100vh; flex-direction: row; }
  #app.active { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 215px; background: var(--navy); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 10px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-logo { padding: 2px 8px 22px; }
  .sidebar-logo img { width: 100%; max-width: 155px; filter: brightness(0) invert(1); }
  .sidebar-logo .cofidex { font-size: 9px; color: var(--text-muted); font-weight: 700; letter-spacing: 1.5px; margin-top: 4px; }
  .nav-section-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 10px; background: none; border: none; cursor: pointer;
    font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    text-align: left; color: var(--text-muted); transition: color 0.15s;
  }
  .nav-section-btn.active { color: var(--accent); }
  .nav-section-btn .arrow { margin-left: auto; font-size: 9px; }
  .nav-solo-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 10px 10px; background: none; border: none; cursor: pointer;
    font-weight: 800; font-size: 13.5px; text-align: left; color: var(--text);
    border-radius: 8px; margin-bottom: 14px; transition: all 0.1s;
  }
  .nav-solo-btn:hover { background: var(--surface); }
  .nav-solo-btn.active { background: var(--accent-dim); color: var(--accent); }
  .nav-solo-logo { padding: 12px 14px; }
  .nav-solo-logo.active { background: rgba(255,255,255,0.08); }
  .nav-solo-logo .oz-logo-svg { height: 16px; width: auto; display: block; }
  .nav-item {
    display: flex; align-items: center; width: 100%;
    padding: 7px 10px 7px 26px; background: none; border: none; cursor: pointer;
    font-size: 12.5px; font-weight: 700; text-align: left; color: var(--text-muted);
    border-radius: 7px; margin-bottom: 1px; transition: all 0.1s;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 700; }
  .nav-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); margin-right: 6px; }
  .sidebar-team { margin-top: auto; border-top: 1px solid var(--border); padding-top: 14px; }
  .team-title { font-size: 9px; font-weight: 700; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; padding-left: 8px; margin-bottom: 8px; }
  .team-member { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 7px; }
  .team-member.me { background: var(--accent-dim); }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: monospace; flex-shrink: 0; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: auto; }
  .btn-logout { margin-top: 12px; width: 100%; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; text-align: left; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* MAIN */
  .main { flex: 1; padding: 30px 34px; overflow-y: auto; }

  /* CARDS */
  .stat-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; flex: 1; min-width: 120px; }
  .stat-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 7px; }
  .stat-value { font-size: 22px; font-weight: 800; line-height: 1.1; }
  .stat-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { display: grid; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .table-row { display: grid; padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.1s; cursor: pointer; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface-hover); }
  .table-empty { padding: 24px 16px; color: var(--text-muted); font-size: 13px; text-align: center; }

  /* BADGE */
  .badge { border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; display: inline-block; }

  /* SECTION CARD */
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .section-card-header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
  .section-card-body { padding: 18px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-block { background: var(--surface-alt); border-radius: 9px; padding: 10px 14px; }
  .info-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .info-value { color: var(--text); font-size: 13px; font-weight: 600; }

  /* TABS */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .postit-note {
    position: relative; width: 150px; min-height: 130px; padding: 16px 12px 10px;
    box-shadow: 2px 4px 10px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;
    font-family: 'Comic Sans MS', 'Marker Felt', cursive, sans-serif;
    flex-shrink: 0; transition: transform 0.15s;
  }
  .postit-note:hover { transform: rotate(0deg) scale(1.04) !important; z-index: 5; box-shadow: 3px 6px 16px rgba(0,0,0,0.45); }
  .postit-note::before {
    content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 26px; height: 14px; background: rgba(255,255,255,0.55); border-radius: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .postit-text {
    width: 100%; height: 100px; background: transparent; border: none; resize: none;
    font-family: inherit; font-size: 13.5px; color: #3a3a1a; line-height: 1.4; outline: none;
  }
  .postit-close {
    position: absolute; top: 2px; right: 6px; background: none; border: none; cursor: pointer;
    font-size: 15px; color: rgba(0,0,0,0.35); font-weight: 700; line-height: 1; padding: 2px;
  }
  .postit-close:hover { color: rgba(0,0,0,0.7); }
  .postit-add {
    width: 60px; height: 130px; border: 2px dashed var(--border); background: none; border-radius: 6px;
    color: var(--text-muted); font-size: 13px; cursor: pointer; flex-shrink: 0;
  }
  .postit-add:hover { border-color: var(--accent); color: var(--accent); }
  .tab-btn { background: none; border: none; cursor: pointer; padding: 9px 14px; font-size: 12.5px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-btn.active { color: var(--accent); font-weight: 800; border-bottom-color: var(--accent); }

  /* FORM */
  .form-field { background: var(--surface-alt); border-radius: 9px; padding: 10px 14px; margin-bottom: 10px; }
  .form-label { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; font-family: inherit; font-weight: 700; }
  .form-select { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; font-family: inherit; font-weight: 700; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* KANBAN */
  .kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col { flex: 1; min-width: 170px; }
  .kanban-col-title { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .kanban-dot { width: 8px; height: 8px; border-radius: 50%; }
  .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .kanban-empty { font-size: 11px; color: var(--text-dim); padding: 10px 0; text-align: center; }

  /* RAPPEL */
  .rappel-item { display: flex; align-items: center; gap: 14px; padding: 13px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .urgence-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .btn-traite { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.3); border-radius: 7px; padding: 5px 12px; font-size: 11px; font-weight: 800; cursor: pointer; }

  /* BORDEREAU */
  .bordereau-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .bordereau-header { display: flex; align-items: center; gap: 16px; padding: 16px 18px; cursor: pointer; transition: background 0.1s; }
  .bordereau-header:hover { background: var(--surface-hover); }
  .bordereau-body { border-top: 1px solid var(--border); padding: 14px 18px; }

  /* NOUVEAU CLIENT */
  .btn-secondary { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); border-radius: 9px; padding: 10px 20px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save { background: var(--accent); color: var(--navy); border: none; border-radius: 9px; padding: 10px 24px; font-weight: 800; font-size: 13px; cursor: pointer; }
  .btn-save:hover { opacity: 0.9; }
  .btn-add { background: var(--accent); color: var(--navy); border: none; border-radius: 8px; padding: 8px 16px; font-weight: 800; font-size: 13px; cursor: pointer; }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; }
  .progress-fill { height: 100%; border-radius: 99px; }

  /* LOADING */
  .loader { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  /* PRINT */
  @media print {
    #login-screen { display: none !important; }
    .sidebar { display: none !important; }
    .btn-save, .btn-secondary, button[onclick*="print"], button[onclick*="navigate"] { display: none !important; }
    .main { padding: 0 !important; }
    body { background: white !important; color: black !important; }
    .print-header { display: block !important; }
    .section-card { border: 1px solid #ccc !important; background: white !important; }
    .section-card-header { background: #f5f5f5 !important; }
    .section-card-header span { color: #0284c7 !important; background: none !important; }
    .section-card-header div { background: #7dd3fc !important; }
    .info-block, .form-field { background: #fafafa !important; border: 1px solid #eee !important; }
    .info-value, .info-label, .form-label, .form-input, .stat-value, .stat-label { color: black !important; }
    h2 { color: black !important; }
    [style*="color:#38bdf8"], [style*="color: #38bdf8"] { color: #0284c7 !important; }
    .oz-screen-only { display: none !important; }
    .oz-print-report { display: block !important; color: black !important; }
    .fiche-commission-print { background: white !important; border: 1px solid #ccc !important; }
    .fiche-commission-print * { color: black !important; }
    .fiche-commission-print button { display: none !important; }
  }
  .oz-print-report { display: none; }
  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { width: 180px; }
    .main { padding: 20px 16px; }
    .stat-card { min-width: 100px; }
    .form-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .table-header { display: none !important; }
    .table-row { grid-template-columns: 1fr !important; gap: 4px !important; padding: 12px !important; }
    .table-row > div { white-space: normal !important; }
  }
</style>
</head>
