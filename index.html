<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Assurex</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Assurex CRM"/>
<meta name="theme-color" content="#0f172a"/>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #111827; color: #e2e8f0; min-height: 100vh; font-weight: 700; }
  :root {
    --bg: #111827; --surface: #1a2235; --surface-alt: #1f2a40;
    --surface-hover: #243050; --border: #2a3550;
    --accent: #38bdf8; --accent-dim: rgba(56,189,248,0.1); --accent-border: rgba(56,189,248,0.3);
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #334155;
    --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.1);
    --red: #f87171; --red-dim: rgba(248,113,113,0.1);
    --green: #4ade80; --green-dim: rgba(74,222,128,0.1);
    --purple: #a78bfa; --navy: #0f172a;
  }
  input, select, textarea, button { font-family: inherit; }
  .hidden { display: none !important; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.06) 0%, transparent 60%);
  }
  .login-box { width: 100%; max-width: 420px; padding: 0 24px; }
  .login-logo { text-align: center; margin-bottom: 36px; }
  .login-logo img { width: 200px; filter: brightness(0) invert(1); margin-bottom: 8px; }
  .login-logo .sub { font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .login-logo .subsub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
  .login-card h2 { font-size: 17px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 24px; }
  .btn-microsoft {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1a1a1a; border: none; border-radius: 10px;
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px;
    transition: opacity 0.15s;
  }
  .btn-microsoft:hover { opacity: 0.9; }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
  .divider span { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .field-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.8px; text-transform: uppercase; }
  .field-input {
    width: 100%; background: var(--surface-alt); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none;
  }
  .field-input:focus { border-color: var(--accent-border); }
  .field-wrap { margin-bottom: 14px; }
  .pass-wrap { position: relative; }
  .pass-wrap .field-input { padding-right: 40px; }
  .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
  .btn-primary {
    width: 100%; background: var(--accent); color: var(--navy); border: none;
    border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 800; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .error-box { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--red); margin-bottom: 16px; font-weight: 600; }
  .demo-box { margin-top: 18px; background: var(--surface-alt); border-radius: 9px; padding: 12px 14px; border: 1px solid var(--border); }
  .demo-box .demo-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .demo-item { display: flex; justify-content: space-between; padding: 5px 0; cursor: pointer; border: none; background: none; width: 100%; }
  .demo-item:hover .demo-email { opacity: 0.8; }
  .demo-email { font-size: 11px; font-weight: 700; }
  .demo-pass { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .login-footer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--text-dim); }

  /* APP */
  #app { display: none; min-height: 100vh; flex-direction: row; }
  #app.active { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 215px; background: var(--navy); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 10px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-logo { padding: 2px 8px 22px; }
  .sidebar-logo img { width: 100%; max-width: 155px; filter: brightness(0) invert(1); }
  .sidebar-logo .cofidex { font-size: 9px; color: var(--text-muted); font-weight: 700; letter-spacing: 1.5px; margin-top: 4px; }
  .nav-section-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 10px; background: none; border: none; cursor: pointer;
    font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    text-align: left; color: var(--text-muted); transition: color 0.15s;
  }
  .nav-section-btn.active { color: var(--accent); }
  .nav-section-btn .arrow { margin-left: auto; font-size: 9px; }
  .nav-item {
    display: flex; align-items: center; width: 100%;
    padding: 7px 10px 7px 26px; background: none; border: none; cursor: pointer;
    font-size: 12.5px; font-weight: 700; text-align: left; color: var(--text-muted);
    border-radius: 7px; margin-bottom: 1px; transition: all 0.1s;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 700; }
  .nav-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); margin-right: 6px; }
  .sidebar-team { margin-top: auto; border-top: 1px solid var(--border); padding-top: 14px; }
  .team-title { font-size: 9px; font-weight: 700; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; padding-left: 8px; margin-bottom: 8px; }
  .team-member { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 7px; }
  .team-member.me { background: var(--accent-dim); }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: monospace; flex-shrink: 0; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: auto; }
  .btn-logout { margin-top: 12px; width: 100%; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; text-align: left; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* MAIN */
  .main { flex: 1; padding: 30px 34px; overflow-y: auto; }

  /* CARDS */
  .stat-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; flex: 1; min-width: 120px; }
  .stat-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 7px; }
  .stat-value { font-size: 22px; font-weight: 800; line-height: 1.1; }
  .stat-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { display: grid; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .table-row { display: grid; padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.1s; cursor: pointer; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface-hover); }
  .table-empty { padding: 24px 16px; color: var(--text-muted); font-size: 13px; text-align: center; }

  /* BADGE */
  .badge { border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; display: inline-block; }

  /* SECTION CARD */
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .section-card-header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
  .section-card-body { padding: 18px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-block { background: var(--surface-alt); border-radius: 9px; padding: 10px 14px; }
  .info-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .info-value { color: var(--text); font-size: 13px; font-weight: 600; }

  /* TABS */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .tab-btn { background: none; border: none; cursor: pointer; padding: 9px 14px; font-size: 12.5px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-btn.active { color: var(--accent); font-weight: 800; border-bottom-color: var(--accent); }

  /* FORM */
  .form-field { background: var(--surface-alt); border-radius: 9px; padding: 10px 14px; margin-bottom: 10px; }
  .form-label { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; font-family: inherit; font-weight: 700; }
  .form-select { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; font-family: inherit; font-weight: 700; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* KANBAN */
  .kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col { flex: 1; min-width: 170px; }
  .kanban-col-title { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .kanban-dot { width: 8px; height: 8px; border-radius: 50%; }
  .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .kanban-empty { font-size: 11px; color: var(--text-dim); padding: 10px 0; text-align: center; }

  /* RAPPEL */
  .rappel-item { display: flex; align-items: center; gap: 14px; padding: 13px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .urgence-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .btn-traite { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.3); border-radius: 7px; padding: 5px 12px; font-size: 11px; font-weight: 800; cursor: pointer; }

  /* BORDEREAU */
  .bordereau-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .bordereau-header { display: flex; align-items: center; gap: 16px; padding: 16px 18px; cursor: pointer; transition: background 0.1s; }
  .bordereau-header:hover { background: var(--surface-hover); }
  .bordereau-body { border-top: 1px solid var(--border); padding: 14px 18px; }

  /* NOUVEAU CLIENT */
  .btn-secondary { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); border-radius: 9px; padding: 10px 20px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save { background: var(--accent); color: var(--navy); border: none; border-radius: 9px; padding: 10px 24px; font-weight: 800; font-size: 13px; cursor: pointer; }
  .btn-save:hover { opacity: 0.9; }
  .btn-add { background: var(--accent); color: var(--navy); border: none; border-radius: 8px; padding: 8px 16px; font-weight: 800; font-size: 13px; cursor: pointer; }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; }
  .progress-fill { height: 100%; border-radius: 99px; }

  /* LOADING */
  .loader { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  /* PRINT */
  @media print {
    #login-screen { display: none !important; }
    .sidebar { display: none !important; }
    .btn-save, .btn-secondary, button[onclick*="print"], button[onclick*="navigate"] { display: none !important; }
    .main { padding: 0 !important; }
    body { background: white !important; color: black !important; }
    .print-header { display: block !important; }
    .section-card { border: 1px solid #ccc !important; background: white !important; }
    .section-card-header { background: #f5f5f5 !important; }
    .section-card-header span { color: #0284c7 !important; background: none !important; }
    .section-card-header div { background: #7dd3fc !important; }
    .info-block, .form-field { background: #fafafa !important; border: 1px solid #eee !important; }
    .info-value, .info-label, .form-label, .form-input, .stat-value, .stat-label { color: black !important; }
    h2 { color: black !important; }
    [style*="color:#38bdf8"], [style*="color: #38bdf8"] { color: #0284c7 !important; }
  }
  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { width: 180px; }
    .main { padding: 20px 16px; }
    .stat-card { min-width: 100px; }
    .form-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

async function dbGet(table, params = '') {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    return await r.json();
  } catch(e) { return []; }
}

async function dbPost(table, body) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    const data = await r.json();

      console.error('Supabase error', r.status, data);
      return { error: true, status: r.status, detail: data };
    }
    return data;
  } catch(e) {
    console.error('Network error', e);
    return { error: true, detail: e.message };
  }
}

async function dbPatch(table, id, body) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch(e) {}
}

// ═══ MSAL ═══
async function initMSAL() {
  try {
    msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
    if (typeof msalInstance.initialize === 'function') {
      await msalInstance.initialize();
    }
  } catch(e) { msalInstance = null; }
}

async function loginMicrosoft() {
  try {
    if (!msalInstance) { await initMSAL(); }
    if (!msalInstance) { showError('Erreur initialisation Microsoft. Utilisez la connexion email.'); return; }
    const result = await msalInstance.loginPopup({ scopes: ['openid', 'profile', 'email', 'User.Read', 'Calendars.ReadWrite'] });
    msalAccessToken = result.accessToken;
    const email = result.account.username;
    const userData = PASSWORDS[email];
    if (userData) {
      const agents = await dbGet('agents', `email=eq.${email}&select=*`);
      const agent = agents && agents[0] ? agents[0] : { id: email, prenom: userData.prenom, nom: userData.nom, email, role: userData.role, taux: userData.taux };
      enterApp(agent);
    } else {
      showError('Compte non autorisé.');
    }
  } catch(e) { showError('Connexion Microsoft annulée.'); }
}

// ═══ MICROSOFT GRAPH — AGENDA ═══
async function fetchCalendarEvents() {
  if (!msalAccessToken) return [];
  try {
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const end = new Date(now.getFullYear(), now.getMonth() + 2, 0).toISOString();
    const url = `https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${start}&endDateTime=${end}&$orderby=start/dateTime&$top=50`;
    const r = await fetch(url, { headers: { Authorization: `Bearer ${msalAccessToken}` } });
    if (!r.ok) { console.error('Graph API error', r.status); return []; }
    const data = await r.json();
    return data.value || [];
  } catch(e) { console.error('Graph fetch error', e); return []; }
}

// ═══ MICROSOFT GRAPH — SYNC RAPPELS → OUTLOOK ═══
async function createOutlookEventFromRappel(rappel) {
  if (!msalAccessToken || !rappel.date_echeance) return null;
  try {
    const client = rappel.client_id ? allClients.find(c => c.id === rappel.client_id) : null;
    const clientLine = client ? `Client : ${client.prenom} ${client.nom}\n` : '';
    const body = {
      subject: `🔔 ${rappel.titre}`,
      isAllDay: true,
      start: { dateTime: rappel.date_echeance, timeZone: 'Europe/Zurich' },
      end: { dateTime: rappel.date_echeance, timeZone: 'Europe/Zurich' },
      body: { contentType: 'text', content: `${clientLine}Type : ${rappel.type || ''}\nUrgence : ${rappel.urgence || ''}\n\n${rappel.notes || ''}` },
    };
    const r = await fetch('https://graph.microsoft.com/v1.0/me/events', {
      method: 'POST',
      headers: { Authorization: `Bearer ${msalAccessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) { console.error('Graph create event error', r.status); return null; }
    const data = await r.json();
    return data.id || null;
  } catch(e) { console.error('Graph create event exception', e); return null; }
}

async function deleteOutlookEvent(eventId) {
  if (!msalAccessToken || !eventId) return;
  try {
    await fetch(`https://graph.microsoft.com/v1.0/me/events/${eventId}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${msalAccessToken}` },
    });
  } catch(e) { console.error('Graph delete event exception', e); }
}

function showError(msg) {
  const loginEl = document.getElementById('login-error');
  if (loginEl && !document.getElementById('app').classList.contains('active')) {
    loginEl.textContent = '⚠ ' + msg;
    loginEl.classList.remove('hidden');
    return;
  }
  let toast = document.getElementById('global-error-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-error-toast';
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#7f1d1d;border:1px solid #f87171;color:#fecaca;padding:14px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;max-width:380px;box-shadow:0 8px 24px rgba(0,0,0,0.4)';
    document.body.appendChild(toast);
  }
  toast.textContent = '⚠ ' + msg;
  toast.style.display = 'block';
  clearTimeout(window._errorToastTimeout);
  window._errorToastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 6000);
}

function renderSidebar() {
  // Nav
  let nav = '';
  SECTIONS.forEach(sec => {
    const isActive = sec.sub.some(s => s.id === currentView);
    nav += `<button class="nav-section-btn ${isActive ? 'active' : ''}" onclick="toggleSection('${sec.id}')">
      <span style="font-size:14px">${sec.icon}</span>${sec.label}
      <span class="arrow">${openSections[sec.id] ? '▲' : '▼'}</span>
    </button>`;
    if (openSections[sec.id]) {
      sec.sub.forEach(s => {
        const active = s.id === currentView;
        nav += `<button class="nav-item ${active ? 'active' : ''}" onclick="navigate('${s.id}')">
          ${active ? '<span class="nav-dot"></span>' : ''}${s.label}
        </button>`;
      });
    }
  });
  document.getElementById('nav').innerHTML = nav;

  // Team
  let team = '';
  const agents = allAgents.length > 0 ? allAgents : [currentUser];
  agents.forEach(a => {
    const isMe = a.email === currentUser.email;
    const color = agentColor(a);
    const initials = (a.prenom[0] + a.nom[0]).toUpperCase();
    team += `<div class="team-member ${isMe ? 'me' : ''}">
      <div class="avatar" style="width:24px;height:24px;font-size:8px;background:${color}18;border:1.5px solid ${color}44;color:${color}">${initials}</div>

      ${isMe ? '<div class="online-dot"></div>' : ''}

function toggleSection(id) {

    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="navigate('clients')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px">← Retour aux clients</button>
      <div style="display:flex;gap:10px">
        <button onclick="toggleEditClient()" style="background:${editingClient ? 'var(--red-dim)' : 'var(--surface)'};border:1px solid ${editingClient ? 'rgba(248,113,113,0.3)' : 'var(--border)'};border-radius:8px;padding:7px 16px;color:${editingClient ? 'var(--red)' : 'var(--text-muted)'};font-size:12px;font-weight:700;cursor:pointer">${editingClient ? '✕ Annuler' : '✏️ Modifier'}</button>
        <button onclick="window.print()" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 16px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer">🖨️ Imprimer la fiche</button>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div style="display:flex;gap:14px;align-items:center">
          ${headerIcon}
          <div>
            <h2 style="margin:0;font-size:20px;font-weight:900;color:var(--text)">${displayName}</h2>
            <div style="color:var(--text-muted);font-size:12px;margin-top:2px">${displaySub}</div>
            <div style="color:var(--text-muted);font-size:12px">${c.adresse || ''} ${c.npa || ''} ${c.ville || ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">${badge(c.segment || 'Privé', isEntreprise ? '#f59e0b' : '#38bdf8')} ${badge(c.statut || 'prospect', statutColor(c.statut))}</div>
      </div>
      <div class="stat-grid" style="margin-bottom:16px">
        ${statCard('Contrats', contrats.length, '#38bdf8')}
        ${statCard('Rappels ouverts', rappels.filter(r => r.statut === 'ouvert').length, rappels.filter(r => r.statut === 'ouvert').length > 0 ? '#f87171' : '#64748b')}
        ${statCard('CA annuel', c.ca ? 'CHF ' + Number(c.ca).toLocaleString() : '—', '#f59e0b')}
      </div>
      ${agent ? `<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface-alt);border-radius:10px">
        ${avatar(agent, 36)}
        <div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${agent.prenom} ${agent.nom}</div>
          <div style="font-size:11px;color:var(--text-muted)">${agent.role === 'signataire' ? 'Réseau Jonathan · 100%' : 'Apporteur · 50/50'}</div>
        </div>
        ${c.mobile ? `<a href="tel:${c.mobile}" style="margin-left:auto;background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">📞</a>` : ''}
        ${c.email ? `<a href="mailto:${c.email}" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">✉️</a>` : ''}
      </div>` : ''}
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'tab-identite')">Identité</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-prevoyance')">Prévoyance</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-contrats')">Contrats (${contrats.length})</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-rappels')">Rappels (${rappels.length})</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-notes')">Notes</button>
    </div>

    <div id="tab-identite">
      ${editingClient ? `
        ${sectionCard(isEntreprise ? 'Identification entreprise' : 'Coordonnées personnelles', isEntreprise ? '#f59e0b' : '#38bdf8', isEntreprise ? `<div class="form-grid">
          <div class="form-field"><label class="form-label">Raison sociale</label><input id="ec-nom" class="form-input" value="${c.nom || ''}"></div>
          <div class="form-field"><label class="form-label">Secteur d'activité</label><input id="ec-profession" class="form-input" value="${c.profession || ''}"></div>
          <div class="form-field"><label class="form-label">Contact principal</label><input id="ec-prenom" class="form-input" value="${c.prenom || ''}"></div>
          <div class="form-field"><label class="form-label">Nb collaborateurs</label><input id="ec-taux-activite" type="number" class="form-input" value="${c.taux_activite || ''}"></div>
          <div class="form-field"><label class="form-label">Chiffre d'affaires</label><input id="ec-revenu" type="number" class="form-input" value="${c.revenu || ''}"></div>
          <div class="form-field"><label class="form-label">N° AVS (LPP)</label><input id="ec-avs" class="form-input" value="${c.avs || ''}"></div>
        </div>` : `<div class="form-grid">
          <div class="form-field"><label class="form-label">Prénom</label><input id="ec-prenom" class="form-input" value="${c.prenom || ''}"></div>
          <div class="form-field"><label class="form-label">Nom</label><input id="ec-nom" class="form-input" value="${c.nom || ''}"></div>
          <div class="form-field"><label class="form-label">Date de naissance</label><input id="ec-date-naissance" type="date" class="form-input" value="${c.date_naissance || ''}"></div>
          <div class="form-field"><label class="form-label">Nationalité</label><input id="ec-nationalite" class="form-input" value="${c.nationalite || ''}"></div>
          <div class="form-field"><label class="form-label">État civil</label>
            <select id="ec-etat-civil" class="form-input">
              <option value="">—</option>
              ${['Célibataire','Marié','Divorcé','Divorcée','Veuf','Veuve','Pacsé','Pacsée'].map(s => `<option ${c.etat_civil === s ? 'selected' : ''}>${s}</option>`).join('')}
            </select>
          </div>
          <div class="form-field"><label class="form-label">Enfants</label><input id="ec-enfants" type="number" class="form-input" value="${c.enfants || 0}"></div>
          <div class="form-field"><label class="form-label">N° AVS</label><input id="ec-avs" class="form-input" value="${c.avs || ''}"></div>
          <div class="form-field"><label class="form-label">Langue</label>
            <select id="ec-langue" class="form-input">
              <option value="FR" ${c.langue === 'FR' ? 'selected' : ''}>Français</option>
              <option value="DE" ${c.langue === 'DE' ? 'selected' : ''}>Allemand</option>
              <option value="IT" ${c.langue === 'IT' ? 'selected' : ''}>Italien</option>
            </select>
          </div>
        </div>`)}
        ${sectionCard('Contact', '#f59e0b', `<div class="form-grid">
          <div class="form-field"><label class="form-label">Adresse</label><input id="ec-adresse" class="form-input" value="${c.adresse || ''}"></div>
          <div class="form-field"><label class="form-label">NPA</label><input id="ec-npa" class="form-input" value="${c.npa || ''}"></div>
          <div class="form-field"><label class="form-label">Ville</label><input id="ec-ville" class="form-input" value="${c.ville || ''}"></div>
          <div class="form-field"><label class="form-label">Canton</label><input id="ec-canton" class="form-input" value="${c.canton || ''}"></div>
          <div class="form-field"><label class="form-label">Email</label><input id="ec-email" class="form-input" value="${c.email || ''}"></div>
          <div class="form-field"><label class="form-label">Téléphone fixe</label><input id="ec-tel" class="form-input" value="${c.tel || ''}"></div>
          <div class="form-field"><label class="form-label">Mobile</label><input id="ec-mobile" class="form-input" value="${c.mobile || ''}"></div>
        </div>`)}
        ${sectionCard('Coordonnées bancaires', '#a78bfa', `<div class="form-grid">
          <div class="form-field"><label class="form-label">Banque</label><input id="ec-banque" class="form-input" value="${c.banque || ''}"></div>
          <div class="form-field"><label class="form-label">IBAN</label><input id="ec-iban" class="form-input" value="${c.iban || ''}"></div>
        </div>`)}
        ${!isEntreprise ? sectionCard('Situation professionnelle', '#4ade80', `<div class="form-grid">
          <div class="form-field"><label class="form-label">Profession</label><input id="ec-profession" class="form-input" value="${c.profession || ''}"></div>
          <div class="form-field"><label class="form-label">Employeur</label><input id="ec-employeur" class="form-input" value="${c.employeur || ''}"></div>
          <div class="form-field"><label class="form-label">Revenu annuel brut</label><input id="ec-revenu" type="number" class="form-input" value="${c.revenu || ''}"></div>

async function saveClientNote(clientId) {
  const textarea = document.getElementById('client-note-input');
  const nouvelleNote = textarea.value.trim();
  if (!nouvelleNote) { showError('Écris une note avant l\'enregistrement.'); return; }
  const client = allClients.find(c => c.id === clientId);
  const notesExistantes = client && client.notes ? client.notes + '\n\n' : '';
  const dateAujourdhui = new Date().toLocaleDateString('fr-CH');
  const noteAvecDate = `[${dateAujourdhui}] ${nouvelleNote}`;
  const notesCompletes = notesExistantes + noteAvecDate;

  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }

  const r = await dbPatch('clients', clientId, { notes: notesCompletes });
  if (r && r.error) { showError('Erreur lors de l\'enregistrement de la note: ' + (r.detail || r.status)); if (btn) { btn.textContent = 'Enregistrer'; btn.disabled = false; } return; }

  allClients = await dbGet('clients', 'select=*');
  await showClient(clientId);
  const notesBtn = document.querySelector('.tab-btn[onclick*="tab-notes"]');
  if (notesBtn) switchTab(notesBtn, 'tab-notes');
}

function toggleEditClient() {
  editingClient = !editingClient;

async function saveClientEdit(id, isEntreprise) {
  const body = isEntreprise ? {
    nom: document.getElementById('ec-nom').value.trim(),
    profession: document.getElementById('ec-profession').value.trim(),
    prenom: document.getElementById('ec-prenom').value.trim(),
    taux_activite: Number(document.getElementById('ec-taux-activite').value) || null,
    revenu: Number(document.getElementById('ec-revenu').value) || null,
    avs: document.getElementById('ec-avs').value.trim(),
  } : {
    prenom: document.getElementById('ec-prenom').value.trim(),
    nom: document.getElementById('ec-nom').value.trim(),
    date_naissance: document.getElementById('ec-date-naissance').value || null,
    nationalite: document.getElementById('ec-nationalite').value.trim(),
    etat_civil: document.getElementById('ec-etat-civil').value,
    enfants: Number(document.getElementById('ec-enfants').value) || 0,
    avs: document.getElementById('ec-avs').value.trim(),
    langue: document.getElementById('ec-langue').value,
  };

  // Champs communs (Contact, Bancaire, et Pro pour les particuliers)
  Object.assign(body, {
    adresse: document.getElementById('ec-adresse').value.trim(),
    npa: document.getElementById('ec-npa').value.trim(),
    ville: document.getElementById('ec-ville').value.trim(),
    canton: document.getElementById('ec-canton').value.trim(),
    email: document.getElementById('ec-email').value.trim(),
    tel: document.getElementById('ec-tel').value.trim(),
    mobile: document.getElementById('ec-mobile').value.trim(),
    banque: document.getElementById('ec-banque').value.trim(),
    iban: document.getElementById('ec-iban').value.trim(),
  });

  if (!isEntreprise) {
    const profEl = document.getElementById('ec-profession');
    const empEl = document.getElementById('ec-employeur');
    const revEl = document.getElementById('ec-revenu');
    const tauxEl = document.getElementById('ec-taux-activite');
    if (profEl) body.profession = profEl.value.trim();
    if (empEl) body.employeur = empEl.value.trim();
    if (revEl) body.revenu = Number(revEl.value) || null;
    if (tauxEl) body.taux_activite = Number(tauxEl.value) || null;
  }

  if (!body.prenom && !body.nom) { showError('Le nom est obligatoire.'); return; }

  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }

  const r = await dbPatch('clients', id, body);
  if (r && r.error) { showError('Erreur lors de la mise à jour: ' + (r.detail || r.status)); if (btn) { btn.textContent = '💾 Enregistrer les modifications'; btn.disabled = false; } return; }

  editingClient = false;
  allClients = await dbGet('clients', 'select=*');
  showClient(id);
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['tab-identite','tab-prevoyance','tab-contrats','tab-rappels','tab-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden', id !== tabId);
  });
}

async function traiterRappel(id) {
  const r = allRappels.find(x => x.id === id);
  if (r && r.outlook_event_id) {
    try { await deleteOutlookEvent(r.outlook_event_id); } catch(e) {}
    await dbPatch('rappels', id, { statut: 'traité', outlook_event_id: null });
    r.outlook_event_id = null;
  } else {
    await dbPatch('rappels', id, { statut: 'traité' });
  }
  if (r) r.statut = 'traité';
  navigate('rappels');
}

async function rouvrirRappel(id) {
  const r = allRappels.find(x => x.id === id);
  await dbPatch('rappels', id, { statut: 'ouvert' });
  if (r) r.statut = 'ouvert';
  if (r && r.date_echeance) {
    try {
      const eventId = await createOutlookEventFromRappel(r);
      if (eventId) {
        await dbPatch('rappels', id, { outlook_event_id: eventId });
        r.outlook_event_id = eventId;
      }
    } catch(e) {}
  }
  navigate('rappels');
}

function viewCommissions() {
  const COMMS = [];
  const totalBrut = COMMS.reduce((s,c)=>s+c.montant,0);

  const partA = COMMS.filter(c=>c.apporteur!=='jonathan').reduce((s,c)=>s+Math.round(c.montant*0.5),0);
  const cols = '1fr 130px 90px 100px 110px';
  const rows = COMMS.map(c => {
    const isJ = c.apporteur === 'jonathan';
    const pJ = isJ ? c.montant : Math.round(c.montant * 0.5);
    const pA = isJ ? 0 : Math.round(c.montant * 0.5);
    const agentObj = allAgents.find(a => a.prenom.toLowerCase() === c.apporteur || (a.role === 'signataire' && c.apporteur === 'jonathan'));
    return `<div class="table-row" style="grid-template-columns:${cols}">
      <div style="font-size:13px;font-weight:600;color:var(--text)">${c.client}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.contrat}</div>
      <div style="font-weight:800;color:var(--text)">CHF ${c.montant}</div>
      <div style="font-weight:800;color:#38bdf8">CHF ${pJ}</div>
      <div>${pA > 0 ? `<div style="display:flex;align-items:center;gap:6px">${agentObj ? avatar(agentObj, 18) : ''}<span style="font-weight:700;color:#f59e0b">CHF ${pA}</span></div>` : '<span style="color:var(--text-dim)">—</span>'}</div>
    </div>`;
  }).join('');
  return `

async function saveClient() {
  const prenom = document.getElementById('f-prenom').value.trim();
  const nom = document.getElementById('f-nom').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const adresse = document.getElementById('f-adresse').value.trim();
  const npa = document.getElementById('f-npa').value.trim();
  const missing = [];
  if (!prenom) missing.push('Prénom');
  if (!nom) missing.push('Nom');
  if (!email) missing.push('Email');
  if (!adresse) missing.push('Adresse');
  if (!npa) missing.push('NPA');
  if (missing.length > 0) { alert('Champs obligatoires manquants : ' + missing.join(', ')); return; }
  const body = {
    prenom, nom,
    date_naissance: document.getElementById('f-dob').value || null,
    nationalite: document.getElementById('f-nationalite').value || null,
    etat_civil: document.getElementById('f-etat').value || null,
    enfants: parseInt(document.getElementById('f-enfants').value) || 0,
    avs: document.getElementById('f-avs').value || null,
    langue: document.getElementById('f-langue').value,
    email: document.getElementById('f-email').value || null,
    mobile: document.getElementById('f-mobile').value || null,
    tel: document.getElementById('f-tel').value || null,
    adresse: document.getElementById('f-adresse').value || null,
    npa: document.getElementById('f-npa').value || null,
    ville: document.getElementById('f-ville').value || null,
    canton: document.getElementById('f-canton').value || null,
    banque: document.getElementById('f-banque').value || null,
    iban: document.getElementById('f-iban').value || null,
    profession: document.getElementById('f-profession').value || null,
    employeur: document.getElementById('f-employeur').value || null,
    revenu: parseInt(document.getElementById('f-revenu').value) || 0,
    taux_activite: parseInt(document.getElementById('f-taux').value) || 100,
    statut: document.getElementById('f-statut').value,
    segment: 'Privé',
    apporteur_id: document.getElementById('f-agent').value || null,
    notes: document.getElementById('f-notes').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const result = await dbPost('clients', body);
  if (result && !result.error) {
    allClients = await dbGet('clients', 'select=*');
    currentView = 'clients';
    renderSidebar();
    document.getElementById('main-content').innerHTML = viewClients();
  } else {
    btn.textContent = 'Erreur — réessayer';
    btn.disabled = false;
    const detail = result && result.detail ? JSON.stringify(result.detail) : 'connexion';
    alert('Erreur lors de l\'enregistrement (' + detail + '). Vérifiez les champs et réessayez.');
  }
}

async function saveEntreprise() {
  const nom = document.getElementById('e-nom').value.trim();
  const email = document.getElementById('e-email').value.trim();
  const adresse = document.getElementById('e-adresse').value.trim();
  const ville = document.getElementById('e-ville').value.trim();
  const missing = [];
  if (!nom) missing.push('Raison sociale');
  if (!email) missing.push('Email');
  if (!adresse) missing.push('Adresse');
  if (!ville) missing.push('NPA / Ville');
  if (missing.length > 0) { alert('Champs obligatoires manquants : ' + missing.join(', ')); return; }
  const contact = (document.getElementById('e-contact-prenom').value + ' ' + document.getElementById('e-contact-nom').value).trim();
  const body = {
    prenom: document.getElementById('e-contact-prenom').value || '',
    nom,
    email: document.getElementById('e-email').value || null,
    tel: document.getElementById('e-tel').value || null,
    adresse: document.getElementById('e-adresse').value || null,
    ville: document.getElementById('e-ville').value || null,
    avs: document.getElementById('e-avs').value || null,
    profession: document.getElementById('e-secteur').value || null,
    employeur: nom,
    revenu: parseInt(document.getElementById('e-ca').value) || 0,
    taux_activite: parseInt(document.getElementById('e-collaborateurs').value) || 0,
    statut: document.getElementById('e-statut').value,
    segment: 'Entreprise',
    apporteur_id: document.getElementById('e-agent').value || null,
    notes: document.getElementById('e-notes').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const result = await dbPost('clients', body);
  if (result && !result.error) {
    allClients = await dbGet('clients', 'select=*');
    currentView = 'clients';
    renderSidebar();
    document.getElementById('main-content').innerHTML = viewClients();
  } else {
    btn.textContent = 'Erreur — réessayer';
    btn.disabled = false;
    const detail = result && result.detail ? JSON.stringify(result.detail) : 'connexion';
    alert('Erreur lors de l\'enregistrement (' + detail + '). Vérifiez les champs et réessayez.');
  }
}

async function saveRappel() {
  const titre = document.getElementById('r-titre').value.trim();
  if (!titre) { alert('Titre obligatoire.'); return; }
  const body = {
    titre,
    client_id: document.getElementById('r-client').value || null,
    type: document.getElementById('r-type').value,
    urgence: document.getElementById('r-urgence').value,
    date_echeance: document.getElementById('r-date').value || null,
    apporteur_id: document.getElementById('r-agent').value || null,
    notes: document.getElementById('r-notes').value || null,
    statut: 'ouvert',
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const created = await dbPost('rappels', body);
  if (created && created.error) { showError('Erreur lors de la création: ' + (created.detail || created.status)); btn.textContent = '✓ Enregistrer'; btn.disabled = false; return; }

  // Si un fichier a été sélectionné, on l'upload une fois le rappel créé (on a alors son ID)
  const fileInput = document.getElementById('r-file-input');
  const file = fileInput && fileInput.files[0];
  if (file && created && created[0] && created[0].id) {
    const newId = created[0].id;
    try {
      const ext = file.name.split('.').pop();
      const path = `rappels/${newId}-${Date.now()}.${ext}`;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': file.type || 'application/octet-stream' },
        body: file,
      });
      if (uploadRes.ok) {
        const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/documents/${path}`;
        await dbPatch('rappels', newId, { piece_jointe_url: publicUrl, piece_jointe_nom: file.name });
      }
    } catch (e) { /* upload échoué, le rappel reste créé sans pièce jointe */ }
  }

  // Création de l'événement Outlook correspondant (si une date d'échéance est définie)
  if (created && created[0] && created[0].id && body.date_echeance) {
    try {
      const eventId = await createOutlookEventFromRappel(created[0]);
      if (eventId) await dbPatch('rappels', created[0].id, { outlook_event_id: eventId });
    } catch (e) { /* sync Outlook échouée, le rappel reste créé dans le CRM */ }
  }

  allRappels = await dbGet('rappels', 'select=*');
  navigate('rappels');
}

async function uploadPieceJointe() {
  const input = document.getElementById('rd-file-input');
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('rd-upload-status');
  statusEl.textContent = 'Envoi en cours...';

  try {
    const ext = file.name.split('.').pop();
    const path = `rappels/${currentRappelId}-${Date.now()}.${ext}`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, 'Content-Type': file.type || 'application/octet-stream' },
      body: file,
    });
    if (!uploadRes.ok) {
      const errText = await uploadRes.text();
      statusEl.textContent = "Erreur lors de l'envoi: " + errText;
      return;
    }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/documents/${path}`;
    await dbPatch('rappels', currentRappelId, { piece_jointe_url: publicUrl, piece_jointe_nom: file.name });
    allRappels = await dbGet('rappels', 'select=*');
    showRappel(currentRappelId);
  } catch (e) {
    statusEl.textContent = "Erreur lors de l'envoi du fichier.";
  }
}

async function supprimerPieceJointe() {
  await dbPatch('rappels', currentRappelId, { piece_jointe_url: null, piece_jointe_nom: null });
  allRappels = await dbGet('rappels', 'select=*');
  showRappel(currentRappelId);
}

async function saveBordereau() {
  const compagnie = document.getElementById('b-compagnie').value.trim();
  const mois = document.getElementById('b-mois').value.trim();
  const montant = parseInt(document.getElementById('b-montant').value) || 0;
  const tauxCaution = parseFloat(document.getElementById('b-caution').value) || 0;
  if (!compagnie || !mois) { alert('Compagnie et mois obligatoires.'); return; }
  const body = {
    compagnie, mois,
    montant_brut: montant,
    taux_caution: tauxCaution,
    statut: document.getElementById('b-statut').value,
    date_reception: document.getElementById('b-date').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const r = await dbPost('bordereaux', body);
  if (r && r.error) { showError("Erreur lors de l'enregistrement: " + (r.detail || r.status)); btn.textContent = '✓ Enregistrer'; btn.disabled = false; return; }
  allBordereaux = await dbGet('bordereaux', 'select=*');
  navigate('bordereaux');
}

function initSegmentContrat() {
  const segmentSelect = document.getElementById('ct-segment');
  if (!segmentSelect) return;
  if (contratClientId) {
    const client = allClients.find(c => c.id === contratClientId);
    if (client) segmentSelect.value = client.segment === 'Entreprise' ? 'entreprise' : 'prive';
  }
  updateCategorieOptions();
}

function syncSegmentFromClient() {
  const clientSelect = document.getElementById('ct-client');
  const segmentSelect = document.getElementById('ct-segment');
  if (!clientSelect || !segmentSelect) return;
  const selectedOption = clientSelect.options[clientSelect.selectedIndex];
  const segment = selectedOption ? selectedOption.getAttribute('data-segment') : null;
  if (segment) {
    segmentSelect.value = segment;
    updateCategorieOptions();
  }
}

function getCategoriesPourSegment(segment) {
  return Object.keys(CATALOGUE_PRODUITS).filter(cat =>
    CATALOGUE_PRODUITS[cat].some(p => p.segment === segment || p.segment === 'tous')
  );
}

function updateCategorieOptions() {
  const segmentSelect = document.getElementById('ct-segment');
  const catSelect = document.getElementById('ct-categorie');
  if (!segmentSelect || !catSelect) return;
  const segment = segmentSelect.value;
  const categoriesDisponibles = getCategoriesPourSegment(segment);
  const categoriePrecedente = catSelect.value;
  catSelect.innerHTML = categoriesDisponibles.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  if (categoriesDisponibles.includes(categoriePrecedente)) catSelect.value = categoriePrecedente;
  updateProduitOptions();
}

function updateProduitOptions() {
  const segmentSelect = document.getElementById('ct-segment');
  const catSelect = document.getElementById('ct-categorie');
  const produitInput = document.getElementById('ct-produit');
  const datalist = document.getElementById('produits-suggestions');
  if (!segmentSelect || !catSelect || !produitInput || !datalist) return;
  const segment = segmentSelect.value;
  const categorie = catSelect.value;
  const tousProduits = CATALOGUE_PRODUITS[categorie] || [];
  const produits = tousProduits.filter(p => p.segment === segment || p.segment === 'tous');
  datalist.innerHTML = produits.map(p => `<option value="${p.label}">`).join('');
  produitInput.value = '';
  updateModulesOptions();
  updateCommissionPreview();
}

function getProduitParId(produitId) {
  for (const categorie in CATALOGUE_PRODUITS) {
    const trouve = CATALOGUE_PRODUITS[categorie].find(p => p.id === produitId);
    if (trouve) return trouve;
  }
  return null;
}

function getProduitSelectionne() {
  const catSelect = document.getElementById('ct-categorie');
  const produitInput = document.getElementById('ct-produit');
  if (!catSelect || !produitInput) return null;
  const texteTape = produitInput.value.trim().toLowerCase();
  if (!texteTape) return null;
  const categorie = catSelect.value;
  const produitsCategorie = CATALOGUE_PRODUITS[categorie] || [];
  let trouve = produitsCategorie.find(p => p.label.toLowerCase() === texteTape);
  if (trouve) return trouve;
  // Fallback : recherche dans tout le catalogue si pas trouvé dans la catégorie active
  for (const cat in CATALOGUE_PRODUITS) {
    trouve = CATALOGUE_PRODUITS[cat].find(p => p.label.toLowerCase() === texteTape);
    if (trouve) return trouve;
  }
  return null;
}

function updateModulesOptions() {
  const modulesList = document.getElementById('ct-modules-list');
  const combinablesField = document.getElementById('ct-combinables-field');
  const combinablesList = document.getElementById('ct-combinables-list');
  if (!modulesList) return;
  const produit = getProduitSelectionne();
  const modules = produit ? produit.modules : [];
  if (modules.length === 0) {
    modulesList.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">Aucun module complémentaire pour ce produit.</span>';
    document.getElementById('ct-modules-field').style.display = 'none';
  } else {
    document.getElementById('ct-modules-field').style.display = 'block';
    modulesList.innerHTML = modules.map((m, i) => `
      <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);cursor:pointer">
        <input type="checkbox" class="ct-module-checkbox" value="${m}" style="width:15px;height:15px;cursor:pointer"/>${m}
      </label>`).join('');
  }

  if (combinablesField && combinablesList) {
    const combinablesIds = produit ? (produit.combinables || []) : [];
    if (combinablesIds.length === 0) {
      combinablesField.style.display = 'none';
      combinablesList.innerHTML = '';
    } else {
      combinablesField.style.display = 'block';
      combinablesList.innerHTML = combinablesIds.map(id => {
        const p = getProduitParId(id);
        return p ? `
        <label style="display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text);cursor:pointer">
          <input type="checkbox" class="ct-combinable-checkbox" value="${p.id}" onchange="toggleCombinablePrime('${p.id}')" style="width:15px;height:15px;cursor:pointer"/>+ ${p.label}
        </label>` : '';
      }).join('') + '<div id="ct-combinables-primes" style="width:100%;margin-top:8px"></div>';
    }
  }

  const plaquesField = document.getElementById('ct-plaques-field');
  if (plaquesField) {
    if (produit && produit.flotte) {
      plaquesField.style.display = 'block';
      if (document.getElementById('ct-plaques-list').children.length === 0) ajouterPlaqueFlotte();
    } else {
      plaquesField.style.display = 'none';
      document.getElementById('ct-plaques-list').innerHTML = '';
    }
  }
}

function ajouterPlaqueFlotte() {
  const list = document.getElementById('ct-plaques-list');
  if (!list) return;
  const ligne = document.createElement('div');
  ligne.style.cssText = 'display:flex;gap:8px;align-items:center';
  ligne.innerHTML = `
    <input class="form-input ct-plaque-input" placeholder="VD 123456" style="flex:1"/>
    <input class="form-input ct-plaque-marque-input" placeholder="Marque / modèle (optionnel)" style="flex:1"/>
    <button type="button" onclick="this.parentElement.remove()" style="background:var(--red-dim);color:var(--red);border:none;border-radius:7px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer">✕</button>
  `;
  list.appendChild(ligne);
}

function toggleCombinablePrime(produitId) {
  const checkbox = document.querySelector(`.ct-combinable-checkbox[value="${produitId}"]`);
  const primesZone = document.getElementById('ct-combinables-primes');
  if (!checkbox || !primesZone) return;
  const produit = getProduitParId(produitId);
  const existant = document.getElementById(`ct-combinable-prime-${produitId}`);
  if (checkbox.checked && !existant) {
    const div = document.createElement('div');
    div.id = `ct-combinable-prime-${produitId}`;
    div.style.cssText = 'margin-top:6px';
    div.innerHTML = `<label class="form-label">Prime mensuelle pour "${produit.label}" (CHF)</label><input class="form-input ct-combinable-prime-input" data-produit-id="${produitId}" type="number" placeholder="50"/>`;
    primesZone.appendChild(div);
  } else if (!checkbox.checked && existant) {
    existant.remove();
  }
}

function getCompagniesConnues() {
  const base = ['Swiss Life', 'AXA', 'Helsana', 'Sanitas', 'Allianz', 'Zurich', 'Generali', 'Baloise', 'CSS', 'Groupe Mutuel', 'Visana', 'SWICA'];
  let memorisees = [];
  try { memorisees = JSON.parse(localStorage.getItem('compagnies_memorisees') || '[]'); } catch (e) {}
  const toutes = [...new Set([...base, ...memorisees])];
  return toutes.sort();
}

function memoriserCompagnie(nom) {
  if (!nom) return;
  let memorisees = [];
  try { memorisees = JSON.parse(localStorage.getItem('compagnies_memorisees') || '[]'); } catch (e) {}
  if (!memorisees.some(c => c.toLowerCase() === nom.toLowerCase())) {
    memorisees.push(nom);
    localStorage.setItem('compagnies_memorisees', JSON.stringify(memorisees));
  }
}

function calculerCommissionEstimee() {
  const produit = getProduitSelectionne();
  const produitId = produit ? produit.id : null;
  const primeMensuelle = parseFloat(document.getElementById('ct-prime-mensuelle').value) || 0;
  if (produitId === 'sante_complementaire') {
    const montant = Math.round(primeMensuelle * TAUX_COMMISSION.sante_facteur_mensuel);
    return { montant, detail: `CHF ${primeMensuelle} x ${TAUX_COMMISSION.sante_facteur_mensuel} (taux santé)` };
  }
  if (produitId === 'vie_3a') {
    const duree = parseFloat(document.getElementById('ct-duree')?.value) || 1;
    const capitalProduction = primeMensuelle * 12 * duree;
    const montant = Math.round(capitalProduction * (TAUX_COMMISSION.vie_taux_capital / 100));
    return { montant, detail: `${TAUX_COMMISSION.vie_taux_capital}% de CHF ${capitalProduction.toLocaleString()} (capital de production : ${primeMensuelle} x 12 x ${duree} an(s))` };
  }
  const montant = parseFloat(document.getElementById('ct-manuel')?.value) || 0;
  return { montant, detail: 'Saisie manuelle' };
}

function updateCommissionPreview() {
  const produit = getProduitSelectionne();
  const produitId = produit ? produit.id : null;
  if (!produitId) return;
  document.getElementById('ct-duree-field').style.display = produitId === 'vie_3a' ? 'block' : 'none';
  document.getElementById('ct-manuel-field').style.display = (produitId !== 'sante_complementaire' && produitId !== 'vie_3a') ? 'block' : 'none';
  const { montant, detail } = calculerCommissionEstimee();
  document.getElementById('commission-preview-value').textContent = 'CHF ' + montant.toLocaleString();
  document.getElementById('commission-preview-detail').textContent = detail;
}

function getProduitLabel(categorie, produitId) {
  const produits = CATALOGUE_PRODUITS[categorie] || [];
  const produit = produits.find(p => p.id === produitId);
  return produit ? produit.label : produitId;
}

async function creerContratEtCommission(clientId, compagnie, produitLabel, primeMensuelle, modules, montantCommission, detailCommission, plaques) {
  const contratBody = {
    client_id: clientId,
    compagnie,
    produit: produitLabel,
    modules: modules && modules.length > 0 ? modules.join(', ') : null,
    plaques: plaques && plaques.length > 0 ? plaques.join(', ') : null,
    numero_police: document.getElementById('ct-police').value.trim() || null,
    prime_annuelle: Math.round(primeMensuelle * 12),
    date_debut: document.getElementById('ct-date').value || null,
    statut: document.getElementById('ct-statut').value,
  };
  const rContrat = await dbPost('contrats', contratBody);
  if (rContrat && rContrat.error) return { error: true, detail: rContrat.detail || rContrat.status };

  const client = allClients.find(c => c.id === clientId);
  const commissionBody = {
    client_id: clientId,
    client_nom: client ? (client.segment === 'Entreprise' ? client.nom : `${client.prenom} ${client.nom}`) : '',
    compagnie,
    produit: produitLabel,
    montant_estime: montantCommission,
    detail_calcul: detailCommission,
    statut: 'en_attente',
    date_creation: new Date().toISOString().split('T')[0],
  };
  const rComm = await dbPost('commissions_attente', commissionBody);
  return { error: false, commissionError: rComm && rComm.error };
}

async function saveContrat() {
  const clientSelectEl = document.getElementById('ct-client');
  const clientId = clientSelectEl ? clientSelectEl.value : contratClientId;
  if (!clientId) { showError('Sélectionne un client.'); return; }

  const compagnie = document.getElementById('ct-compagnie').value.trim();
  const produitSelectionne = getProduitSelectionne();
  const primeMensuelle = parseFloat(document.getElementById('ct-prime-mensuelle').value) || 0;
  if (!compagnie || !primeMensuelle) { showError('Compagnie et prime mensuelle sont obligatoires.'); return; }
  if (!produitSelectionne) { showError('Sélectionne un produit valide dans la liste proposée.'); return; }

  // Vérifier que les produits combinés cochés ont bien une prime renseignée
  const combinablesCoches = Array.from(document.querySelectorAll('.ct-combinable-checkbox:checked')).map(cb => cb.value);
  for (const id of combinablesCoches) {
    const input = document.querySelector(`.ct-combinable-prime-input[data-produit-id="${id}"]`);
    if (!input || !parseFloat(input.value)) { showError('Renseigne la prime mensuelle pour chaque produit combiné coché.'); return; }
  }

  const produitLabel = produitSelectionne.label;
  const modulesChoisis = Array.from(document.querySelectorAll('.ct-module-checkbox:checked')).map(cb => cb.value);
  const { montant: commissionEstimee, detail } = calculerCommissionEstimee();

  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;

  const plaquesValeurs = Array.from(document.querySelectorAll('.ct-plaque-input')).map(inp => inp.value.trim()).filter(Boolean);
  const resultPrincipal = await creerContratEtCommission(clientId, compagnie, produitLabel, primeMensuelle, modulesChoisis, commissionEstimee, detail, plaquesValeurs);
  if (resultPrincipal.error) { showError('Erreur lors de la création du contrat: ' + resultPrincipal.detail); btn.textContent = '✓ Enregistrer le contrat'; btn.disabled = false; return; }

  memoriserCompagnie(compagnie);

  // Créer un contrat + commission distincts pour chaque produit combiné coché
  for (const id of combinablesCoches) {
    const produitCombinable = getProduitParId(id);
    const input = document.querySelector(`.ct-combinable-prime-input[data-produit-id="${id}"]`);
    const primeCombinable = parseFloat(input.value) || 0;
    const montantCombinable = parseFloat((primeCombinable * 12 * 0.1).toFixed(0)); // estimation par défaut, ajustable manuellement ensuite
    await creerContratEtCommission(clientId, compagnie, produitCombinable.label, primeCombinable, [], montantCombinable, 'Produit combiné — commission estimée à ajuster');
  }

  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');

  if (contratClientId) {
    showClient(contratClientId);
  } else {
    navigate('suivi');
  }
}

function viewCommissionsAttente() {
  const enAttente = allCommissionsAttente.filter(c => c.statut === 'en_attente');
  const totalAttente = enAttente.reduce((s, c) => s + (c.montant_estime || 0), 0);

  const rows = enAttente.map(c => `<tr>
    <td style="padding:10px 14px;font-size:13px;font-weight:700;color:var(--text)">${c.client_nom || '—'}</td>
    <td style="padding:10px 14px;font-size:12px;color:var(--text-muted)">${c.compagnie}</td>
    <td style="padding:10px 14px;font-size:12px;color:var(--text-muted)">${c.produit}</td>
    <td style="padding:10px 14px;font-size:12px;color:var(--text-muted)">${c.date_creation || ''}</td>
    <td style="padding:10px 14px;font-weight:800;color:#f59e0b;text-align:right">CHF ${(c.montant_estime||0).toLocaleString()}</td>
    <td style="padding:10px 14px;text-align:right"><button onclick="marquerCommissionRecue('${c.id}')" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer">✓ Reçue</button></td>
  </tr>`).join('');

  return `
    <h2 style="margin:0 0 6px;font-size:18px;font-weight:800;color:var(--text)">Commissions en attente</h2>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:18px">Générées automatiquement à chaque nouveau contrat. Marquez "Reçue" une fois le bordereau correspondant arrivé.</div>
    <div class="stat-grid" style="margin-bottom:20px">
      ${statCard('Total en attente', 'CHF ' + totalAttente.toLocaleString(), '#f59e0b')}
      ${statCard('Nombre de dossiers', enAttente.length, '#38bdf8')}

// AGENDA
function viewAgenda() {
  const isConnected = msalAccessToken !== null;

  if (!isConnected) {
    return `
      <h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Agenda</h2>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;text-align:center">
        <div style="font-size:36px;margin-bottom:12px">📅</div>
        <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px">Agenda Outlook non connecté</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px;max-width:380px;margin-left:auto;margin-right:auto">
          Pour afficher vos rendez-vous Outlook ici, connectez-vous avec le bouton Microsoft sur l'écran de connexion (déconnexion puis reconnexion nécessaire).
        </div>
        <button class="btn-add" onclick="logout()">🚪 Se reconnecter avec Microsoft</button>
      </div>`;
  }

  if (calendarEvents.length === 0) {
    refreshAgenda();
    return `
      <h2 style="margin:0 0 18px;font-size:18px;font-weight:800;color:var(--text)">Agenda</h2>
      <div class="loader">Chargement des événements Outlook...</div>`;
  }

  const grouped = {};
  calendarEvents.forEach(ev => {
    const d = new Date(ev.start.dateTime).toLocaleDateString('fr-CH', { weekday: 'long', day: 'numeric', month: 'long' });
    if (!grouped[d]) grouped[d] = [];
    grouped[d].push(ev);
  });

  const days = Object.keys(grouped).map(day => {
    const events = grouped[day].map(ev => {
      const start = new Date(ev.start.dateTime).toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
      const end = new Date(ev.end.dateTime).toLocaleTimeString('fr-CH', { hour: '2-digit', minute: '2-digit' });
      return `<div style="display:flex;gap:14px;padding:11px 18px;border-bottom:1px solid var(--border)">
        <div style="font-size:12px;color:var(--accent);font-weight:700;min-width:90px">${start} - ${end}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${ev.subject || 'Sans titre'}</div>
          ${ev.location && ev.location.displayName ? `<div style="font-size:11px;color:var(--text-muted)">${ev.location.displayName}</div>` : ''}
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${day}</div>
      <div class="table-wrap">${events}</div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Agenda — ${currentUser.email}</h2>
      <button class="btn-secondary" onclick="refreshAgenda()">↻ Actualiser</button>
    </div>
    ${days || '<div class="table-empty">Aucun événement à venir.</div>'}`;
}

            <div class="form-field"><label class="form-label">Nom</label><input id="edit-nom-${a.id}" class="form-input" value="${a.nom || ''}"></div>
            <div class="form-field"><label class="form-label">Email</label><input id="edit-email-${a.id}" class="form-input" value="${a.email || ''}"></div>

            <div class="form-field"><label class="form-label">Taux commission (%)</label>

                <option value="50" ${a.taux === 50 ? 'selected' : ''}>50%</option>

              <select id="edit-role-${a.id}" class="form-input">

    }).join('')}
    ${currentUser.role === 'signataire' ? `<button class="btn-save" style="margin-top:4px" onclick="navigate('nouveau-agent')">+ Ajouter un agent</button>` : ''}

      <button onclick="logout()" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">🚪 Se déconnecter</button>
    </div>`;
}

function toggleTauxLibre(id) {
  const select = document.getElementById(`edit-taux-select-${id}`);
  const input = document.getElementById(`edit-taux-${id}`);
  if (select.value === 'autre') {
    input.style.display = 'block';
    input.value = '';
    input.focus();
  } else {
    input.style.display = 'none';
    input.value = select.value;
  }
}

function printForm() {
  window.print();
}

function toggleEditAgent(id) {
  editingAgentId = editingAgentId === id ? null : id;
  navigate('agents');
}

async function saveAgent(id) {
  const body = {
    prenom: document.getElementById(`edit-prenom-${id}`).value.trim(),
    nom: document.getElementById(`edit-nom-${id}`).value.trim(),
    email: document.getElementById(`edit-email-${id}`).value.trim(),
    tel: document.getElementById(`edit-tel-${id}`).value.trim(),
    taux: Number(document.getElementById(`edit-taux-${id}`).value) || 0,
    role: document.getElementById(`edit-role-${id}`).value,
  };
  if (!body.prenom || !body.nom || !body.email) { showError('Prénom, nom et email sont obligatoires.'); return; }
  const r = await dbPatch('agents', id, body);
  if (r && r.error) { showError('Erreur lors de la mise à jour: ' + (r.detail || r.status)); return; }
  allAgents = await dbGet('agents', 'select=*');
  editingAgentId = null;
  navigate('agents');
}

  return `
    <button onclick="navigate('agents')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:5px">← Retour aux agents</button>

async function createAgent() {
  const body = {
    prenom: document.getElementById('new-prenom').value.trim(),
    nom: document.getElementById('new-nom').value.trim(),
    email: document.getElementById('new-email').value.trim(),
    tel: document.getElementById('new-tel').value.trim(),
    taux: Number(document.getElementById('new-taux').value) || 50,
    role: document.getElementById('new-role').value,
  };
  if (!body.prenom || !body.nom || !body.email) { showError('Prénom, nom et email sont obligatoires.'); return; }
  const r = await dbPost('agents', body);
  if (r && r.error) { showError('Erreur lors de la création: ' + (r.detail || r.status)); return; }
  allAgents = await dbGet('agents', 'select=*');
  navigate('agents');
}
