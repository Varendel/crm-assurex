      <div><button onclick="showEditContrat('${ct.id}')" title="Assigner un agent" style="background:var(--accent-dim);border:1px solid var(--accent-border);color:var(--accent);border-radius:7px;padding:5px 8px;font-size:13px;cursor:pointer">✏️</button></div>
    </div>`;
  }).join('');

  const totalPrimes = sanAgent.reduce((s,ct) => s + Number(ct.prime_annuelle||0), 0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">⚠️ Contrats sans agent assigné</h2>
    </div>
    <div style="background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12.5px;color:#f87171">
      Ces ${sanAgent.length} contrats n'ont aucun agent assigné — ils sont invisibles dans la Production par agent et le split de commission ne peut pas être calculé. Clique sur ✏️ pour chaque contrat et assigne l'agent qui l'a apporté.
    </div>
    <div class="stat-grid" style="margin-bottom:20px">
      ${statCard('Contrats concernés', sanAgent.length, '#f87171')}
      ${statCard('Primes annuelles', 'CHF ' + totalPrimes.toLocaleString(), '#f59e0b')}
    </div>
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}">
        <div>Client / Produit</div><div>Compagnie</div><div>Date signature</div><div>Prime/an</div><div>Statut</div><div></div>
      </div>
      ${rows || '<div class="table-empty">✅ Aucun contrat sans agent — tout est correctement assigné.</div>'}
    </div>`;
}

function viewPortefeuille(filtre) {
  const titre = filtre === 'prive' ? 'Clients privés' : filtre === 'entreprise' ? 'Entreprises' : 'Portefeuille complet';
  const agentOptions = allAgents.map(a => `<option value="${a.id}">${a.prenom} ${a.nom}</option>`).join('');

  setTimeout(() => renderPortefeuilleTable(filtre), 0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)" id="pf-titre">${titre}</h2>
      <button class="btn-add" onclick="navigate('nouveau-client')">+ Nouveau client</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
      <input class="form-input" id="pf-search" placeholder="🔍 Rechercher un nom, ville, email..." style="flex:1;min-width:200px" oninput="renderPortefeuilleTable('${filtre}')"/>
      <select class="form-select" id="pf-agent" style="max-width:200px" onchange="renderPortefeuilleTable('${filtre}')">
        <option value="">Tous les agents</option>
        <option value="__sans__">— Sans apporteur (moi seul)</option>
        ${agentOptions}
      </select>
      <select class="form-select" id="pf-statut" style="max-width:160px" onchange="renderPortefeuilleTable('${filtre}')">
        <option value="">Tous statuts</option>
        <option value="actif">Actif</option>
        <option value="prospect">Prospect</option>
        <option value="inactif">Inactif</option>
      </select>
      <select class="form-select" id="pf-entite" style="max-width:180px" onchange="renderPortefeuilleTable('${filtre}')">
        <option value="">Toutes entités</option>
        <option value="oz">${OZ_MINI_LOGO} Clients OZ Assure</option>
        <option value="assurex">${COFIDEX_MINI_LOGO} Clients Assurex / EX Groupe</option>
      </select>
    </div>
    <div id="pf-stats" class="stat-grid" style="margin-bottom:20px"></div>
    <div id="pf-table-container"></div>`;
}

function renderPortefeuilleTable(filtre) {
  const base = filtre === 'tous' ? allClients :
    filtre === 'prive' ? allClients.filter(c => c.segment !== 'Entreprise') :
    filtre === 'entreprise' ? allClients.filter(c => c.segment === 'Entreprise') :
    filtre === 'oz' ? allClients.filter(c => c.source_oz) :
    filtre === 'cofidex' ? allClients.filter(c => c.source_cofidex) :
    allClients;

  const search = (document.getElementById('pf-search')?.value || '').toLowerCase().trim();
  const agentFilter = document.getElementById('pf-agent')?.value || '';
  const sansAgent = agentFilter === '__sans__';
  const statutFilter = document.getElementById('pf-statut')?.value || '';
  const entiteFilter = document.getElementById('pf-entite')?.value || '';

  const filtered = base.filter(c => {
    if (sansAgent && c.apporteur_id) return false;
    if (agentFilter && agentFilter !== '__sans__' && c.apporteur_id !== agentFilter) return false;
    if (statutFilter && c.statut !== statutFilter) return false;
    if (entiteFilter === 'oz' && !c.source_oz) return false;
    if (entiteFilter === 'assurex' && !c.source_cofidex && c.source_oz) return false;
    if (search) {
      const haystack = `${c.prenom||''} ${c.nom||''} ${c.ville||''} ${c.email||''} ${c.profession||''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  const totalCA = filtered.reduce((s,c) => s + caClient(c.id), 0);
  const actifs = filtered.filter(c => c.statut === 'actif').length;
  const prospects = filtered.filter(c => c.statut === 'prospect').length;

  document.getElementById('pf-titre').textContent = `${filtre === 'prive' ? 'Clients privés' : filtre === 'entreprise' ? 'Entreprises' : 'Portefeuille complet'} (${filtered.length})`;
  document.getElementById('pf-stats').innerHTML = `
    ${statCard('Total', filtered.length, '#e2e8f0')}
    ${statCard('Actifs', actifs, '#4ade80')}
    ${statCard('Prospects', prospects, '#f59e0b')}
    ${statCard('CA total', 'CHF ' + totalCA.toLocaleString(), '#38bdf8')}`;

  const cols = '1fr 140px 85px 90px 100px 55px';
  const rows = filtered.map(c => {
    const agent = agentById(c.apporteur_id);
    const ca = caClient(c.id);
    return `<div class="table-row" style="grid-template-columns:${cols}" onclick="showClient('${c.id}')">
      <div>
        <div style="font-weight:700;font-size:13px;color:var(--text)">${c.prenom} ${c.nom}${getClientMiniLogos(c)}</div>
        <div style="font-size:11px;color:var(--text-muted)">${c.ville || ''} · ${c.profession || ''}</div>
      </div>
      <div><div style="font-size:11px;color:var(--text)">${c.email || ''}</div><div style="font-size:11px;color:var(--text-muted)">${c.mobile || ''}</div></div>
      <div>${badge(c.statut || '—', statutColor(c.statut))}</div>
      <div>${badge(c.segment || 'Privé', c.segment === 'Entreprise' ? '#f59e0b' : '#38bdf8')}</div>
      <div style="font-size:12px;font-weight:700;color:#f59e0b">${ca ? 'CHF ' + ca.toLocaleString() : '—'}</div>
      <div>${agent ? avatar(agent, 26) : ''}</div>
    </div>`;
  }).join('') || '<div class="table-empty">Aucun client ne correspond à ces filtres.</div>';

  document.getElementById('pf-table-container').innerHTML = `
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}">
        <div>Client</div><div>Contact</div><div>Statut</div><div>Segment</div><div>CA annuel</div><div>Agent</div>
      </div>
      ${rows}
    </div>`;
}

// CLIENTS
function viewClients() {
  const agentOptions = allAgents.map(a => `<option value="${a.id}">${a.prenom} ${a.nom}</option>`).join('');
  setTimeout(() => renderClientsTable(), 0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)" id="cl-titre">Clients (${allClients.length})</h2>
      <button class="btn-add" onclick="navigate('nouveau-client')">+ Nouveau client</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
      <input class="form-input" id="cl-search" placeholder="🔍 Rechercher un nom, ville, email..." style="flex:1;min-width:200px" oninput="renderClientsTable()"/>
      <select class="form-select" id="cl-agent" style="max-width:200px" onchange="renderClientsTable()">
        <option value="">Tous les agents</option>${agentOptions}
      </select>
      <select class="form-select" id="cl-statut" style="max-width:160px" onchange="renderClientsTable()">
        <option value="">Tous statuts</option>
        <option value="actif">Actif</option>
        <option value="prospect">Prospect</option>
        <option value="inactif">Inactif</option>
      </select>
      <select class="form-select" id="cl-segment" style="max-width:160px" onchange="renderClientsTable()">
        <option value="">Privé + Entreprise</option>
        <option value="Privé">Privé</option>
        <option value="Entreprise">Entreprise</option>
      </select>
    </div>
    <div id="cl-table-container"></div>`;
}

function renderClientsTable() {
  const search = (document.getElementById('cl-search')?.value || '').toLowerCase().trim();
  const agentFilter = document.getElementById('cl-agent')?.value || '';
  const statutFilter = document.getElementById('cl-statut')?.value || '';
  const segmentFilter = document.getElementById('cl-segment')?.value || '';

  const filtered = allClients.filter(c => {
    if (sansAgent && c.apporteur_id) return false;
    if (agentFilter && agentFilter !== '__sans__' && c.apporteur_id !== agentFilter) return false;
    if (statutFilter && c.statut !== statutFilter) return false;
    if (segmentFilter && (c.segment || 'Privé') !== segmentFilter) return false;
    if (search) {
      const haystack = `${c.prenom||''} ${c.nom||''} ${c.ville||''} ${c.email||''} ${c.profession||''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('cl-titre').textContent = `Clients (${filtered.length})`;

  const cols = '1fr 160px 85px 90px 55px';
  let rows = filtered.map(c => {
    const agent = agentById(c.apporteur_id);
    return `<div class="table-row" style="grid-template-columns:${cols}" onclick="showClient('${c.id}')">
      <div><div style="font-weight:700;font-size:13px;color:var(--text)">${c.prenom} ${c.nom}</div><div style="font-size:11px;color:var(--text-muted)">${c.ville || ''} · ${c.profession || ''}</div></div>
      <div><div style="font-size:11px;color:var(--text)">${c.email || ''}</div><div style="font-size:11px;color:var(--text-muted)">${c.mobile || ''}</div></div>
      <div>${badge(c.statut || '—', statutColor(c.statut))}</div>
      <div style="font-size:12px;color:var(--text-muted)">${c.segment || '—'}</div>
      <div>${agent ? avatar(agent, 26) : ''}</div>
    </div>`;
  }).join('') || '<div class="table-empty">Aucun client ne correspond à ces filtres.</div>';

  document.getElementById('cl-table-container').innerHTML = `
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}">
        <div>Client</div><div>Contact</div><div>Statut</div><div>Segment</div><div>Agent</div>
      </div>
      ${rows}
    </div>`;
}

    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="navigate('clients')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px">← Retour aux clients</button>
      <div style="display:flex;gap:10px">
        <button onclick="toggleEditClient()" style="background:${editingClient ? 'var(--red-dim)' : 'var(--surface)'};border:1px solid ${editingClient ? 'rgba(248,113,113,0.3)' : 'var(--border)'};border-radius:8px;padding:7px 16px;color:${editingClient ? 'var(--red)' : 'var(--text-muted)'};font-size:12px;font-weight:700;cursor:pointer">${editingClient ? '✕ Annuler' : '✏️ Modifier'}</button>
        <button onclick="window.print()" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 16px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer">🖨️ Imprimer la fiche</button>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div style="display:flex;gap:14px;align-items:center">
          ${headerIcon}
          <div>
            <h2 style="margin:0;font-size:20px;font-weight:900;color:var(--text)">${displayName}</h2>
            <div style="color:var(--text-muted);font-size:12px;margin-top:2px">${displaySub}</div>
            <div style="color:var(--text-muted);font-size:12px">${c.adresse || ''} ${c.npa || ''} ${c.ville || ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          ${badge(c.segment || 'Privé', isEntreprise ? '#f59e0b' : '#38bdf8')} ${badge(c.statut || 'prospect', statutColor(c.statut))}
          <div style="display:flex;gap:4px;margin-left:6px">
            ${c.statut !== 'prospect' ? `<button onclick="changerStatutClient('${c.id}','prospect')" style="background:var(--surface-alt);border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:3px 9px;font-size:10.5px;cursor:pointer;font-weight:700">→ Prospect</button>` : ''}
            ${c.statut !== 'actif' ? `<button onclick="changerStatutClient('${c.id}','actif')" style="background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.3);color:#4ade80;border-radius:6px;padding:3px 9px;font-size:10.5px;cursor:pointer;font-weight:700">✓ Client actif</button>` : ''}
            ${c.statut !== 'inactif' ? `<button onclick="changerStatutClient('${c.id}','inactif')" style="background:var(--surface-alt);border:1px solid var(--border);color:var(--text-muted);border-radius:6px;padding:3px 9px;font-size:10.5px;cursor:pointer;font-weight:700">Inactif</button>` : ''}
          </div>
        </div>
      </div>
      <div class="stat-grid" style="margin-bottom:16px">
        ${statCard('Contrats', contrats.length, '#38bdf8')}
        ${statCard('Rappels ouverts', rappels.filter(r => r.statut === 'ouvert').length, rappels.filter(r => r.statut === 'ouvert').length > 0 ? '#f87171' : '#64748b')}
        ${statCard('CA annuel', caClient(c.id) ? 'CHF ' + caClient(c.id).toLocaleString() : '—', '#f59e0b')}
      </div>
      ${(() => { const signataire = allAgents.find(a => a.role === 'signataire'); return signataire ? `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface-alt);border-radius:10px;margin-bottom:8px">
        ${avatar(signataire, 32)}
        <div>
          <div style="font-size:12.5px;font-weight:700;color:var(--text)">${signataire.prenom} ${signataire.nom}</div>
          <div style="font-size:10.5px;color:var(--text-muted)">👤 Agent signataire — toujours responsable, touche systématiquement sa part</div>
        </div>
        <button onclick="toggleSourceOz('${c.id}', ${!c.source_oz})" title="${c.source_oz ? 'Client OZ Assure — cliquer pour retirer' : 'Marquer comme client OZ Assure'}" style="margin-left:auto;background:${c.source_oz ? 'rgba(74,144,226,0.15)' : 'var(--surface-alt)'};border:1px solid ${c.source_oz ? 'rgba(74,144,226,0.4)' : 'var(--border)'};border-radius:7px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:10.5px;color:${c.source_oz ? '#4a90e2' : 'var(--text-muted)'};font-weight:700">${c.source_oz ? OZASSURE_LOGO_SVG.replace('class="oz-logo-svg"', 'style="height:18px;width:auto"') + ' Client OZ' : '+ Marquer OZ'}</button>
        <button onclick="toggleSourceCofidex('${c.id}', ${!c.source_cofidex})" title="${c.source_cofidex ? 'Client EX Groupe — cliquer pour retirer' : 'Marquer comme client Cofidex / EX Groupe'}" style="background:${c.source_cofidex ? 'rgba(0,207,255,0.12)' : 'var(--surface-alt)'};border:1px solid ${c.source_cofidex ? 'rgba(0,207,255,0.4)' : 'var(--border)'};border-radius:7px;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:10.5px;color:${c.source_cofidex ? '#00cfff' : 'var(--text-muted)'};font-weight:700">${c.source_cofidex ? COFIDEX_MINI_LOGO + ' Client EX' : '+ Marquer EX'}</button>
      </div>` : ''; })()}
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;margin-bottom:${c.apporteur_externe ? '8px' : '0'}">
        ${agent ? avatar(agent, 36) : `<div style="width:36px;height:36px;border-radius:50%;background:rgba(148,163,184,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">🤷</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Source du lead (apporteur interne)</div>
          <select onchange="changerAgentClient('${c.id}', this.value)" style="background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-size:13px;font-weight:700;max-width:220px">
            <option value="">— Aucun / pas de partage —</option>
            ${allAgents.map(a => `<option value="${a.id}" ${c.apporteur_id === a.id ? 'selected' : ''}>${a.prenom} ${a.nom}${a.role === 'signataire' ? ' (moi-même)' : ''}</option>`).join('')}
          </select>
          <div style="font-size:9.5px;color:var(--text-muted);margin-top:3px">Détermine le partage de commission — n'affecte pas la responsabilité de la relation client</div>
        </div>
        ${agent && c.mobile ? `<a href="tel:${c.mobile}" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">📞</a>` : ''}
        ${agent && c.email ? `<a href="mailto:${c.email}" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">✉️</a>` : ''}
      </div>
      ${c.apporteur_externe ? `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface-alt);border-radius:10px">
        <div style="width:32px;height:32px;border-radius:50%;background:rgba(167,139,250,0.15);border:2px solid rgba(167,139,250,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#a78bfa;flex-shrink:0">${c.apporteur_externe.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div>
          <div style="font-size:12.5px;font-weight:700;color:var(--text)">${c.apporteur_externe}</div>
          <div style="font-size:10.5px;color:var(--text-muted)">🤝 Origine du lead — recommandation externe</div>
        </div>
      </div>` : ''}
    </div>

    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;padding:6px 2px 14px">
      ${postits.map(p => `
        <div class="postit-note" style="background:${p.couleur || '#fde047'};transform:rotate(${p.rotation || 0}deg)">
          <button onclick="deletePostit('${p.id}','${c.id}')" class="postit-close">×</button>

async function saveClientNote(clientId) {
  const textarea = document.getElementById('client-note-input');
  const nouvelleNote = textarea.value.trim();
  if (!nouvelleNote) { showError('Écris une note avant l\'enregistrement.'); return; }
  const client = allClients.find(c => c.id === clientId);
  const notesExistantes = client && client.notes ? client.notes + '\n\n' : '';
  const dateAujourdhui = new Date().toLocaleDateString('fr-CH');
  const noteAvecDate = `[${dateAujourdhui}] ${nouvelleNote}`;
  const notesCompletes = notesExistantes + noteAvecDate;

  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }

  const r = await dbPatch('clients', clientId, { notes: notesCompletes });
  if (r && r.error) { showError('Erreur lors de l\'enregistrement de la note: ' + errMsg(r)); if (btn) { btn.textContent = 'Enregistrer'; btn.disabled = false; } return; }

  allClients = await dbGet('clients', 'select=*');
  await showClient(clientId);
  const notesBtn = document.querySelector('.tab-btn[onclick*="tab-notes"]');
  if (notesBtn) switchTab(notesBtn, 'tab-notes');

async function saveClientEdit(id, isEntreprise) {
  const body = isEntreprise ? {
    nom: document.getElementById('ec-nom').value.trim(),
    profession: document.getElementById('ec-profession').value.trim(),
    prenom: document.getElementById('ec-prenom').value.trim(),
    taux_activite: Number(document.getElementById('ec-taux-activite').value) || null,
    revenu: Number(document.getElementById('ec-revenu').value) || null,
    avs: document.getElementById('ec-avs').value.trim(),
  } : {
    prenom: document.getElementById('ec-prenom').value.trim(),
    nom: document.getElementById('ec-nom').value.trim(),
    date_naissance: document.getElementById('ec-date-naissance').value || null,
    nationalite: document.getElementById('ec-nationalite').value.trim(),
    etat_civil: document.getElementById('ec-etat-civil').value,
    enfants: Number(document.getElementById('ec-enfants').value) || 0,
    avs: document.getElementById('ec-avs').value.trim(),
    langue: document.getElementById('ec-langue').value,
  };

  // Champs communs (Contact, Bancaire, et Pro pour les particuliers)
  Object.assign(body, {
    adresse: document.getElementById('ec-adresse').value.trim(),
    npa: document.getElementById('ec-npa').value.trim(),
    ville: document.getElementById('ec-ville').value.trim(),
    canton: document.getElementById('ec-canton').value.trim(),
    email: document.getElementById('ec-email').value.trim(),
    tel: document.getElementById('ec-tel').value.trim(),
    mobile: document.getElementById('ec-mobile').value.trim(),
    banque: document.getElementById('ec-banque').value.trim(),
    iban: document.getElementById('ec-iban').value.trim(),
    apporteur_externe: document.getElementById('ec-apporteur-ext') ? (document.getElementById('ec-apporteur-ext').value.trim() || null) : undefined,
  });

  if (!isEntreprise) {
    const profEl = document.getElementById('ec-profession');
    const empEl = document.getElementById('ec-employeur');
    const revEl = document.getElementById('ec-revenu');
    const tauxEl = document.getElementById('ec-taux-activite');
    if (profEl) body.profession = profEl.value.trim();
    if (empEl) body.employeur = empEl.value.trim();
    if (revEl) body.revenu = Number(revEl.value) || null;
    if (tauxEl) body.taux_activite = Number(tauxEl.value) || null;
  }

  if (!body.prenom && !body.nom) { showError('Le nom est obligatoire.'); return; }

  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }

  const r = await dbPatch('clients', id, body);
  if (r && r.error) { showError('Erreur lors de la mise à jour: ' + errMsg(r)); if (btn) { btn.textContent = '💾 Enregistrer les modifications'; btn.disabled = false; } return; }
  logAction('edit_client', 'clients', id, `${body.prenom || ''} ${body.nom || ''}`.trim());

  // Resynchronise le nom dupliqué dans les commissions en attente liées à ce client
  if (body.prenom !== undefined || body.nom !== undefined) {
    const nomComplet = isEntreprise ? body.nom : `${body.prenom} ${body.nom}`;
    const liees = allCommissionsAttente.filter(c => c.client_id === id);
    await Promise.all(liees.map(c => dbPatch('commissions_attente', c.id, { client_nom: nomComplet })));
    allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  }

  editingClient = false;
  allClients = await dbGet('clients', 'select=*');
  showClient(id);
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['tab-identite','tab-prevoyance','tab-contrats','tab-factures','tab-rappels','tab-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden', id !== tabId);
  });
}

async function changerStadeOpportunite(id, nouveauStade) {
  if (!nouveauStade) return;
  const opp = allOpportunites.find(o => o.id === id);
  if (!opp) return;
  await dbPatch('opportunites', id, { stade: nouveauStade });
  opp.stade = nouveauStade;

  if (nouveauStade === 'Gagné') {
    prefillOpportunite = opp;
    contratClientId = opp.client_id || null;
    navigate('nouveau-contrat');
  } else {
    navigate('opportunites');
  }
}

function renderSuiviTables() {
  const today = new Date();
  const in60 = new Date(today.getTime() + 60*24*60*60*1000);
  const cols = '1fr 140px 110px 100px 110px 100px';

  function nomClient(ct) {
    const c = allClients.find(cl => cl.id === ct.client_id);
    return c ? (c.segment === 'Entreprise' ? c.nom : `${c.prenom} ${c.nom}`) : '—';
  }

  const produitFilter = document.getElementById('su-produit')?.value || '';
  const hideLamal = document.getElementById('su-hide-lamal')?.checked;

  const base = allContrats.filter(ct => {
    if (hideLamal && (ct.produit||'').toLowerCase().includes('lamal')) return false;
    if (produitFilter && ct.produit !== produitFilter) return false;
    return true;
  });

  const aRenouveler = base.filter(ct => ct.statut === 'renouveler');
  const echeanceProche = base.filter(ct => {
    if (ct.statut !== 'actif' || !ct.date_echeance) return false;
    const d = new Date(ct.date_echeance);
    return d >= today && d <= in60;
  });
  const actifs = base.filter(ct => ct.statut === 'actif');
  const totalPrimes = actifs.reduce((s, ct) => s + Number(ct.prime_annuelle || 0), 0);

  document.getElementById('su-stats').innerHTML = `
    ${statCard('Contrats actifs', actifs.length, '#4ade80')}
    ${statCard('Primes annuelles', 'CHF ' + totalPrimes.toLocaleString(), '#f59e0b')}
    ${statCard('À renouveler', aRenouveler.length, '#f87171')}
    ${statCard('Échéance < 60j', echeanceProche.length, '#fbbf24')}`;

  function table(list, emptyMsg) {
    if (!list.length) return `<div class="table-empty">${emptyMsg}</div>`;
    return `<div class="table-wrap"><div class="table-header" style="grid-template-columns:${cols}"><div>Produit</div><div>Client</div><div>Compagnie</div><div>Échéance</div><div>Prime/an</div><div>Statut</div></div>
      ${list.map(ct => `<div class="table-row" style="grid-template-columns:${cols};cursor:pointer" onclick="showDetailContrat('${ct.id}')">
        <div><div style="font-weight:700;font-size:13px;color:var(--text)">${ct.produit}</div><div style="font-size:11px;color:var(--text-muted)">${ct.numero_police || ''}</div></div>
        <div style="font-size:13px;color:var(--text)">${nomClient(ct)}</div>
        <div style="font-size:13px;color:var(--text)">${ct.compagnie}</div>
        <div style="font-size:12px;color:var(--text-muted)">${fmtDate(ct.date_echeance)}</div>
        <div style="font-weight:800;color:#f59e0b">CHF ${Number(ct.prime_annuelle||0).toLocaleString()}</div>
        <div>${badge(ct.statut, ct.statut === 'actif' ? '#4ade80' : ct.statut === 'renouveler' ? '#f59e0b' : '#f87171')}${ct.commissionne === false ? ' ' + badge('Non commissionné', '#64748b') : ''}</div>
      </div>`).join('')}</div>`;
  }

  document.getElementById('su-tables').innerHTML = `
    <div style="font-size:11px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">⚠ À renouveler (${aRenouveler.length})</div>
    ${table(aRenouveler, 'Aucun contrat à renouveler.')}
    <div style="font-size:11px;font-weight:700;color:#fbbf24;text-transform:uppercase;letter-spacing:1px;margin:24px 0 10px">⏳ Échéance dans moins de 60 jours (${echeanceProche.length})</div>
    ${table(echeanceProche, 'Aucune échéance proche.')}`;
}

// RAPPELS
function viewRappels() {
  const uc = u => u === 'haute' ? '#f87171' : u === 'moyenne' ? '#f59e0b' : '#64748b';

  function nomClientRappel(r) {
    if (!r.client_id) return '';
    const c = allClients.find(cl => cl.id === r.client_id);
    return c ? (c.segment === 'Entreprise' ? c.nom : `${c.prenom} ${c.nom}`) : '';
  }
  function dateRelative(dateStr) {
    if (!dateStr) return '';
    const j = Math.round((new Date(dateStr) - new Date()) / 86400000);
    if (j < 0) return ` · ⚠️ en retard de ${Math.abs(j)}j`;
    if (j === 0) return ` · aujourd'hui`;
    if (j <= 7) return ` · dans ${j}j`;
    if (j <= 31) return ` · dans ${Math.round(j/7)} sem.`;
    if (j <= 365) return ` · dans ${Math.round(j/30)} mois`;
    return ` · dans ${Math.round(j/365*10)/10} an(s)`;
  }

  const ouverts = allRappels
    .filter(r => r.statut === 'ouvert')
    .sort((a,b) => {
      const da = a.date_echeance ? new Date(a.date_echeance) : new Date('9999-01-01');
      const db = b.date_echeance ? new Date(b.date_echeance) : new Date('9999-01-01');
      return da - db;
    });

  // Grouper par horizon temporel
  const today = new Date();
  const groups = [
    { label: '🔴 En retard', color: '#f87171', items: ouverts.filter(r => r.date_echeance && new Date(r.date_echeance) < today) },
    { label: '🟠 Dans les 30 prochains jours', color: '#fb923c', items: ouverts.filter(r => { if (!r.date_echeance) return false; const j = Math.round((new Date(r.date_echeance)-today)/86400000); return j>=0 && j<=30; }) },
    { label: '🟡 1 à 3 mois', color: '#f59e0b', items: ouverts.filter(r => { if (!r.date_echeance) return false; const j = Math.round((new Date(r.date_echeance)-today)/86400000); return j>30 && j<=90; }) },
    { label: '🔵 3 à 12 mois', color: '#38bdf8', items: ouverts.filter(r => { if (!r.date_echeance) return false; const j = Math.round((new Date(r.date_echeance)-today)/86400000); return j>90 && j<=365; }) },
    { label: '⚪ Plus d\'un an / sans échéance', color: '#64748b', items: ouverts.filter(r => !r.date_echeance || Math.round((new Date(r.date_echeance)-today)/86400000) > 365) },
  ];

  const sections = groups.map(g => {
    if (!g.items.length) return '';
    return `<div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;color:${g.color};text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">${g.label} (${g.items.length})</div>
      ${g.items.map(r => `<div class="rappel-item" style="cursor:pointer" onclick="showRappel('${r.id}')">
        <div class="urgence-dot" style="background:${uc(r.urgence||'basse')}"></div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${r.nature === 'tache' ? '📋' : (r.tache_parent_id ? '🔗🔔' : '🔔')} ${r.titre}</div>
          <div style="font-size:11px;color:var(--text-muted)">${nomClientRappel(r) ? `👤 <span onclick="event.stopPropagation(); showClient('${r.client_id}')" style="cursor:pointer;color:var(--accent);text-decoration:underline dotted">${nomClientRappel(r)}</span> · ` : ''}${r.date_echeance ? fmtDate(r.date_echeance) : 'Sans échéance'}${dateRelative(r.date_echeance)}${r.piece_jointe_nom ? ' · 📎 ' + r.piece_jointe_nom : ''}</div>
          ${r.notes ? `<div style="font-size:10.5px;color:var(--text-muted);margin-top:3px;font-style:italic">${r.notes.split('[')[0].substring(0,120)}${r.notes.length>120?'...':''}</div>` : ''}
        </div>
        ${badge(r.type || 'Suivi', '#64748b')}
        <button class="btn-traite" onclick="event.stopPropagation(); traiterRappel('${r.id}')">✓ Traité</button>
      </div>`).join('')}
    </div>`;
  }).join('');

  const fermes = allRappels
    .filter(r => r.statut !== 'ouvert')
    .sort((a,b) => new Date(b.date_echeance||b.created_at||0) - new Date(a.date_echeance||a.created_at||0));

  const fermesHtml = fermes.length ? `<div style="margin-top:28px">

async function traiterRappel(id) {
  const r = allRappels.find(x => x.id === id);
  if (r && r.outlook_event_id) {
    try { await deleteOutlookEvent(r.outlook_event_id); } catch(e) {}
    await dbPatch('rappels', id, { statut: 'traité', outlook_event_id: null });
    r.outlook_event_id = null;
  } else {
    await dbPatch('rappels', id, { statut: 'traité' });
  }
  if (r) r.statut = 'traité';
  navigate('rappels');
}

async function rouvrirRappel(id) {
  const r = allRappels.find(x => x.id === id);
  await dbPatch('rappels', id, { statut: 'ouvert' });
  if (r) r.statut = 'ouvert';
  if (r && r.date_echeance) {
    try {
      const eventId = await createOutlookEventFromRappel(r);
      if (eventId) {
        await dbPatch('rappels', id, { outlook_event_id: eventId });
        r.outlook_event_id = eventId;
      }
    } catch(e) {}
  }
  navigate('rappels');
}

// BORDEREAUX
let allBordereaux = [];

// ═══════════════════════════════════════════════════════════════
// FICHE DE PAIE — répartition des commissions reçues entre agents
// Bordereaux = argent qui ENTRE dans Assurex (compagnies → société)
// Fiche de paie = argent qui SORT vers les collaborateurs (société → agents)
// Taux toujours celui défini dans Paramètres → Agents (jamais de saisie manuelle)
// ═══════════════════════════════════════════════════════════════
function viewFichePaie() {
  const aujourd = new Date().toISOString().split('T')[0];
  const debutMois = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];
  setTimeout(() => renderFichePaieApercu(), 0);
  return `
    <h2 style="margin:0 0 4px;font-size:18px;font-weight:800;color:var(--text)">Fiche de paie — répartition entre agents</h2>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:18px">Les commissions <strong>reçues</strong> (argent réellement entré dans Assurex via un bordereau) sont réparties selon le taux fixe de chaque agent défini dans Paramètres → Agents. Une fois générée, une fiche de paie marque les commissions comme payées — elles ne seront plus proposées une seconde fois.</div>

    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:flex-end">
      <div><label style="font-size:10.5px;color:var(--text-muted);display:block;margin-bottom:3px">Du</label><input class="form-input" id="fp-debut" type="date" value="${debutMois}" onchange="renderFichePaieApercu()"/></div>
      <div><label style="font-size:10.5px;color:var(--text-muted);display:block;margin-bottom:3px">Au</label><input class="form-input" id="fp-fin" type="date" value="${aujourd}" onchange="renderFichePaieApercu()"/></div>
    </div>

    <div id="fp-stats" class="stat-grid" style="margin-bottom:20px"></div>
    <div id="fp-detail"></div>

    <div style="margin-top:28px">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Historique des fiches de paie générées</div>
      <div id="fp-historique"></div>
    </div>`;
}

function commissionDateReception(ca) {
  // Retourne UNIQUEMENT une vraie date de réception (jamais la date de création
  // de l'enregistrement, qui ne reflète que le moment de saisie/import dans le CRM
  // et n'a aucune valeur pour savoir quand l'argent est réellement entré).
  if (ca.date_reception) return ca.date_reception;
  if (ca.bordereau_id) {
    const b = allBordereaux.find(bd => bd.id === ca.bordereau_id);
    if (b && b.date_reception) return b.date_reception;
  }
  return null;
}

function renderFichePaieApercu() {
  const debut = document.getElementById('fp-debut')?.value;
  const fin = document.getElementById('fp-fin')?.value;

  const eligibles = allCommissionsAttente.filter(ca => {
    if (ca.statut !== 'reçue') return false;
    if (ca.fiche_paie_id) return false; // déjà payée dans une fiche précédente
    const d = commissionDateReception(ca);
    if (!d) return false;
    if (debut && d < debut) return false;
    if (fin && d > fin) return false;
    return true;
  });

  // Calcul par ligne avec le taux FIXE de l'agent (Paramètres → Agents)
  const lignes = eligibles.map(ca => {
    const ct = ca.contrat_id ? allContrats.find(c => c.id === ca.contrat_id) : null;
    const cl = ct ? allClients.find(c => c.id === ct.client_id) : null;
    const montant = ca.montant_final != null ? ca.montant_final : (ca.montant_estime || 0);
    const s = splitMontantAgent(montant, ca.contrat_id);
    return { ca, ct, cl, montant, ...s };
  });

  const totalGlobal = lignes.reduce((s,l) => s + l.montant, 0);
  const parAgent = {};
  lignes.forEach(l => {
    const agentApporteur = l.agent;
    if (agentApporteur) {
      parAgent[agentApporteur.id] = parAgent[agentApporteur.id] || { agent: agentApporteur, total: 0, nb: 0 };
      parAgent[agentApporteur.id].total += l.pA;
      parAgent[agentApporteur.id].nb++;
    }
    const signataire = allAgents.find(a => a.role === 'signataire');
    if (signataire) {
      parAgent[signataire.id] = parAgent[signataire.id] || { agent: signataire, total: 0, nb: 0 };
      parAgent[signataire.id].total += l.pJ;
      parAgent[signataire.id].nb++;
    }
  });

  document.getElementById('fp-stats').innerHTML = `
    ${statCard('Commissions à répartir', lignes.length, '#38bdf8')}
    ${statCard('Montant total', 'CHF ' + Math.round(totalGlobal).toLocaleString(), '#f59e0b')}
    ${Object.values(parAgent).map(pa => statCard(pa.agent.prenom + ' ' + pa.agent.nom, 'CHF ' + Math.round(pa.total).toLocaleString(), agentColor(pa.agent))).join('')}
  `;

  const cols = '1fr 130px 110px 100px 100px 90px';
  const rows = lignes.map(l => {
    const nom = l.cl ? (l.cl.segment==='Entreprise'?l.cl.nom:`${l.cl.prenom} ${l.cl.nom}`) : (l.ca.client_nom || '—');
    const sig = allAgents.find(a => a.role === 'signataire');
    return `<div class="table-row" style="grid-template-columns:${cols}">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--text)">${nom}</div>
        <div style="font-size:11px;color:var(--text-muted)">${l.ca.produit||''} · ${l.ca.compagnie||''}</div>
      </div>
      <div style="font-size:12px;color:var(--text-muted)">${fmtDate(commissionDateReception(l.ca))}</div>
      <div style="font-weight:800;color:var(--text);text-align:right">CHF ${l.montant.toLocaleString()}</div>
      <div style="text-align:right">${sig ? `<div style="font-size:11px;color:${agentColor(sig)}">${sig.prenom}: CHF ${l.pJ}</div>` : ''}</div>
      <div style="text-align:right">${l.agent ? `<div style="font-size:11px;color:${agentColor(l.agent)}">${l.agent.prenom}: CHF ${l.pA}</div>` : `<div style="font-size:11px;color:var(--text-muted)">—</div>`}</div>
      <div style="text-align:right;font-size:10px;color:var(--text-muted)">${l.agent ? (l.agent.taux||0)+'%' : '0%'}</div>
    </div>`;
  }).join('');

  document.getElementById('fp-detail').innerHTML = `
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}"><div>Client / Contrat</div><div>Reçu le</div><div>Montant</div><div>Part signataire</div><div>Part apporteur</div><div>Taux</div></div>
      ${rows || '<div class="table-empty">Aucune commission reçue non encore payée sur cette période.</div>'}
    </div>
    ${lignes.length > 0 ? `<div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn-save" onclick="genererFichePaie()">✓ Générer la fiche de paie et marquer comme payé</button>
    </div>` : ''}`;

  renderHistoriqueFichesPaie();
}

function renderHistoriqueFichesPaie() {
  const el = document.getElementById('fp-historique');
  if (!el) return;
  const fiches = [...allFichesPaie].sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
  el.innerHTML = fiches.length ? `

      <div class="table-header" style="grid-template-columns:140px 140px 120px 1fr"><div>Du</div><div>Au</div><div>Montant total</div><div>Générée le</div></div>
      ${fiches.map(f => `<div class="table-row" style="grid-template-columns:140px 140px 120px 1fr">
        <div style="font-size:12px;color:var(--text)">${fmtDate(f.date_debut)}</div>

async function genererFichePaie() {
  const debut = document.getElementById('fp-debut')?.value;
  const fin = document.getElementById('fp-fin')?.value;
  if (!debut || !fin) { showError('Sélectionne une période valide.'); return; }

  const eligibles = allCommissionsAttente.filter(ca => {
    if (ca.statut !== 'reçue' || ca.fiche_paie_id) return false;
    const d = commissionDateReception(ca);
    return d && d >= debut && d <= fin;
  });
  if (!eligibles.length) { showError('Aucune commission à inclure sur cette période.'); return; }

  if (!confirm(`Générer la fiche de paie du ${fmtDate(debut)} au ${fmtDate(fin)} pour ${eligibles.length} commission(s) ?\n\nCes commissions seront marquées comme payées et ne réapparaîtront plus dans une future fiche de paie.`)) return;

  const totalMontant = eligibles.reduce((s,ca) => s + Number(ca.montant_final != null ? ca.montant_final : (ca.montant_estime||0)), 0);

  const r = await dbPost('fiches_paie', { date_debut: debut, date_fin: fin, total_montant: Math.round(totalMontant) });
  if (r && r.error) { showError('Erreur : ' + errMsg(r)); return; }
  const ficheId = r && r[0] ? r[0].id : null;

  for (const ca of eligibles) {
    await dbPatch('commissions_attente', ca.id, { fiche_paie_id: ficheId });
  }

  logAction('generer_fiche_paie', 'fiches_paie', ficheId, `${fmtDate(debut)} → ${fmtDate(fin)} · CHF ${Math.round(totalMontant)}`);
  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  allFichesPaie = await dbGet('fiches_paie', 'select=*');

  imprimerFichePaie(ficheId, eligibles, debut, fin, totalMontant);
  navigate('fiche-paie');
}

function renderBordereauxList() {
  const search = (document.getElementById('bd-search')?.value || '').toLowerCase().trim();
  const compagnieF = document.getElementById('bd-compagnie')?.value || '';
  const statutF = document.getElementById('bd-statut')?.value || '';
  const tri = document.getElementById('bd-tri')?.value || 'recent';

  let BORDS = allBordereaux.filter(b => {
    if (compagnieF && b.compagnie !== compagnieF) return false;
    if (statutF && b.statut !== statutF) return false;
    if (search) {
      const commissionsB = allCommissionsAttente.filter(c => c.bordereau_id === b.id);
      const nomsClients = commissionsB.map(c => (c.client_nom||'').toLowerCase()).join(' ');
      const hay = `${b.numero||''} ${b.compagnie||''} ${b.mois||''} ${nomsClients}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  if (tri === 'recent') BORDS.sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
  else if (tri === 'ancien') BORDS.sort((a,b) => new Date(a.created_at||0) - new Date(b.created_at||0));

async function toggleBordereauVerse(bordereauId) {
  const b = allBordereaux.find(x => x.id === bordereauId);
  if (!b) return;
  const commissionsLiees = allCommissionsAttente.filter(c => c.bordereau_id === bordereauId && c.statut !== 'annulé');

  if (b.statut !== 'reçu') {
    // Bascule vers "versé" : le bordereau ET toutes ses commissions rapprochées
    // passent en statut "reçu(e)" avec une vraie date de réception — c'est CE moment
    // qui met à jour le Dashboard, la Fiche de paie et toutes les statistiques.
    const dateRecep = b.date_reception || new Date().toISOString().split('T')[0];
    await dbPatch('bordereaux', bordereauId, { statut: 'reçu', date_reception: dateRecep });
    for (const c of commissionsLiees) {
      const patch = {};
      if (c.statut !== 'reçue') patch.statut = 'reçue';
      if (!c.date_reception) patch.date_reception = dateRecep; // backfill même si déjà "reçue" (rapprochements historiques sans date)
      if (Object.keys(patch).length) await dbPatch('commissions_attente', c.id, patch);
    }
    logAction('bordereau_verse', 'bordereaux', bordereauId, `${b.numero || ''} — ${commissionsLiees.length} commission(s) marquée(s) reçue(s)`);
  } else {
    // Retour en arrière : le bordereau redevient "attendu" ET toutes ses commissions
    // rapprochées sont automatiquement déliées et remises "en attente" — correction
    // complète et symétrique, pour ne jamais laisser de données à moitié cohérentes.
    await dbPatch('bordereaux', bordereauId, { statut: 'attendu' });
    for (const c of commissionsLiees) {
      await dbPatch('commissions_attente', c.id, {
        statut: 'en_attente',
        bordereau_id: null,
        montant_final: null,
        date_reception: null,
        detail_calcul: `Rapprochement annulé le ${fmtDate(new Date().toISOString())} suite au retour en arrière du bordereau ${b.numero || ''} — remis en attente pour correction.`,
      });
    }
    logAction('bordereau_attendu', 'bordereaux', bordereauId, `${b.numero || ''} — ${commissionsLiees.length} commission(s) remise(s) en attente`);
  }

  allBordereaux = await dbGet('bordereaux', 'select=*');
  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  renderBordereauxList();
}

function toggleBordereau(id) {
  openBordereaux[id] = !openBordereaux[id];
  renderBordereauxList();
}

async function deleteBordereau(bordereauId) {
  const b = allBordereaux.find(x => x.id === bordereauId);
  const commissionsLiees = allCommissionsAttente.filter(c => c.bordereau_id === bordereauId);
  const msg = commissionsLiees.length
    ? `Supprimer le bordereau ${b?.numero || ''} (${b?.compagnie || ''}) ?\n\n${commissionsLiees.length} commission(s) rapprochée(s) seront déliées et repasseront en statut "en attente".\n\nCette action est irréversible.`
    : `Supprimer définitivement le bordereau ${b?.numero || ''} (${b?.compagnie || ''}) ?\n\nCette action est irréversible.`;
  if (!confirm(msg)) return;

  // Délier les commissions liées (elles redeviennent en_attente, sans bordereau_id ni montant_final)
  for (const c of commissionsLiees) {
    await dbPatch('commissions_attente', c.id, { bordereau_id: null, montant_final: null, statut: 'en_attente' });
  }

  const token = await getValidAccessToken() || SUPABASE_KEY;
  const r = await fetch(`${SUPABASE_URL}/rest/v1/bordereaux?id=eq.${bordereauId}`, {
    method: 'DELETE',
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
  });
  if (!r.ok) { showError('Erreur lors de la suppression du bordereau.'); return; }

  logAction('delete_bordereau', 'bordereaux', bordereauId, b?.numero || null);
  allBordereaux = await dbGet('bordereaux', 'select=*');
  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  document.getElementById('modal-edit-bordereau')?.remove();
  navigate('bordereaux');
}

async function saveEditBordereau(bordereauId) {
  const body = {
    compagnie: document.getElementById('eb-compagnie').value.trim(),
    mois: `${document.getElementById('eb-mois-select').value} ${document.getElementById('eb-annee-select').value}`,
    montant_brut: Number(document.getElementById('eb-montant').value) || 0,
    taux_caution: Number(document.getElementById('eb-caution').value) || 0,
    statut: document.getElementById('eb-statut').value,
    date_reception: document.getElementById('eb-date').value || null,
  };
  const btn = document.querySelector('#modal-edit-bordereau .btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }
  const r = await dbPatch('bordereaux', bordereauId, body);
  if (r && r.error) { showError('Erreur: ' + errMsg(r)); if (btn) { btn.textContent = '✓ Enregistrer'; btn.disabled = false; } return; }
  logAction('edit_bordereau', 'bordereaux', bordereauId, body.compagnie);
  allBordereaux = await dbGet('bordereaux', 'select=*');
  document.getElementById('modal-edit-bordereau').remove();
  navigate('bordereaux');
}

          <div class="form-field"><label class="form-label">Déduction (%)</label><input class="form-input" id="val-deduction" type="number" step="0.1" min="0" max="100" value="0" oninput="updateValidationPreview()"/></div>

          <div class="form-field" style="grid-column:span 2">
            <label class="form-label">Montant final de la commission (CHF)</label>
            <input class="form-input" id="val-montant" type="number" step="0.01" style="font-size:22px;font-weight:800;text-align:center" value="0.00"/>
            <div style="font-size:10.5px;color:var(--text-muted);margin-top:4px">Pré-calculé depuis le montant de base et la déduction — modifie-le librement si le montant réel du bordereau diffère.</div>
          </div>

        <div style="display:flex;gap:10px;margin-top:20px">
          <button class="btn-secondary" onclick="document.getElementById('modal-validation').remove()">✕ Annuler</button>
          <button class="btn-save" onclick="saveValidationCommission('${bordereauId}')">✓ Valider</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function prefillMontantEstime() {
  const sel = document.getElementById('val-commission');
  const opt = sel.options[sel.selectedIndex];
  document.getElementById('val-montant-base').value = opt ? Number(opt.dataset.montant || 0).toFixed(2) : '0.00';
  updateValidationPreview();
}

function updateValidationPreview() {
  const montantBase = Number(document.getElementById('val-montant-base').value) || 0;
  const deduction = Number(document.getElementById('val-deduction').value) || 0;
  const sens = document.getElementById('val-sens').value;
  let montant = montantBase * (1 - deduction/100);
  if (sens === 'debit') montant = -Math.abs(montant);
  document.getElementById('val-montant').value = montant.toFixed(2);
}

async function saveValidationCommission(bordereauId) {
  const commId = document.getElementById('val-commission').value;
  if (!commId) { showError('Sélectionne une commission en attente.'); return; }
  const etat = document.querySelector('input[name="val-etat"]:checked').value;
  const montantEstime = Number(document.getElementById('val-montant-base').value) || 0;
  const montantFinal = Number(document.getElementById('val-montant').value) || 0;
  const deduction = Number(document.getElementById('val-deduction').value) || 0;
  const sens = document.getElementById('val-sens').value;
  const numeroPolice = document.getElementById('val-police').value.trim() || null;
  const mouvement = document.getElementById('val-mouvement').value;

  const btn = document.querySelector('#modal-validation .btn-save');
  if (btn) { btn.textContent = 'Validation...'; btn.disabled = true; }

  // La date de réception doit refléter le moment où Assurex encaisse réellement l'argent —
  // pas la période couverte par le document (le bordereau peut concerner "Mai 2026" alors
  // que l'argent n'entre chez Assurex qu'aujourd'hui). On ne reprend la date du bordereau
  // QUE si elle est déjà cohérente avec la fusion (≥ 01.06.2026) ; sinon, date du jour.
  const bordereauConcerne = allBordereaux.find(bd => bd.id === bordereauId);
  const dateBordereauValide = bordereauConcerne?.date_reception && bordereauConcerne.date_reception >= DATE_BASCULE_ASSUREX;
  const dateReceptionFinale = dateBordereauValide ? bordereauConcerne.date_reception : new Date().toISOString().split('T')[0];

  const res = await dbPatch('commissions_attente', commId, {
    statut: 'reçue',
    bordereau_id: bordereauId,
    numero_police: numeroPolice,
    montant_estime: montantEstime,
    montant_final: montantFinal,
    sens, deduction_pct: deduction, mouvement,
    date_reception: dateReceptionFinale,
  });
  if (res && res.error) {
    showError('Erreur lors de la validation : ' + (res.detail?.message || res.detail || res.status));
    if (btn) { btn.textContent = '✓ Valider'; btn.disabled = false; }
    return;
  }

  const comm = allCommissionsAttente.find(c => c.id === commId);
  if (comm && comm.contrat_id && etat !== 'aucun') {
    const nouveauStatut = etat === 'vigueur' ? 'actif' : 'résilié';
    await dbPatch('contrats', comm.contrat_id, { statut: nouveauStatut, numero_police: numeroPolice || undefined });
    allContrats = await dbGet('contrats', 'select=*');
  }

  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  document.getElementById('modal-validation').remove();
  navigate('bordereaux');
}

// COMMISSIONS
function splitMontantAgent(montant, contratId) {
  const contrat = contratId ? allContrats.find(ct => ct.id === contratId) : null;
  const agent = contrat ? allAgents.find(a => a.id === contrat.apporteur_id) : null;
  const tauxAgent = (agent && agent.role !== 'signataire') ? (agent.taux || 0) : 0;
  const pA = Math.round(montant * tauxAgent / 100);
  const pJ = montant - pA;
  return { pJ, pA, agent };
}

function viewCommissions() {
  const COMMS = allCommissionsAttente.filter(c => c.statut === 'reçue');
  function montantC(c) { return c.montant_final != null ? c.montant_final : (c.montant_estime || 0); }

  let totalBrut = 0, partJ = 0, partA = 0;
  COMMS.forEach(c => { const m = montantC(c); const s = splitMontantAgent(m, c.contrat_id); totalBrut += m; partJ += s.pJ; partA += s.pA; });

  // ── Commissions de gestion (récurrentes) ──
  const gestion = COMMS.filter(c => (c.mouvement || '').toLowerCase().includes('gestion'));
  const parMoisGestion = {};
  const parCompagnieGestion = {};
  let totalGestion = 0;
  gestion.forEach(c => {
    const m = montantC(c);
    totalGestion += m;
    const b = c.bordereau_id ? allBordereaux.find(bd => bd.id === c.bordereau_id) : null;
    const moisKey = b ? b.mois : (c.date_creation || '').slice(0,7);
    parMoisGestion[moisKey] = (parMoisGestion[moisKey] || 0) + m;
    parCompagnieGestion[c.compagnie] = (parCompagnieGestion[c.compagnie] || 0) + m;
  });
  const moisGestionKeys = Object.keys(parMoisGestion).sort();
  const maxMoisGestion = Math.max(...moisGestionKeys.map(k => parMoisGestion[k]), 1);
  const compGestion = Object.entries(parCompagnieGestion).sort((a,b)=>b[1]-a[1]);

  const cols = '1fr 130px 90px 100px 110px';
  const rows = COMMS.map(c => {
    const m = montantC(c);
    const s = splitMontantAgent(m, c.contrat_id);
    return `<div class="table-row" style="grid-template-columns:${cols}">
      <div style="font-size:13px;font-weight:600;color:var(--text)">${c.client_nom || '—'}</div>
      <div style="font-size:11px;color:var(--text-muted)">${c.produit || ''}${c.mouvement ? ' · ' + c.mouvement : ''}</div>
      <div style="font-weight:800;color:var(--text)">CHF ${m.toLocaleString()}</div>
      <div style="font-weight:800;color:#38bdf8">CHF ${s.pJ.toLocaleString()}</div>
      <div>${s.pA > 0 ? `<div style="display:flex;align-items:center;gap:6px">${s.agent ? avatar(s.agent, 18) : ''}<span style="font-weight:700;color:#f59e0b">CHF ${s.pA.toLocaleString()}</span></div>` : '<span style="color:var(--text-dim)">—</span>'}</div>
    </div>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Commissions</h2>
      <button class="btn-add" onclick="navigate('fiche-commission')">📄 Générer une fiche de commission</button>
    </div>
    <div class="stat-grid" style="margin-bottom:24px">
      ${statCard('Brut total', 'CHF ' + totalBrut.toLocaleString(), '#e2e8f0')}
      ${statCard('Part Jonathan', 'CHF ' + partJ.toLocaleString(), '#38bdf8')}
      ${statCard('Part apporteurs', 'CHF ' + partA.toLocaleString(), '#f59e0b')}
    </div>

    <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:4px">🔁 Commissions de gestion (récurrentes)</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:14px">Suivi de ce qui a été reçu — total : <strong style="color:#4ade80">CHF ${totalGestion.toLocaleString()}</strong> sur ${gestion.length} mouvement(s)</div>
    <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:16px;margin-bottom:24px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px">Évolution par période</div>
        ${moisGestionKeys.length ? `<div style="display:flex;align-items:flex-end;gap:6px;height:110px">
          ${moisGestionKeys.map(k => {
            const h = Math.max(Math.round(parMoisGestion[k]/maxMoisGestion*100), 3);
            return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;min-width:0">
              <div title="CHF ${Math.round(parMoisGestion[k]).toLocaleString()}" style="width:100%;max-width:28px;height:${h}px;background:linear-gradient(180deg,#4ade80,#16a34a);border-radius:4px 4px 2px 2px"></div>
              <div style="font-size:8.5px;color:var(--text-muted);margin-top:5px;white-space:nowrap;overflow:hidden;max-width:40px">${k}</div>
            </div>`;
          }).join('')}
        </div>` : '<div class="table-empty">Aucune commission de gestion encore rapprochée.</div>'}
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:14px">Par compagnie</div>
        ${compGestion.map(([comp,val]) => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:11.5px"><span style="color:var(--text)">${comp}</span><span style="color:#4ade80;font-weight:700">CHF ${Math.round(val).toLocaleString()}</span></div>
            <div style="height:6px;border-radius:3px;background:var(--border);margin-top:4px;overflow:hidden"><div style="height:100%;width:${compGestion.length?Math.round(val/compGestion[0][1]*100):0}%;background:#4ade80;border-radius:3px"></div></div>
          </div>`).join('') || '<div class="table-empty">—</div>'}
      </div>
    </div>

    <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:10px">Toutes les commissions reçues (${COMMS.length})</div>
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}"><div>Client</div><div>Produit / Mouvement</div><div>Brut</div><div>Jonathan</div><div>Apporteur</div></div>
      ${rows || '<div class="table-empty">Aucune commission reçue encore rapprochée.</div>'}
    </div>`;
}

function genererFicheCommission() {
  const agentId = document.getElementById('fs-agent').value;
  const mois = document.getElementById('fs-mois').value;
  const zone = document.getElementById('fiche-commission-resultat');
  if (!agentId || !mois) { zone.innerHTML = '<div class="table-empty">Sélectionne un agent et une période.</div>'; return; }

  const agent = allAgents.find(a => a.id === agentId);
  const bordereauxMois = allBordereaux.filter(b => b.mois === mois).map(b => b.id);
  const lignes = allCommissionsAttente.filter(c =>
    c.statut === 'reçue' && bordereauxMois.includes(c.bordereau_id) &&
    c.contrat_id && allContrats.find(ct => ct.id === c.contrat_id && ct.apporteur_id === agentId)
  );

  function montantC(c) { return c.montant_final != null ? c.montant_final : (c.montant_estime || 0); }
  const isSignataire = agent.role === 'signataire';
  let totalBrut = 0, totalPart = 0;
  const detail = lignes.map(c => {
    const m = montantC(c);
    const s = splitMontantAgent(m, c.contrat_id);
    const tauxAgent = isSignataire ? 100 : (agent.taux || 0);
    const part = isSignataire ? s.pJ : s.pA;
    totalBrut += m; totalPart += part;
    return { ...c, montant: m, part, tauxAgent };
  });

  const dateGen = new Date().toLocaleDateString('fr-CH', { day:'2-digit', month:'long', year:'numeric' });

  zone.innerHTML = `
    <div class="fiche-commission-print" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px">
        <div>
          <div style="font-size:16px;font-weight:900;color:var(--text)">FICHE DE COMMISSION</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">Assurex Sàrl · Rue du Centre 142, 1025 St-Sulpice VD</div>
        </div>
        <button onclick="window.print()" style="background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:8px 16px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer">🖨️ Imprimer / PDF</button>
      </div>
      <div style="display:flex;gap:30px;margin-bottom:20px;font-size:13px">
        <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase">Bénéficiaire</div><div style="font-weight:700;color:var(--text)">${agent.prenom} ${agent.nom} (${agent.role})</div></div>
        <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase">Période</div><div style="font-weight:700;color:var(--text)">${mois}</div></div>
        <div><div style="color:var(--text-muted);font-size:11px;text-transform:uppercase">Généré le</div><div style="font-weight:700;color:var(--text)">${dateGen}</div></div>
      </div>

      <table style="width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:20px">
        <thead><tr style="color:var(--text-muted);font-size:10.5px;text-transform:uppercase">
          <th style="padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)">Client</th>
          <th style="padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)">Produit</th>
          <th style="padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)">Commission brute</th>
          <th style="padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)">Taux</th>
          <th style="padding:7px 10px;text-align:right;border-bottom:1px solid var(--border)">Part due</th>
        </tr></thead>
        <tbody>${detail.map(d => `
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:7px 10px;color:var(--text)">${d.client_nom || '—'}</td>
            <td style="padding:7px 10px;color:var(--text-muted)">${d.produit || ''}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--text)">CHF ${d.montant.toLocaleString()}</td>
            <td style="padding:7px 10px;text-align:right;color:var(--text-muted)">${d.tauxAgent}%</td>
            <td style="padding:7px 10px;text-align:right;font-weight:700;color:#f59e0b">CHF ${d.part.toLocaleString()}</td>
          </tr>`).join('') || `<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--text-muted)">Aucune commission rapprochée pour cet agent sur cette période.</td></tr>`}
        </tbody>
      </table>

      <div style="display:flex;justify-content:flex-end;gap:30px;border-top:1px solid var(--border);padding-top:14px">
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Total brut</div><div style="font-size:16px;font-weight:800;color:var(--text)">CHF ${totalBrut.toLocaleString()}</div></div>
        <div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Total dû à ${agent.prenom}</div><div style="font-size:20px;font-weight:900;color:#f59e0b">CHF ${totalPart.toLocaleString()}</div></div>
      </div>
    </div>`;
}

async function saveClient() {
  const prenom = document.getElementById('f-prenom').value.trim();
  const nom = document.getElementById('f-nom').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const adresse = document.getElementById('f-adresse').value.trim();
  const npa = document.getElementById('f-npa').value.trim();
  const missing = [];
  if (!prenom) missing.push('Prénom');
  if (!nom) missing.push('Nom');
  if (!email) missing.push('Email');
  if (!adresse) missing.push('Adresse');
  if (!npa) missing.push('NPA');
  if (missing.length > 0) { alert('Champs obligatoires manquants : ' + missing.join(', ')); return; }
  const body = {
    prenom, nom,
    date_naissance: document.getElementById('f-dob').value || null,
    nationalite: document.getElementById('f-nationalite').value || null,
    etat_civil: document.getElementById('f-etat').value || null,
    enfants: parseInt(document.getElementById('f-enfants').value) || 0,
    avs: document.getElementById('f-avs').value || null,
    langue: document.getElementById('f-langue').value,
    email: document.getElementById('f-email').value || null,
    mobile: document.getElementById('f-mobile').value || null,
    tel: document.getElementById('f-tel').value || null,
    adresse: document.getElementById('f-adresse').value || null,
    npa: document.getElementById('f-npa').value || null,
    ville: document.getElementById('f-ville').value || null,
    canton: document.getElementById('f-canton').value || null,
    banque: document.getElementById('f-banque').value || null,
    iban: document.getElementById('f-iban').value || null,
    profession: document.getElementById('f-profession').value || null,
    employeur: document.getElementById('f-employeur').value || null,
    revenu: parseInt(document.getElementById('f-revenu').value) || 0,
    taux_activite: parseInt(document.getElementById('f-taux').value) || 100,
    statut: document.getElementById('f-statut').value,
    segment: 'Privé',
    apporteur_id: document.getElementById('f-agent').value || null,
    apporteur_externe: document.getElementById('f-apporteur-ext').value.trim() || null,
    notes: document.getElementById('f-notes').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const result = await dbPost('clients', body);
  if (result && !result.error) {
    allClients = await dbGet('clients', 'select=*');
    currentView = 'clients';
    renderSidebar();
    document.getElementById('main-content').innerHTML = viewClients();
  } else {
    btn.textContent = 'Erreur — réessayer';
    btn.disabled = false;
    const detail = result && result.detail ? JSON.stringify(result.detail) : 'connexion';
    alert('Erreur lors de l\'enregistrement (' + detail + '). Vérifiez les champs et réessayez.');
  }
}

function genererEmailDemandeOffre() {
  const checked = [...document.querySelectorAll('.do-cie-checkbox:checked')];
  if (!checked.length) { showError('Sélectionne au moins une compagnie.'); return; }
  const cies = checked.map(el => (window._doContacts || []).find(c => c.id === el.value)).filter(Boolean);
  const emails = cies.map(c => c.email).filter(Boolean);
  const sansEmail = cies.filter(c => !c.email).map(c => c.compagnie);

  const val = id => document.getElementById(id)?.value || '';
  const chk = id => document.getElementById(id)?.checked;
  const nomClient = val('do-client') ? (document.getElementById('do-client').selectedOptions[0]?.text || '') : (val('do-prospect-nom') || 'Client');

  let besoins = [];
  if (chk('do-perte-gain')) besoins.push('Perte de gain maladie' + (chk('do-pg-14j')?' (délai 14j)':chk('do-pg-30j')?' (délai 30j)':chk('do-pg-60j')?' (délai 60j)':''));
  if (chk('do-laa')) besoins.push('LAA');
  if (chk('do-laaf')) besoins.push('LAAF (indépendant)');
  if (chk('do-lpp')) besoins.push('LPP');
  if (chk('do-3a')) besoins.push('Vie 3a');
  if (chk('do-3b')) besoins.push('Vie 3B');
  if (chk('do-rc-commerce')) besoins.push('RC/commerce');
  if (chk('do-cyber')) besoins.push('Cyber');
  if (chk('do-pj')) besoins.push('Protection juridique');
  if (chk('do-construction')) besoins.push('Construction & maître ouvrage');
  if (chk('do-perte-exploit')) besoins.push("Perte d'exploitation");
  if (val('do-inventaire')) besoins.push(`Inventaire (CHF ${val('do-inventaire')})`);

  const lignesInfos = [
    val('do-activite') ? `Activité principale : ${val('do-activite')}` : '',
    val('do-ca') ? `Chiffre d'affaires : CHF ${val('do-ca')}` : '',
    val('do-nb-collab') ? `Nombre de collaborateurs : ${val('do-nb-collab')}` : '',
    val('do-lieu-risque') ? `Lieu du risque : ${val('do-lieu-risque')}` : '',
  ].filter(Boolean);

  const corps = `Bonjour,

Je me permets de solliciter une offre pour le client suivant :

Client : ${nomClient}
${lignesInfos.join('\n')}

Couvertures souhaitées :
${besoins.length ? besoins.map(b => '- ' + b).join('\n') : '- Voir détails ci-dessous'}

Je reste à votre disposition pour toute information complémentaire.

Meilleures salutations,
${currentUser ? currentUser.prenom + ' ' + currentUser.nom : ''}
Assurex Sàrl`;

  const sujet = `Demande d'offre — ${nomClient}`;
  const mailto = `mailto:${emails.join(',')}?subject=${encodeURIComponent(sujet)}&body=${encodeURIComponent(corps)}`;
  window.location.href = mailto;

  if (sansEmail.length) {
    showError(`⚠ Pas d'email enregistré pour : ${sansEmail.join(', ')} — ajoute-les dans Paramètres → Contacts compagnies.`);
  }
}

async function saveDemandeOffre() {
  const val = id => document.getElementById(id)?.value || null;
  const chk = id => document.getElementById(id)?.checked || false;

  const plaques = [...document.querySelectorAll('.do-plaque-numero')].map((el, i) => ({
    numero: el.value, modele: document.querySelectorAll('.do-plaque-modele')[i]?.value || '',
  })).filter(p => p.numero || p.modele);

  const donnees = {
    identite: { contact: val('do-contact'), adresse: val('do-adresse'), tel: val('do-tel'), email: val('do-email'), avs: val('do-avs'), activite: val('do-activite'), lieu_risque: val('do-lieu-risque'), suva: val('do-suva'), independant: val('do-independant') },
    base_calcul: { ca: val('do-ca'), nb_collab: val('do-nb-collab'), ap_h: val('do-ap-h'), ap_f: val('do-ap-f'), anp_h: val('do-anp-h'), anp_f: val('do-anp-f'), exc_avs_h: val('do-exc-avs-h'), exc_avs_f: val('do-exc-avs-f'), masse_chef: val('do-masse-chef') },
    assurances_personnes: { perte_gain: chk('do-perte-gain'), pg_14j: chk('do-pg-14j'), pg_30j: chk('do-pg-30j'), pg_60j: chk('do-pg-60j'), laa: chk('do-laa'), laaf: chk('do-laaf'), laac: chk('do-laac'), semi_privee: chk('do-semi-privee'), lpp: chk('do-lpp') },
    assurances_vie: { a3a: chk('do-3a'), a3a_indep: chk('do-3a-indep'), a3b: chk('do-3b'), risque_pure: chk('do-risque-pure'), versement_unique: chk('do-versement-unique'), budget_epargne: val('do-budget-epargne'), pa: val('do-pa') },
    assurances_choses: { inventaire: val('do-inventaire'), rc_commerce: chk('do-rc-commerce'), prejudice_fortune: chk('do-prejudice-fortune'), cyber: chk('do-cyber'), pj: chk('do-pj'), construction: chk('do-construction'), technique: chk('do-technique'), perte_exploit: chk('do-perte-exploit') },
    complementaires: { cct: val('do-cct'), couverture_salaire: val('do-couverture-salaire') },
    lpp: { taux_min_legal: val('do-taux-min-legal'), ded_coord: val('do-ded-coord'), exc_h: val('do-lpp-exc-h'), exc_f: val('do-lpp-exc-f'), cap_invalidite: val('do-cap-invalidite'), cap_deces: val('do-cap-deces'), amelio_rentes: chk('do-amelio-rentes'), amelio_epargne: chk('do-amelio-epargne'), amelio_tranches: chk('do-amelio-tranches'), amelio_rendement: chk('do-amelio-rendement') },
    rc: { risque: val('do-rc-risque'), lieux: val('do-rc-lieux'), marchandises: chk('do-marchandises'), transports: chk('do-transports'), transports_speciaux: chk('do-transports-speciaux'), machines: chk('do-machines'), vol: chk('do-vol'), all_risk: chk('do-all-risk'), inventaire: val('do-rc-inventaire'), prejudice_fortune: chk('do-rc-prejudice-fortune'), cv_details: val('do-rc-cv-details') },
    vehicules: plaques,
  };

  const clientId = val('do-client');
  const body = {
    client_id: clientId || null,
    prospect_nom: clientId ? null : val('do-prospect-nom'),
    agent_id: currentUser.id && allAgents.find(a=>a.email===currentUser.email) ? allAgents.find(a=>a.email===currentUser.email).id : null,
    donnees,
  };

  const res = await dbPost('demandes_offre', body);
  if (res && res.error) { showError('Erreur: ' + errMsg(res)); return; }
  logAction('create_demande_offre', 'demandes_offre', res && res[0] ? res[0].id : null, body.prospect_nom || 'Client existant');
  showError('✓ Demande d\'offre enregistrée.');
  navigate('suivi');
}

async function saveOpportunite() {
  const titre = document.getElementById('o-titre').value.trim();
  if (!titre) { alert('Titre obligatoire.'); return; }
  const body = {
    titre,
    client_id: document.getElementById('o-client').value || null,
    prospect_nom: document.getElementById('o-client').value ? null : (document.getElementById('o-prospect-nom').value.trim() || null),
    compagnie: document.getElementById('o-compagnie').value || null,
    montant_potentiel: parseInt(document.getElementById('o-montant').value) || 0,
    probabilite: parseInt(document.getElementById('o-prob').value) || 50,
    stade: document.getElementById('o-stade').value,
    date_echeance: document.getElementById('o-date').value || null,
    apporteur_id: document.getElementById('o-agent').value || null,
    notes: document.getElementById('o-notes').value || null,
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  await dbPost('opportunites', body);
  allOpportunites = await dbGet('opportunites', 'select=*');
  navigate('opportunites');
}

// Filtre dynamiquement le sélecteur Collaborateur + Contrat selon le client choisi
function onClientChangeRappel() {
  const clientId = document.getElementById('r-client').value;
  const collabField = document.getElementById('r-collab-field');
  const collabSelect = document.getElementById('r-collaborateur');
  const contratSelect = document.getElementById('r-contrat');
  if (!clientId) {
    collabField.style.display = 'none';
    contratSelect.innerHTML = '<option value="">— Aucun —</option>';
    return;
  }
  const client = allClients.find(c => c.id === clientId);
  const collabsDuClient = allCollaborateurs.filter(c => c.client_id === clientId);
  if (client && client.segment === 'Entreprise' && collabsDuClient.length) {
    collabField.style.display = '';
    collabSelect.innerHTML = '<option value="">— Sélectionner —</option>' + collabsDuClient.map(c => `<option value="${c.id}">${c.prenom} ${c.nom}</option>`).join('');
  } else {
    collabField.style.display = 'none';
  }
  const contratsDuClient = allContrats.filter(c => c.client_id === clientId);
  contratSelect.innerHTML = '<option value="">— Aucun —</option>' + contratsDuClient.map(c => `<option value="${c.id}">${c.produit || 'Contrat'} — ${c.numero_police || ''}</option>`).join('');
}

// Gestion locale des étapes avant la première sauvegarde (stockées en mémoire, insérées après création de la tâche)
let etapesLocalesTemp = [];
function ajouterEtapeLocale() {
  const input = document.getElementById('r-nouvelle-etape');
  const libelle = input.value.trim();
  if (!libelle) return;
  etapesLocalesTemp.push(libelle);
  input.value = '';
  renderEtapesLocales();
}
function retirerEtapeLocale(idx) {
  etapesLocalesTemp.splice(idx, 1);
  renderEtapesLocales();
}
function renderEtapesLocales() {
  const zone = document.getElementById('r-etapes-list');
  if (!zone) return;
  zone.innerHTML = etapesLocalesTemp.map((e, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0">
      <span style="flex:1;font-size:13px;color:var(--text)">${i+1}. ${e}</span>
      <button type="button" onclick="retirerEtapeLocale(${i})" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px">✕</button>
    </div>`).join('');
}

async function saveRappel() {
  const titre = document.getElementById('r-titre').value.trim();
  if (!titre) { alert('Titre obligatoire.'); return; }
  const body = {
    titre,
    nature: document.getElementById('r-nature').value,
    client_id: document.getElementById('r-client').value || null,
    collaborateur_id: document.getElementById('r-collaborateur') ? (document.getElementById('r-collaborateur').value || null) : null,
    contrat_id: document.getElementById('r-contrat').value || null,
    type: document.getElementById('r-type').value,
    urgence: document.getElementById('r-urgence').value,
    date_echeance: document.getElementById('r-date').value || null,
    apporteur_id: document.getElementById('r-agent').value || null,
    notes: document.getElementById('r-notes').value || null,
    statut: 'ouvert',
  };
  const btn = document.querySelector('.btn-save');
  btn.textContent = 'Enregistrement...'; btn.disabled = true;
  const created = await dbPost('rappels', body);
  if (created && created.error) { showError('Erreur lors de la création: ' + (created.detail || created.status)); btn.textContent = '✓ Enregistrer'; btn.disabled = false; return; }

  // Si nature = tâche, on insère les étapes de checklist saisies localement
  if (body.nature === 'tache' && etapesLocalesTemp.length && created && created[0] && created[0].id) {
    const newId = created[0].id;
    for (let i = 0; i < etapesLocalesTemp.length; i++) {
      await dbPost('tache_etapes', { rappel_id: newId, libelle: etapesLocalesTemp[i], ordre: i });
    }
    etapesLocalesTemp = [];
  }

  // Si un fichier a été sélectionné, on l'upload une fois le rappel créé (on a alors son ID)
  const fileInput = document.getElementById('r-file-input');
  const file = fileInput && fileInput.files[0];
  if (file && created && created[0] && created[0].id) {
    const newId = created[0].id;
    try {
      const ext = file.name.split('.').pop();
      const path = `rappels/${newId}-${Date.now()}.${ext}`;
      const uploadToken = await getValidAccessToken() || SUPABASE_KEY;
      const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/documents/${path}`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${uploadToken}`, 'Content-Type': file.type || 'application/octet-stream' },
        body: file,
      });
      if (uploadRes.ok) {
        await dbPatch('rappels', newId, { piece_jointe_path: path, piece_jointe_nom: file.name, piece_jointe_url: null });
      }
    } catch (e) { /* upload échoué, le rappel reste créé sans pièce jointe */ }
  }

  // Création de l'événement Outlook correspondant (si une date d'échéance est définie)
  if (created && created[0] && created[0].id && body.date_echeance) {
    try {
      const eventId = await createOutlookEventFromRappel(created[0]);
      if (eventId) await dbPatch('rappels', created[0].id, { outlook_event_id: eventId });
    } catch (e) { /* sync Outlook échouée, le rappel reste créé dans le CRM */ }
  }

  // Rappel intelligent : si nature = tâche, échéance définie, et case cochée
  if (body.nature === 'tache' && created && created[0]) {
    const checkbox = document.getElementById('r-auto-rappel-check');
    if (checkbox && checkbox.checked && !checkbox.disabled) {
      try { await creerRappelIntelligentPourTache(created[0]); } catch(e) { /* rappel intelligent échoué, la tâche reste créée */ }
    }
  }

  // Email immédiat à l'agent assigné (silencieux si pas de session Outlook active)
  if (created && created[0] && body.apporteur_id) {
    const agent = allAgents.find(a => a.id === body.apporteur_id);
    if (agent) { try { await sendTaskAssignmentEmail(created[0], agent); } catch(e) {} }
  }

  allRappels = await dbGet('rappels', 'select=*');
  navigate('rappels');
}
