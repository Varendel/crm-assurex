<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRM Assurex</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Assurex CRM"/>
<meta name="theme-color" content="#0f172a"/>
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #111827; color: #e2e8f0; min-height: 100vh; font-weight: 700; }
  :root {
    --bg: #111827; --surface: #1a2235; --surface-alt: #1f2a40;
    --surface-hover: #243050; --border: #2a3550;
    --accent: #38bdf8; --accent-dim: rgba(56,189,248,0.1); --accent-border: rgba(56,189,248,0.3);
    --text: #e2e8f0; --text-muted: #64748b; --text-dim: #334155;
    --gold: #f59e0b; --gold-dim: rgba(245,158,11,0.1);
    --red: #f87171; --red-dim: rgba(248,113,113,0.1);
    --green: #4ade80; --green-dim: rgba(74,222,128,0.1);
    --purple: #a78bfa; --navy: #0f172a;
  }
  input, select, textarea, button { font-family: inherit; }
  .hidden { display: none !important; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; background: var(--navy);
    display: flex; align-items: center; justify-content: center;
    background-image: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.06) 0%, transparent 60%);
  }
  .login-box { width: 100%; max-width: 420px; padding: 0 24px; }
  .login-logo { text-align: center; margin-bottom: 36px; }
  .login-logo img { width: 200px; filter: brightness(0) invert(1); margin-bottom: 8px; }
  .login-logo .sub { font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .login-logo .subsub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
  .exgroupe-mention { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  .exgroupe-mention span { font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .exgroupe-logo { width: 130px; height: auto; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
  .login-card h2 { font-size: 17px; font-weight: 800; color: var(--text); text-align: center; margin-bottom: 24px; }
  .btn-microsoft {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #fff; color: #1a1a1a; border: none; border-radius: 10px;
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 20px;
    transition: opacity 0.15s;
  }
  .btn-microsoft:hover { opacity: 0.9; }
  .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
  .divider span { font-size: 11px; color: var(--text-muted); font-weight: 600; }
  .field-label { display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 0.8px; text-transform: uppercase; }
  .field-input {
    width: 100%; background: var(--surface-alt); border: 1px solid var(--border);
    border-radius: 9px; padding: 10px 14px; color: var(--text); font-size: 13px; outline: none;
  }
  .field-input:focus { border-color: var(--accent-border); }
  .field-wrap { margin-bottom: 14px; }
  .pass-wrap { position: relative; }
  .pass-wrap .field-input { padding-right: 40px; }
  .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; }
  .btn-primary {
    width: 100%; background: var(--accent); color: var(--navy); border: none;
    border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 800; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:disabled { opacity: 0.5; cursor: default; }
  .btn-primary:hover:not(:disabled) { opacity: 0.9; }
  .error-box { background: var(--red-dim); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 8px 12px; font-size: 12px; color: var(--red); margin-bottom: 16px; font-weight: 600; }
  .demo-box { margin-top: 18px; background: var(--surface-alt); border-radius: 9px; padding: 12px 14px; border: 1px solid var(--border); }
  .demo-box .demo-title { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .demo-item { display: flex; justify-content: space-between; padding: 5px 0; cursor: pointer; border: none; background: none; width: 100%; }
  .demo-item:hover .demo-email { opacity: 0.8; }
  .demo-email { font-size: 11px; font-weight: 700; }
  .demo-pass { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .login-footer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--text-dim); }

  /* APP */
  #app { display: none; min-height: 100vh; flex-direction: row; }
  #app.active { display: flex; }

  /* SIDEBAR */
  .sidebar {
    width: 215px; background: var(--navy); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 18px 10px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto; flex-shrink: 0;
  }
  .sidebar-logo { padding: 2px 8px 22px; }
  .sidebar-logo img { width: 100%; max-width: 155px; filter: brightness(0) invert(1); }
  .sidebar-logo .cofidex { font-size: 9px; color: var(--text-muted); font-weight: 700; letter-spacing: 1.5px; margin-top: 4px; }
  .nav-section-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 8px 10px; background: none; border: none; cursor: pointer;
    font-weight: 700; font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    text-align: left; color: var(--text-muted); transition: color 0.15s;
  }
  .nav-section-btn.active { color: var(--accent); }
  .nav-section-btn .arrow { margin-left: auto; font-size: 9px; }
  .nav-solo-btn {
    display: flex; align-items: center; gap: 8px; width: 100%;
    padding: 10px 10px; background: none; border: none; cursor: pointer;
    font-weight: 800; font-size: 13.5px; text-align: left; color: var(--text);
    border-radius: 8px; margin-bottom: 14px; transition: all 0.1s;
  }
  .nav-solo-btn:hover { background: var(--surface); }
  .nav-solo-btn.active { background: var(--accent-dim); color: var(--accent); }
  .nav-solo-logo { padding: 12px 14px; }
  .nav-solo-logo.active { background: rgba(255,255,255,0.08); }
  .nav-solo-logo .oz-logo-svg { height: 16px; width: auto; display: block; }
  .nav-item {
    display: flex; align-items: center; width: 100%;
    padding: 7px 10px 7px 26px; background: none; border: none; cursor: pointer;
    font-size: 12.5px; font-weight: 700; text-align: left; color: var(--text-muted);
    border-radius: 7px; margin-bottom: 1px; transition: all 0.1s;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active { background: var(--accent-dim); color: var(--accent); font-weight: 700; }
  .nav-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--accent); margin-right: 6px; }
  .sidebar-team { margin-top: auto; border-top: 1px solid var(--border); padding-top: 14px; }
  .team-title { font-size: 9px; font-weight: 700; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; padding-left: 8px; margin-bottom: 8px; }
  .team-member { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 7px; }
  .team-member.me { background: var(--accent-dim); }
  .avatar { border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: monospace; flex-shrink: 0; }
  .online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: auto; }
  .btn-logout { margin-top: 12px; width: 100%; background: none; border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; color: var(--text-muted); font-size: 11px; font-weight: 700; cursor: pointer; text-align: left; }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* MAIN */
  .main { flex: 1; padding: 30px 34px; overflow-y: auto; }

  /* CARDS */
  .stat-grid { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; flex: 1; min-width: 120px; }
  .stat-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 7px; }
  .stat-value { font-size: 22px; font-weight: 800; line-height: 1.1; }
  .stat-sub { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .table-header { display: grid; padding: 9px 16px; border-bottom: 1px solid var(--border); font-size: 10px; color: var(--text-muted); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .table-row { display: grid; padding: 11px 16px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.1s; cursor: pointer; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: var(--surface-hover); }
  .table-empty { padding: 24px 16px; color: var(--text-muted); font-size: 13px; text-align: center; }

  /* BADGE */
  .badge { border-radius: 5px; padding: 2px 8px; font-size: 11px; font-weight: 700; white-space: nowrap; display: inline-block; }

  /* SECTION CARD */
  .section-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 14px; }
  .section-card-header { padding: 12px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
  .section-card-body { padding: 18px; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .info-block { background: var(--surface-alt); border-radius: 9px; padding: 10px 14px; }
  .info-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .info-value { color: var(--text); font-size: 13px; font-weight: 600; }

  /* TABS */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .postit-note {
    position: relative; width: 150px; min-height: 130px; padding: 16px 12px 10px;
    box-shadow: 2px 4px 10px rgba(0,0,0,0.35), 0 1px 0 rgba(255,255,255,0.4) inset;
    font-family: 'Comic Sans MS', 'Marker Felt', cursive, sans-serif;
    flex-shrink: 0; transition: transform 0.15s;
  }
  .postit-note:hover { transform: rotate(0deg) scale(1.04) !important; z-index: 5; box-shadow: 3px 6px 16px rgba(0,0,0,0.45); }
  .postit-note::before {
    content: ''; position: absolute; top: -8px; left: 50%; transform: translateX(-50%);
    width: 26px; height: 14px; background: rgba(255,255,255,0.55); border-radius: 2px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .postit-text {
    width: 100%; height: 100px; background: transparent; border: none; resize: none;
    font-family: inherit; font-size: 13.5px; color: #3a3a1a; line-height: 1.4; outline: none;
  }
  .postit-close {
    position: absolute; top: 2px; right: 6px; background: none; border: none; cursor: pointer;
    font-size: 15px; color: rgba(0,0,0,0.35); font-weight: 700; line-height: 1; padding: 2px;
  }
  .postit-close:hover { color: rgba(0,0,0,0.7); }
  .postit-add {
    width: 60px; height: 130px; border: 2px dashed var(--border); background: none; border-radius: 6px;
    color: var(--text-muted); font-size: 13px; cursor: pointer; flex-shrink: 0;
  }
  .postit-add:hover { border-color: var(--accent); color: var(--accent); }
  .tab-btn { background: none; border: none; cursor: pointer; padding: 9px 14px; font-size: 12.5px; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; }
  .tab-btn.active { color: var(--accent); font-weight: 800; border-bottom-color: var(--accent); }

  /* FORM */
  .form-field { background: var(--surface-alt); border-radius: 9px; padding: 10px 14px; margin-bottom: 10px; }
  .form-label { color: var(--text-muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; font-family: inherit; font-weight: 700; }
  .form-select { width: 100%; background: transparent; border: none; color: var(--text); font-size: 13px; outline: none; font-family: inherit; font-weight: 700; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* KANBAN */
  .kanban { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; }
  .kanban-col { flex: 1; min-width: 170px; }
  .kanban-col-title { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
  .kanban-dot { width: 8px; height: 8px; border-radius: 50%; }
  .kanban-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .kanban-empty { font-size: 11px; color: var(--text-dim); padding: 10px 0; text-align: center; }

  /* RAPPEL */
  .rappel-item { display: flex; align-items: center; gap: 14px; padding: 13px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; }
  .urgence-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .btn-traite { background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,0.3); border-radius: 7px; padding: 5px 12px; font-size: 11px; font-weight: 800; cursor: pointer; }

  /* BORDEREAU */
  .bordereau-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 10px; }
  .bordereau-header { display: flex; align-items: center; gap: 16px; padding: 16px 18px; cursor: pointer; transition: background 0.1s; }
  .bordereau-header:hover { background: var(--surface-hover); }
  .bordereau-body { border-top: 1px solid var(--border); padding: 14px 18px; }

  /* NOUVEAU CLIENT */
  .btn-secondary { background: var(--surface); color: var(--text-muted); border: 1px solid var(--border); border-radius: 9px; padding: 10px 20px; font-weight: 700; font-size: 13px; cursor: pointer; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-save { background: var(--accent); color: var(--navy); border: none; border-radius: 9px; padding: 10px 24px; font-weight: 800; font-size: 13px; cursor: pointer; }
  .btn-save:hover { opacity: 0.9; }
  .btn-add { background: var(--accent); color: var(--navy); border: none; border-radius: 8px; padding: 8px 16px; font-weight: 800; font-size: 13px; cursor: pointer; }

  /* PROGRESS BAR */
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; }
  .progress-fill { height: 100%; border-radius: 99px; }

  /* LOADING */
  .loader { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

  /* PRINT */
  @media print {
    #login-screen { display: none !important; }
    .sidebar { display: none !important; }
    .btn-save, .btn-secondary, button[onclick*="print"], button[onclick*="navigate"] { display: none !important; }
    .main { padding: 0 !important; }
    body { background: white !important; color: black !important; }
    .print-header { display: block !important; }
    .section-card { border: 1px solid #ccc !important; background: white !important; }
    .section-card-header { background: #f5f5f5 !important; }
    .section-card-header span { color: #0284c7 !important; background: none !important; }
    .section-card-header div { background: #7dd3fc !important; }
    .info-block, .form-field { background: #fafafa !important; border: 1px solid #eee !important; }
    .info-value, .info-label, .form-label, .form-input, .stat-value, .stat-label { color: black !important; }
    h2 { color: black !important; }
    [style*="color:#38bdf8"], [style*="color: #38bdf8"] { color: #0284c7 !important; }
    .oz-screen-only { display: none !important; }
    .oz-print-report { display: block !important; color: black !important; }
    .fiche-commission-print { background: white !important; border: 1px solid #ccc !important; }
    .fiche-commission-print * { color: black !important; }
    .fiche-commission-print button { display: none !important; }
  }
  .oz-print-report { display: none; }
  /* RESPONSIVE */
  @media (max-width: 768px) {
    .sidebar { width: 180px; }
    .main { padding: 20px 16px; }
    .stat-card { min-width: 100px; }
    .form-grid { grid-template-columns: 1fr; }
    .info-grid { grid-template-columns: 1fr; }
    .table-header { display: none !important; }
    .table-row { grid-template-columns: 1fr !important; gap: 4px !important; padding: 12px !important; }
    .table-row > div { white-space: normal !important; }
  }
</style>
</head>

<script>
// ═══ CONFIG ═══
const SUPABASE_URL = 'https://gutlkjovmsyazwcomoyt.supabase.co';
const AI_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/ai-assistant`;
const SUPABASE_KEY = 'sb_publishable_DJtZwHKeA5X1ck1coAQFOA_xOd7c02i';

// ═══ AUTOCOMPLÉTION ADRESSES SUISSES (swisstopo geo.admin.ch — sans clé, CORS OK) ═══
const CANTON_MAP = {
  'AG':'AG','AI':'AI','AR':'AR','BE':'BE','BL':'BL','BS':'BS','FR':'FR','GE':'GE',
  'GL':'GL','GR':'GR','JU':'JU','LU':'LU','NE':'NE','NW':'NW','OW':'OW','SG':'SG',
  'SH':'SH','SO':'SO','SZ':'SZ','TG':'TG','TI':'TI','UR':'UR','VD':'VD','VS':'VS',
  'ZG':'ZG','ZH':'ZH',
};

let _addrDebounceTimer = null;
let _addrDropdown = null;

// Parse le champ "detail" de geo.admin.ch : "rue de la paix 1 1003 lausanne 5586 lausanne ch vd"
function _parseGeoDetail(detail) {
  if (!detail) return {};
  const parts = detail.trim().split(' ');
  const canton = CANTON_MAP[parts[parts.length - 1]?.toUpperCase()] || '';
  // NPA = premier token qui est un nombre à 4 chiffres
  let npaIdx = -1;
  for (let i = 0; i < parts.length; i++) {
    if (/^\d{4}$/.test(parts[i])) { npaIdx = i; break; }
  }
  const npa = npaIdx >= 0 ? parts[npaIdx] : '';
  const rue = npaIdx > 0 ? parts.slice(0, npaIdx).map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ') : '';
  // Ville = mot(s) après NPA jusqu'au prochain nombre ou "ch"
  let ville = '';
  if (npaIdx >= 0) {
    const rest = parts.slice(npaIdx + 1);
    const stopIdx = rest.findIndex(w => /^\d+$/.test(w) || w === 'ch');
    const villeWords = stopIdx >= 0 ? rest.slice(0, stopIdx) : rest.slice(0, 2);
    ville = villeWords.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }
  return { rue, npa, ville, canton };
}

function initAdresseAutocomplete(inputId, onSelect) {
  const input = document.getElementById(inputId);
  if (!input) return;
  input.setAttribute('autocomplete', 'off');
  input.addEventListener('input', () => {
    clearTimeout(_addrDebounceTimer);
    const q = input.value.trim();
    if (q.length < 3) { _closeAddrDropdown(); return; }
    _addrDebounceTimer = setTimeout(() => _fetchAddrSuggestions(q, input, onSelect), 300);
  });
  input.addEventListener('blur', () => setTimeout(_closeAddrDropdown, 200));
}

async function _fetchAddrSuggestions(q, input, onSelect) {
  try {
    const url = `https://api3.geo.admin.ch/rest/services/api/SearchServer?searchText=${encodeURIComponent(q)}&type=locations&origins=address&limit=8&lang=fr`;
    const r = await fetch(url);
    if (!r.ok) return;
    const data = await r.json();
    _showAddrDropdown(data.results || [], input, onSelect);
  } catch(e) { console.error('Addr autocomplete error', e); }
}

function _showAddrDropdown(results, input, onSelect) {
  _closeAddrDropdown();
  if (!results.length) return;
  const rect = input.getBoundingClientRect();
  const dd = document.createElement('div');
  dd.id = 'addr-autocomplete-dd';
  dd.style.cssText = `position:fixed;top:${rect.bottom + 2}px;left:${rect.left}px;width:${Math.max(rect.width, 320)}px;background:#1e293b;border:1px solid #334155;border-radius:10px;z-index:99999;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.5);max-height:260px;overflow-y:auto`;
  results.forEach(res => {
    const attrs = res.attrs || {};
    const parsed = _parseGeoDetail(attrs.detail);
    const label = attrs.label ? attrs.label.replace(/<[^>]+>/g, '') : '';
    if (!label) return;
    const item = document.createElement('div');
    item.style.cssText = 'padding:10px 14px;cursor:pointer;font-size:13px;color:#e2e8f0;border-bottom:1px solid #1e293b;line-height:1.4;transition:background 0.1s';
    item.innerHTML = `<div style="font-weight:700">${label}</div>${parsed.canton ? `<div style="font-size:11px;color:#94a3b8">Canton ${parsed.canton}</div>` : ''}`;
    item.addEventListener('mousedown', () => { onSelect(parsed); _closeAddrDropdown(); });
    item.addEventListener('mouseover', () => item.style.background = '#0f172a');
    item.addEventListener('mouseout', () => item.style.background = 'transparent');
    dd.appendChild(item);
  });
  if (!dd.children.length) return;
  document.body.appendChild(dd);

// Raccourci recherche Zefix (registre du commerce) — ouvre la recherche pré-remplie dans un nouvel onglet
// À remplacer par une auto-complétion intégrée une fois les identifiants API obtenus (zefix@bj.admin.ch)
function rechercheZefix(inputId) {
  const nom = (document.getElementById(inputId)?.value || '').trim();
  const url = nom
    ? `https://www.zefix.ch/fr/search/entity/list?name=${encodeURIComponent(nom)}&searchType=exact`
    : `https://www.zefix.ch/fr/search/entity/list`;
  window.open(url, '_blank');
}

function bindAdresseAutocomplete(fieldMap) {
  const { adresseId, npaId, villeId, cantonId } = fieldMap;
  const adresseInput = document.getElementById(adresseId);
  if (!adresseInput) return;
  initAdresseAutocomplete(adresseId, ({ rue, npa, ville, canton }) => {
    if (adresseInput) adresseInput.value = rue;
    if (npaId) { const el = document.getElementById(npaId); if (el) el.value = npa; }
    if (villeId) { const el = document.getElementById(villeId); if (el) el.value = ville; }
    if (cantonId) { const el = document.getElementById(cantonId); if (el) el.value = canton; }
  });
}

// ═══ SESSION SUPABASE AUTH ═══
let supaSession = null; // { access_token, refresh_token, expires_at, email }

function saveSession(s) {
  supaSession = s;
  try { localStorage.setItem('crm_session', JSON.stringify(s)); } catch(e) {}
}

function clearSession() {
  supaSession = null;
  try { localStorage.removeItem('crm_session'); } catch(e) {}
}

function loadStoredSession() {
  try {
    const raw = localStorage.getItem('crm_session');
    if (raw) supaSession = JSON.parse(raw);
  } catch(e) { supaSession = null; }
  return supaSession;
}

// Retourne un token d'accès valide, en le rafraîchissant si besoin
// ═══ JOURNAL D'AUDIT (traçabilité nLPD) ═══
async function logAction(action, tableName, recordId, detail) {
  try {
    if (!supaSession || !supaSession.email) return; // pas de log si pas connecté
    await dbPost('audit_log', {
      user_email: supaSession.email,
      action,
      table_name: tableName || null,
      record_id: recordId || null,
      detail: detail || null,
    });
  } catch(e) { /* le journal ne doit jamais bloquer l'usage normal */ }
}

async function getValidAccessToken() {
  if (!supaSession) return null;
  const now = Math.floor(Date.now() / 1000);
  if (supaSession.expires_at && supaSession.expires_at - now > 60) {
    return supaSession.access_token;
  }
  // Token expiré ou proche de l'expiration → refresh
  try {
    const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: supaSession.refresh_token }),
    });
    if (!r.ok) { clearSession(); return null; }
    const data = await r.json();
    saveSession({
      access_token: data.access_token,
      refresh_token: data.refresh_token,
      expires_at: now + (data.expires_in || 3600),
      email: supaSession.email,
    });
    return supaSession.access_token;
  } catch(e) { return null; }
}

async function supabaseAuthLogin(email, password) {
  const r = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { apikey: SUPABASE_KEY, 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password }),
  });
  const data = await r.json();
  if (!r.ok) return { error: true, message: data.error_description || data.msg || 'Échec de connexion' };
  const now = Math.floor(Date.now() / 1000);
  saveSession({
    access_token: data.access_token,
    refresh_token: data.refresh_token,
    expires_at: now + (data.expires_in || 3600),
    email,
  });
  return { error: false };
}

async function supabaseAuthLogout() {
  try {
    const token = await getValidAccessToken();
    if (token) {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: 'POST',
        headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` },
      });
    }
  } catch(e) {}
  clearSession();
}

// ═══ SUPABASE ═══
async function dbGet(table, params = '') {
  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}` }
    });
    if (!r.ok) { console.error(`dbGet(${table}) HTTP ${r.status}`); return []; }
    const data = await r.json();
    return Array.isArray(data) ? data : [];
  } catch(e) { console.error(`dbGet(${table}) exception`, e); return []; }
}

async function dbPost(table, body) {
  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json', Prefer: 'return=representation' },
      body: JSON.stringify(body)
    });
    const data = await r.json();
    if (!r.ok) {
      console.error('Supabase error', r.status, data);
      return { error: true, status: r.status, detail: data };
    }
    return data;
  } catch(e) {
    console.error('Network error', e);
    return { error: true, detail: e.message };
  }
}

async function dbPatch(table, id, body) {
  try {
    const token = await getValidAccessToken() || SUPABASE_KEY;
    await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'PATCH',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } catch(e) {}
}

// ═══ MICROSOFT GRAPH — AGENDA ═══
async function fetchCalendarEvents() {
  if (!msalAccessToken) return [];
  try {
    const now = new Date();
    const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
    const end = new Date(now.getFullYear(), now.getMonth() + 2, 0).toISOString();
    const url = `https://graph.microsoft.com/v1.0/me/calendarView?startDateTime=${start}&endDateTime=${end}&$orderby=start/dateTime&$top=50`;
    const r = await fetch(url, { headers: { Authorization: `Bearer ${msalAccessToken}` } });
    if (!r.ok) { console.error('Graph API error', r.status); return []; }
    const data = await r.json();
    return data.value || [];
  } catch(e) { console.error('Graph fetch error', e); return []; }
}

// ═══ MICROSOFT GRAPH — SYNC RAPPELS → OUTLOOK ═══
async function createOutlookEventFromRappel(rappel) {
  if (!msalAccessToken || !rappel.date_echeance) return null;
  try {
    const client = rappel.client_id ? allClients.find(c => c.id === rappel.client_id) : null;
    const clientLine = client ? `Client : ${client.prenom} ${client.nom}\n` : '';
    const body = {
      subject: `🔔 ${rappel.titre}`,
      isAllDay: true,
      start: { dateTime: rappel.date_echeance, timeZone: 'Europe/Zurich' },
      end: { dateTime: rappel.date_echeance, timeZone: 'Europe/Zurich' },
      body: { contentType: 'text', content: `${clientLine}Type : ${rappel.type || ''}\nUrgence : ${rappel.urgence || ''}\n\n${rappel.notes || ''}` },
    };
    const r = await fetch('https://graph.microsoft.com/v1.0/me/events', {
      method: 'POST',
      headers: { Authorization: `Bearer ${msalAccessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!r.ok) { console.error('Graph create event error', r.status); return null; }
    const data = await r.json();
    return data.id || null;
  } catch(e) { console.error('Graph create event exception', e); return null; }
}

async function deleteOutlookEvent(eventId) {
  if (!msalAccessToken || !eventId) return;
  try {
    await fetch(`https://graph.microsoft.com/v1.0/me/events/${eventId}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${msalAccessToken}` },
    });
  } catch(e) { console.error('Graph delete event exception', e); }
}

// ═══ WIDGET CALENDRIER (style "widget iPhone") sur le Dashboard ═══
let dashboardFocusDay = new Date(); // jour mis en avant dans la vue agrandie

function startOfWeek(d) {
  const date = new Date(d);
  const day = date.getDay(); // 0=dim
  const diff = day === 0 ? -6 : 1 - day; // lundi = début de semaine
  date.setDate(date.getDate() + diff);
  date.setHours(0,0,0,0);
  return date;
}
function isSameDay(a, b) { return a.toDateString() === b.toDateString(); }
function isoDay(d) { return d.toISOString().slice(0,10); }

function eventsForDay(d) {
  return calendarEvents.filter(ev => {
    const start = ev.start && ev.start.dateTime ? new Date(ev.start.dateTime) : null;
    return start && isSameDay(start, d);
  }).sort((a,b) => new Date(a.start.dateTime) - new Date(b.start.dateTime));
}

function selectDashboardDay(iso) {
  dashboardFocusDay = new Date(iso + 'T12:00:00');
  renderCalendarWidget();
}

function shiftDashboardWeek(days) {
  if (days === 0) { dashboardFocusDay = new Date(); }
  else { const d = new Date(dashboardFocusDay); d.setDate(d.getDate() + days); dashboardFocusDay = d; }
  renderCalendarWidget();
}

function renderCalendarWidget() {
  const el = document.getElementById('calendar-widget-container');
  if (!el) return;
  const today = new Date();
  const weekStart = startOfWeek(dashboardFocusDay);
  const joursLabels = ['L','M','M','J','V','S','D'];
  const weekDays = [...Array(7)].map((_,i) => { const d = new Date(weekStart); d.setDate(weekStart.getDate()+i); return d; });

  const dayPills = weekDays.map((d, i) => {
    const isToday = isSameDay(d, today);
    const isFocus = isSameDay(d, dashboardFocusDay);
    const nbEv = eventsForDay(d).length;
    return `<button onclick="selectDashboardDay('${isoDay(d)}')" style="
      display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;background:none;border:none;cursor:pointer;padding:6px 2px;border-radius:10px;
      ${isFocus ? 'background:var(--accent-dim);' : ''}">
      <span style="font-size:10px;color:var(--text-muted);font-weight:700">${joursLabels[i]}</span>
      <span style="width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;
        ${isToday ? 'background:var(--accent);color:#fff;' : isFocus ? 'color:var(--accent);' : 'color:var(--text);'}">${d.getDate()}</span>
      ${nbEv > 0 ? `<span style="width:4px;height:4px;border-radius:50%;background:${isFocus?'var(--accent)':'var(--text-muted)'}"></span>` : '<span style="width:4px;height:4px"></span>'}
    </button>`;
  }).join('');

  // Vue agrandie : jour sélectionné + jour suivant
  const dayNext = new Date(dashboardFocusDay); dayNext.setDate(dashboardFocusDay.getDate() + 1);
  const focusLabel = isSameDay(dashboardFocusDay, today) ? "Aujourd'hui" : dashboardFocusDay.toLocaleDateString('fr-CH', { weekday:'long', day:'numeric', month:'long' });
  const nextLabel = isSameDay(dayNext, today) ? "Aujourd'hui" : dayNext.toLocaleDateString('fr-CH', { weekday:'long', day:'numeric', month:'long' });

  function dayCard(date, label) {
    const evs = eventsForDay(date);
    return `<div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">${label}</div>
      ${evs.length ? evs.map(ev => {
        const start = new Date(ev.start.dateTime);
        const end = ev.end && ev.end.dateTime ? new Date(ev.end.dateTime) : null;
        const heure = ev.isAllDay ? 'Jour entier' : start.toLocaleTimeString('fr-CH', { hour:'2-digit', minute:'2-digit' }) + (end ? ' – ' + end.toLocaleTimeString('fr-CH',{hour:'2-digit',minute:'2-digit'}) : '');
        return `<div style="display:flex;gap:8px;margin-bottom:8px;background:var(--surface-alt);border-left:3px solid var(--accent);border-radius:8px;padding:8px 10px">
          <div style="flex:1;min-width:0">
            <div style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.subject || 'Sans titre'}</div>
            <div style="font-size:10.5px;color:var(--text-muted);margin-top:1px">${heure}${ev.location && ev.location.displayName ? ' · ' + ev.location.displayName : ''}</div>
          </div>
        </div>`;
      }).join('') : `<div style="font-size:11.5px;color:var(--text-muted);padding:8px 0">Aucun rendez-vous</div>`}
    </div>`;
  }

  el.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:13px;font-weight:800;color:var(--text)">📅 Agenda de la semaine</div>
        <div style="display:flex;align-items:center;gap:10px">
          <button onclick="shiftDashboardWeek(-7)" style="background:var(--surface-alt);border:1px solid var(--border);border-radius:7px;width:26px;height:26px;color:var(--text-muted);cursor:pointer;font-size:13px;line-height:1">‹</button>
          <button onclick="shiftDashboardWeek(0)" style="background:none;border:none;color:var(--text-muted);font-size:10.5px;font-weight:700;cursor:pointer">Aujourd'hui</button>
          <button onclick="shiftDashboardWeek(7)" style="background:var(--surface-alt);border:1px solid var(--border);border-radius:7px;width:26px;height:26px;color:var(--text-muted);cursor:pointer;font-size:13px;line-height:1">›</button>
          <button onclick="navigate('agenda')" style="background:none;border:none;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;margin-left:4px">Vue complète →</button>
        </div>
      </div>
      <div style="display:flex;gap:2px;margin-bottom:16px">${dayPills}</div>
      <div style="display:flex;gap:18px;border-top:1px solid var(--border);padding-top:14px;flex-wrap:wrap">
        ${dayCard(dashboardFocusDay, focusLabel)}
        ${dayCard(dayNext, nextLabel)}
      </div>
    </div>`;
}

function togglePass() {

function showError(msg) {
  const loginEl = document.getElementById('login-error');
  if (loginEl && !document.getElementById('app').classList.contains('active')) {
    loginEl.textContent = '⚠ ' + msg;
    loginEl.classList.remove('hidden');
    return;
  }
  let toast = document.getElementById('global-error-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'global-error-toast';
    toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#7f1d1d;border:1px solid #f87171;color:#fecaca;padding:14px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:9999;max-width:380px;box-shadow:0 8px 24px rgba(0,0,0,0.4)';
    document.body.appendChild(toast);
  }
  toast.textContent = '⚠ ' + msg;
  toast.style.display = 'block';
  clearTimeout(window._errorToastTimeout);
  window._errorToastTimeout = setTimeout(() => { toast.style.display = 'none'; }, 6000);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pwd = document.getElementById('login-pass').value;
  if (!email || !pwd) { showError('Email et mot de passe requis.'); return; }
  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.textContent = 'Connexion...'; btn.disabled = true; }
  const res = await supabaseAuthLogin(email, pwd);
  if (btn) { btn.textContent = 'Se connecter'; btn.disabled = false; }
  if (res.error) { showError('Email ou mot de passe incorrect.'); return; }
  document.getElementById('login-error').classList.add('hidden');

  // Propose au navigateur d'enregistrer les identifiants (SPA = pas de rechargement de page,
  // donc on déclenche explicitement la sauvegarde via l'API Credential Management)
  if (window.PasswordCredential) {
    try {
      const cred = new PasswordCredential({ id: email, password: pwd, name: email });
      await navigator.credentials.store(cred);
    } catch(e) { /* ignore si non supporté */ }
  }

  const userData = USER_ROLES[email] || { prenom: email.split('@')[0], nom: '', role: 'apporteur', taux: 50 };
  enterApp({ id: email, prenom: userData.prenom, nom: userData.nom, email, role: userData.role, taux: userData.taux });
}

async function enterApp(user) {
  currentUser = user;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  logAction('login', null, null, `${user.prenom} ${user.nom}`);
  allAgents = await dbGet('agents', 'select=*');
  allClients = await dbGet('clients', 'select=*');
  allRappels = await dbGet('rappels', 'select=*');
  allBordereaux = await dbGet('bordereaux', 'select=*');
  allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  allContrats = await dbGet('contrats', 'select=*');
  allOpportunites = await dbGet('opportunites', 'select=*');

  if (user.role === 'signataire') {
    try {
      const ozRows = await dbGet('commissions_oz', 'select=date_mouvement,debit,credit');
      const parAnnee = {};
      (ozRows || []).forEach(r => {
        const annee = (r.date_mouvement || '').slice(0, 4);
        if (!annee) return;
        parAnnee[annee] = (parAnnee[annee] || 0) + (Number(r.credit||0) - Number(r.debit||0));
      });
      ozAnnualSummary = parAnnee;
    } catch(e) { ozAnnualSummary = null; }
  }

  renderSidebar();
  navigate('dashboard');
}

async function logout() {
  logAction('logout', null, null, currentUser ? `${currentUser.prenom} ${currentUser.nom}` : null);
  await supabaseAuthLogout();
  currentUser = null;

// ═══ CLASSIFICATION VIE / NON-VIE ═══
// Produits VIE = prévoyance, vie, 3a, LPP, perte de gain, santé collective, LAA, IJM
const PRODUITS_VIE_KEYWORDS = [
  'vie','3a','lpp','libre passage','prévoyance','perte de gain','perte gain',
  'laa','ijm','santé collective','maladie collective','accident collective',
  'sursalaire','complémentaire santé','sante_complementaire','prevoyance',
  'libre_passage','vie_3a','lpp_entreprise','laa','perte_gain','sante_collective',
  'prevoyance_enfant'
];

// ═══ TAXONOMIE FINMA — Classification des contrats par branche d'assurance ═══
// Mapping mots-clés produit → branche FINMA (registre des intermédiaires, art. 183 OS)
const BRANCHES_FINMA = [
  { code: 'A1', label: 'Vie individuelle (LCA)', keywords: ['vie privé','vie individuelle','assurance vie'] },
  { code: 'A2', label: 'Prévoyance liée (3a)', keywords: ['3a','pilier 3a'] },
  { code: 'A3', label: 'Libre passage / LPP', keywords: ['lpp','libre passage','2e pilier'] },
  { code: 'B1', label: 'Maladie de base (LAMal)', keywords: ['lamal','maladie de base','assurance maladie (lamal)'] },
  { code: 'B2', label: 'Maladie complémentaire (LCA)', keywords: ['complémentaire','maladie (complémentaire)'] },
  { code: 'B3', label: 'Perte de gain maladie', keywords: ['perte de gain (maladie','perte de gain maladie'] },
  { code: 'C1', label: 'Accidents (LAA / LAA-C)', keywords: ['laa','accident'] },
  { code: 'C2', label: 'Indemnités journalières (IJM)', keywords: ['ijm','indemnité journalière'] },
  { code: 'D1', label: 'RC privée / Ménage', keywords: ['responsabilité civile (ménage','rc privée','rc ménage'] },
  { code: 'D2', label: 'RC entreprise / professionnelle', keywords: ['responsabilité civile (entreprise','rc professionnelle','rc d&o','rc dirigeants'] },
  { code: 'E1', label: 'Véhicule à moteur', keywords: ['véhicule à moteur','casco','rc véhicule'] },
  { code: 'E2', label: 'Bâtiment / Choses', keywords: ['bâtiment','choses','inventaire ménage'] },
  { code: 'F1', label: 'Protection juridique', keywords: ['protection juridique'] },
  { code: 'F2', label: 'Voyage / Assistance', keywords: ['voyage','assistance'] },
  { code: 'G1', label: 'Garantie de loyer / Caution', keywords: ['garantie de loyer','caution'] },
  { code: 'H1', label: 'Animaux', keywords: ['animalière','animaux'] },
  { code: 'Z9', label: 'Autre / Non classé', keywords: [] },
];

function classifierBrancheFinma(produit) {
  const p = (produit || '').toLowerCase();
  for (const b of BRANCHES_FINMA) {
    if (b.keywords.some(kw => p.includes(kw))) return b;
  }
  return BRANCHES_FINMA[BRANCHES_FINMA.length - 1];
}

function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

    const b = classifierBrancheFinma(ct.produit);
    parBranche[b.code].nb++;
    parBranche[b.code].prime += Number(ct.prime_annuelle || 0);

  const lignes = Object.entries(parBranche).filter(([,v]) => v.nb > 0).sort((a,b) => b[1].prime - a[1].prime);

    <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px">Classification automatique des contrats actifs par branche d'assurance (registre des intermédiaires) — généré le ${dateRapport}</div>

    <div class="stat-grid" style="margin-bottom:24px">

function exportFinmaCsv() {
  const lignes = window._finmaLignes || [];
  let csv = 'Code;Branche FINMA;Nombre de contrats;Prime annuelle (CHF);Part (%)\n';
  const total = window._finmaTotalPrime || 1;
  lignes.forEach(([code, v]) => {
    csv += `${code};${v.label};${v.nb};${v.prime.toFixed(2)};${Math.round(v.prime/total*100)}\n`;
  });
  csv += `;TOTAL;${window._finmaTotalNb};${total.toFixed(2)};100\n`;
  downloadBlob(csv, `rapport_finma_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv;charset=utf-8');
}

function exportFinmaTxt() {
  const lignes = window._finmaLignes || [];
  const total = window._finmaTotalPrime || 0;
  let txt = `RAPPORT FINMA — Assurex Sàrl\n`;
  txt += `Généré le ${window._finmaDate}\n`;
  txt += `${'='.repeat(60)}\n\n`;
  lignes.forEach(([code, v]) => {
    txt += `${code}  ${v.label}\n`;
    txt += `     Contrats: ${v.nb}   Prime annuelle: CHF ${v.prime.toFixed(2)}   Part: ${total > 0 ? Math.round(v.prime/total*100) : 0}%\n\n`;
  });
  txt += `${'-'.repeat(60)}\n`;
  txt += `TOTAL — Contrats: ${window._finmaTotalNb}   Prime annuelle: CHF ${total.toFixed(2)}\n`;
  downloadBlob(txt, `rapport_finma_${new Date().toISOString().slice(0,10)}.txt`, 'text/plain;charset=utf-8');
}

function classifierContrat(ct, clientsMap) {
  const produit = (ct.produit || '').toLowerCase();
  const isVie = PRODUITS_VIE_KEYWORDS.some(kw => produit.includes(kw));
  const client = clientsMap[ct.client_id];
  const isEntreprise = client && client.segment === 'Entreprise';
  return { isVie, isEntreprise };
}

async function viewVolumePrimes() {
  // Charger tous les contrats actifs
  const [contrats, clients] = await Promise.all([
    dbGet('contrats', 'statut=eq.actif&select=*'),
    dbGet('clients', 'select=id,segment,prenom,nom'),
  ]);
  const clientsMap = {};
  (clients || []).forEach(c => clientsMap[c.id] = c);

  // Totaux globaux
  let totalVie = 0, totalNonVie = 0, totalPrive = 0, totalEntreprise = 0;

  // Détail par catégorie produit
  const parCategorie = {};
  // Détail par produit (top 10)
  const parProduit = {};
  // Détail par compagnie
  const parCompagnie = {};
  // Détail par catégorie, à l'intérieur de chaque segment (pour sous-détail des 4 carrés)
  const parCategorieVie = {}, parCategorieNonVie = {}, parCategoriePrive = {}, parCategorieEntreprise = {};

  (contrats || []).forEach(ct => {
    const prime = Number(ct.prime_annuelle || 0);
    if (!prime) return;
    const { isVie, isEntreprise } = classifierContrat(ct, clientsMap);
    const catLabel = (ct.produit || 'Autre').trim();

    if (isVie) { totalVie += prime; parCategorieVie[catLabel] = (parCategorieVie[catLabel]||0) + prime; }
    else { totalNonVie += prime; parCategorieNonVie[catLabel] = (parCategorieNonVie[catLabel]||0) + prime; }
    if (isEntreprise) { totalEntreprise += prime; parCategorieEntreprise[catLabel] = (parCategorieEntreprise[catLabel]||0) + prime; }
    else { totalPrive += prime; parCategoriePrive[catLabel] = (parCategoriePrive[catLabel]||0) + prime; }

    parCategorie[catLabel] = (parCategorie[catLabel] || 0) + prime;
    parProduit[ct.produit || 'Autre'] = (parProduit[ct.produit || 'Autre'] || 0) + prime;
    parCompagnie[ct.compagnie || 'Autre'] = (parCompagnie[ct.compagnie || 'Autre'] || 0) + prime;
  });

  function topDetail(obj, segTotal, max) {
    return Object.entries(obj).sort((a,b) => b[1]-a[1]).slice(0, max || 5).map(([label, val]) => ({
      label, val, pct: segTotal > 0 ? Math.round(val/segTotal*100) : 0,
    }));
  }
  function detailHtml(obj, segTotal, color) {
    const items = topDetail(obj, segTotal);
    if (!items.length) return '';
    return `<div style="margin-top:12px;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px">
      ${items.map(it => `
        <div style="display:flex;justify-content:space-between;align-items:baseline;font-size:11px;margin-bottom:5px">
          <div style="color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%">${it.label}</div>
          <div style="color:${color};font-weight:700;white-space:nowrap">${Math.round(it.val).toLocaleString('fr-CH')} CHF · ${it.pct}%</div>
        </div>`).join('')}
    </div>`;
  }

  const total = totalVie + totalNonVie;

  // Trier catégories par volume décroissant
  const categories = Object.entries(parCategorie).sort((a,b) => b[1]-a[1]);
  const topProduits = Object.entries(parProduit).sort((a,b) => b[1]-a[1]).slice(0, 10);

  function pct(val) { return total > 0 ? Math.round(val / total * 100) : 0; }
  function chf(val) { return 'CHF ' + Math.round(val).toLocaleString('fr-CH'); }
  function bar(val, color, maxVal) {
    const w = maxVal > 0 ? Math.round(val / maxVal * 100) : 0;
    return `<div style="height:8px;border-radius:4px;background:var(--border);margin-top:6px;overflow:hidden">
      <div style="height:100%;width:${w}%;background:${color};border-radius:4px;transition:width 0.4s"></div></div>`;
  }

  const maxCat = categories.length > 0 ? categories[0][1] : 1;
  const PALETTE_CIE = ['#38bdf8','#f59e0b','#a78bfa','#4ade80','#f87171','#fb923c','#22d3ee','#e879f9','#64748b'];
  const compagnies = Object.entries(parCompagnie).sort((a,b) => b[1]-a[1]);
  const totalCompagnies = compagnies.reduce((s,[,v]) => s+v, 0) || 1;
  let cumulCie = 0;
  const Rcie = 70, Ccie = 2 * Math.PI * Rcie;
  const donutCompagnies = compagnies.map(([comp, val], i) => {
    const frac = val / totalCompagnies;
    const dash = frac * Ccie;
    const offset = cumulCie * Ccie;
    cumulCie += frac;
    return `<circle cx="90" cy="90" r="${Rcie}" fill="none" stroke="${PALETTE_CIE[i % PALETTE_CIE.length]}" stroke-width="22"
      stroke-dasharray="${dash.toFixed(1)} ${(Ccie-dash).toFixed(1)}" stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 90 90)"/>`;
  }).join('');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)">Volume de primes</h2>
      <div style="font-size:13px;color:var(--text-muted)">Contrats actifs uniquement · ${(contrats||[]).filter(ct=>ct.prime_annuelle>0).length} contrats</div>
    </div>

    <!-- KPIs globaux -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px">
      ${[
        { label:'Total portefeuille', val:chf(total), color:'var(--accent)', sub:'' },
        { label:'Contrats actifs', val:(contrats||[]).length, color:'#64748b', sub:'avec prime' },
      ].map(k => `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px">
          <div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${k.label}</div>
          <div style="font-size:22px;font-weight:900;color:${k.color}">${k.val}</div>
          ${k.sub ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">${k.sub}</div>` : ''}
        </div>`).join('')}
    </div>

    <!-- Répartition par compagnie -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:20px">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:16px">Répartition par compagnie</div>
      <div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">
        <svg width="180" height="180" viewBox="0 0 180 180" style="flex-shrink:0">${donutCompagnies}
          <text x="90" y="86" text-anchor="middle" font-size="18" font-weight="900" fill="#fff">${compagnies.length}</text>
          <text x="90" y="104" text-anchor="middle" font-size="9" fill="#94a3b8">compagnies</text>
        </svg>
        <div style="flex:1;min-width:200px">
          ${compagnies.map(([comp,val],i) => `
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:12.5px">
              <div style="width:10px;height:10px;border-radius:50%;background:${PALETTE_CIE[i % PALETTE_CIE.length]};flex-shrink:0"></div>
              <div style="color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${comp}</div>
              <div style="color:var(--text-muted);font-weight:700;flex-shrink:0">${chf(val)} · ${Math.round(val/totalCompagnies*100)}%</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- VIE vs NON-VIE -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:var(--surface);border:2px solid rgba(167,139,250,0.3);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:#a78bfa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">🫀 VIE & Prévoyance</div>
        <div style="font-size:26px;font-weight:900;color:#a78bfa">${chf(totalVie)}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${pct(totalVie)}% du total</div>
        <div style="height:8px;border-radius:4px;background:var(--border);margin-top:12px;overflow:hidden">
          <div style="height:100%;width:${pct(totalVie)}%;background:#a78bfa;border-radius:4px"></div>
        </div>
        ${detailHtml(parCategorieVie, totalVie, '#a78bfa')}
      </div>
      <div style="background:var(--surface);border:2px solid rgba(56,189,248,0.3);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">🛡️ NON-VIE (IARD)</div>
        <div style="font-size:26px;font-weight:900;color:var(--accent)">${chf(totalNonVie)}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${pct(totalNonVie)}% du total</div>
        <div style="height:8px;border-radius:4px;background:var(--border);margin-top:12px;overflow:hidden">
          <div style="height:100%;width:${pct(totalNonVie)}%;background:var(--accent);border-radius:4px"></div>
        </div>
        ${detailHtml(parCategorieNonVie, totalNonVie, 'var(--accent)')}
      </div>
    </div>

    <!-- PRIVÉ vs ENTREPRISE -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:var(--surface);border:2px solid rgba(74,222,128,0.3);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:#4ade80;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">👤 Clients privés</div>
        <div style="font-size:26px;font-weight:900;color:#4ade80">${chf(totalPrive)}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${pct(totalPrive)}% du total</div>
        <div style="height:8px;border-radius:4px;background:var(--border);margin-top:12px;overflow:hidden">
          <div style="height:100%;width:${pct(totalPrive)}%;background:#4ade80;border-radius:4px"></div>
        </div>
        ${detailHtml(parCategoriePrive, totalPrive, '#4ade80')}
      </div>
      <div style="background:var(--surface);border:2px solid rgba(245,158,11,0.3);border-radius:14px;padding:20px">
        <div style="font-size:11px;font-weight:700;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">🏢 Entreprises</div>
        <div style="font-size:26px;font-weight:900;color:#f59e0b">${chf(totalEntreprise)}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:4px">${pct(totalEntreprise)}% du total</div>
        <div style="height:8px;border-radius:4px;background:var(--border);margin-top:12px;overflow:hidden">
          <div style="height:100%;width:${pct(totalEntreprise)}%;background:#f59e0b;border-radius:4px"></div>
        </div>
        ${detailHtml(parCategorieEntreprise, totalEntreprise, '#f59e0b')}
      </div>
    </div>

    <!-- Détail par catégorie -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:16px">Répartition par type de produit</div>
      ${categories.map(([cat, val]) => `
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:baseline">
            <div style="font-size:13px;font-weight:700;color:var(--text)">${cat}</div>
            <div style="font-size:13px;font-weight:800;color:var(--accent)">${chf(val)} <span style="font-size:11px;color:var(--text-muted);font-weight:400">(${pct(val)}%)</span></div>
          </div>
          ${bar(val, 'var(--accent)', maxCat)}
        </div>`).join('')}
    </div>

    <!-- Top 10 produits -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px">
      <div style="font-size:13px;font-weight:800;color:var(--text);margin-bottom:16px">Top produits par volume</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="color:var(--text-muted);font-size:11px;text-transform:uppercase">
          <th style="padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)">#</th>
          <th style="padding:6px 10px;text-align:left;border-bottom:1px solid var(--border)">Produit</th>
          <th style="padding:6px 10px;text-align:right;border-bottom:1px solid var(--border)">Volume annuel</th>
          <th style="padding:6px 10px;text-align:right;border-bottom:1px solid var(--border)">Part</th>
        </tr></thead>
        <tbody>${topProduits.map(([prod, val], i) => `
          <tr style="border-bottom:1px solid var(--border)">
            <td style="padding:10px;color:var(--text-muted);font-weight:700">${i+1}</td>
            <td style="padding:10px;color:var(--text);font-weight:600">${prod}</td>
            <td style="padding:10px;text-align:right;font-weight:800;color:#f59e0b">${chf(val)}</td>
            <td style="padding:10px;text-align:right;color:var(--text-muted)">${pct(val)}%</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function viewPortefeuille(filtre) {
  const titre = filtre === 'prive' ? 'Clients privés' : filtre === 'entreprise' ? 'Entreprises' : 'Portefeuille complet';
  const agentOptions = allAgents.map(a => `<option value="${a.id}">${a.prenom} ${a.nom}</option>`).join('');

  setTimeout(() => renderPortefeuilleTable(filtre), 0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 style="margin:0;font-size:18px;font-weight:800;color:var(--text)" id="pf-titre">${titre}</h2>
      <button class="btn-add" onclick="navigate('nouveau-client')">+ Nouveau client</button>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap">
      <input class="form-input" id="pf-search" placeholder="🔍 Rechercher un nom, ville, email..." style="flex:1;min-width:200px" oninput="renderPortefeuilleTable('${filtre}')"/>
      <select class="form-select" id="pf-agent" style="max-width:200px" onchange="renderPortefeuilleTable('${filtre}')">
        <option value="">Tous les agents</option>${agentOptions}
      </select>
      <select class="form-select" id="pf-statut" style="max-width:160px" onchange="renderPortefeuilleTable('${filtre}')">
        <option value="">Tous statuts</option>
        <option value="actif">Actif</option>
        <option value="prospect">Prospect</option>
        <option value="inactif">Inactif</option>
      </select>
    </div>
    <div id="pf-stats" class="stat-grid" style="margin-bottom:20px"></div>
    <div id="pf-table-container"></div>`;
}

function renderPortefeuilleTable(filtre) {
  const base = filtre === 'tous' ? allClients :
    filtre === 'prive' ? allClients.filter(c => c.segment !== 'Entreprise') :
    allClients.filter(c => c.segment === 'Entreprise');

  const search = (document.getElementById('pf-search')?.value || '').toLowerCase().trim();
  const agentFilter = document.getElementById('pf-agent')?.value || '';
  const statutFilter = document.getElementById('pf-statut')?.value || '';

  const filtered = base.filter(c => {
    if (agentFilter && c.apporteur_id !== agentFilter) return false;
    if (statutFilter && c.statut !== statutFilter) return false;
    if (search) {
      const haystack = `${c.prenom||''} ${c.nom||''} ${c.ville||''} ${c.email||''} ${c.profession||''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  const totalCA = filtered.reduce((s,c) => s + caClient(c.id), 0);
  const actifs = filtered.filter(c => c.statut === 'actif').length;
  const prospects = filtered.filter(c => c.statut === 'prospect').length;

  document.getElementById('pf-titre').textContent = `${filtre === 'prive' ? 'Clients privés' : filtre === 'entreprise' ? 'Entreprises' : 'Portefeuille complet'} (${filtered.length})`;
  document.getElementById('pf-stats').innerHTML = `
    ${statCard('Total', filtered.length, '#e2e8f0')}
    ${statCard('Actifs', actifs, '#4ade80')}
    ${statCard('Prospects', prospects, '#f59e0b')}
    ${statCard('CA total', 'CHF ' + totalCA.toLocaleString(), '#38bdf8')}`;

  const cols = '1fr 140px 85px 90px 100px 55px';
  const rows = filtered.map(c => {
    const agent = agentById(c.apporteur_id);
    const ca = caClient(c.id);
    return `<div class="table-row" style="grid-template-columns:${cols}" onclick="showClient('${c.id}')">
      <div>
        <div style="font-weight:700;font-size:13px;color:var(--text)">${c.prenom} ${c.nom}</div>
        <div style="font-size:11px;color:var(--text-muted)">${c.ville || ''} · ${c.profession || ''}</div>
      </div>
      <div><div style="font-size:11px;color:var(--text)">${c.email || ''}</div><div style="font-size:11px;color:var(--text-muted)">${c.mobile || ''}</div></div>
      <div>${badge(c.statut || '—', statutColor(c.statut))}</div>
      <div>${badge(c.segment || 'Privé', c.segment === 'Entreprise' ? '#f59e0b' : '#38bdf8')}</div>
      <div style="font-size:12px;font-weight:700;color:#f59e0b">${ca ? 'CHF ' + ca.toLocaleString() : '—'}</div>
      <div>${agent ? avatar(agent, 26) : ''}</div>
    </div>`;
  }).join('') || '<div class="table-empty">Aucun client ne correspond à ces filtres.</div>';

  document.getElementById('pf-table-container').innerHTML = `
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}">
        <div>Client</div><div>Contact</div><div>Statut</div><div>Segment</div><div>CA annuel</div><div>Agent</div>
      </div>
      ${rows}
    </div>`;
}

function renderClientsTable() {
  const search = (document.getElementById('cl-search')?.value || '').toLowerCase().trim();
  const agentFilter = document.getElementById('cl-agent')?.value || '';
  const statutFilter = document.getElementById('cl-statut')?.value || '';
  const segmentFilter = document.getElementById('cl-segment')?.value || '';

  const filtered = allClients.filter(c => {
    if (agentFilter && c.apporteur_id !== agentFilter) return false;
    if (statutFilter && c.statut !== statutFilter) return false;
    if (segmentFilter && (c.segment || 'Privé') !== segmentFilter) return false;
    if (search) {
      const haystack = `${c.prenom||''} ${c.nom||''} ${c.ville||''} ${c.email||''} ${c.profession||''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('cl-titre').textContent = `Clients (${filtered.length})`;

  const cols = '1fr 160px 85px 90px 55px';
  let rows = filtered.map(c => {
    const agent = agentById(c.apporteur_id);
    return `<div class="table-row" style="grid-template-columns:${cols}" onclick="showClient('${c.id}')">
      <div><div style="font-weight:700;font-size:13px;color:var(--text)">${c.prenom} ${c.nom}</div><div style="font-size:11px;color:var(--text-muted)">${c.ville || ''} · ${c.profession || ''}</div></div>
      <div><div style="font-size:11px;color:var(--text)">${c.email || ''}</div><div style="font-size:11px;color:var(--text-muted)">${c.mobile || ''}</div></div>
      <div>${badge(c.statut || '—', statutColor(c.statut))}</div>
      <div style="font-size:12px;color:var(--text-muted)">${c.segment || '—'}</div>
      <div>${agent ? avatar(agent, 26) : ''}</div>
    </div>`;
  }).join('') || '<div class="table-empty">Aucun client ne correspond à ces filtres.</div>';

  document.getElementById('cl-table-container').innerHTML = `
    <div class="table-wrap">
      <div class="table-header" style="grid-template-columns:${cols}">
        <div>Client</div><div>Contact</div><div>Statut</div><div>Segment</div><div>Agent</div>
      </div>
      ${rows}
    </div>`;
}

// FICHE CLIENT
async function showClient(id) {
  currentClientId = id;
  currentView = 'fiche-client';
  renderSidebar();
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loader">Chargement...</div>';
  const [clients, contrats, rappels, collaborateurs, factures, postits] = await Promise.all([
    dbGet('clients', `id=eq.${id}&select=*`),
    dbGet('contrats', `client_id=eq.${id}&select=*`),
    dbGet('rappels', `client_id=eq.${id}&select=*`),
    dbGet('collaborateurs', `client_id=eq.${id}&select=*&order=nom.asc`),
    dbGet('factures', `client_id=eq.${id}&select=*&order=date_emission.desc`),
    dbGet('postits', `client_id=eq.${id}&select=*&order=created_at.asc`),
  ]);
  const c = clients[0];
  if (!c) { main.innerHTML = '<div class="loader">Client introuvable.</div>'; return; }
  logAction('view_client', 'clients', id, c.segment === 'Entreprise' ? c.nom : `${c.prenom} ${c.nom}`);
  const agent = agentById(c.apporteur_id);
  const color = agentColor(agent);

  const isEntreprise = c.segment === 'Entreprise';
  const displayName = isEntreprise ? c.nom : `${c.prenom} ${c.nom}`;
  const displaySub = isEntreprise
    ? `${c.profession || 'Entreprise'}${c.prenom ? ' · Contact: ' + c.prenom : ''}`
    : `${c.profession || ''}${c.employeur ? ' · ' + c.employeur : ''}`;
  const headerIcon = isEntreprise
    ? `<div style="width:52px;height:52px;border-radius:14px;background:rgba(245,158,11,0.12);border:2px solid rgba(245,158,11,0.35);display:flex;align-items:center;justify-content:center;font-size:24px">🏢</div>`
    : `<div style="width:52px;height:52px;border-radius:50%;background:var(--accent-dim);border:2px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--accent)">${(c.prenom||'?')[0]}${(c.nom||'?')[0]}</div>`;

  main.innerHTML = `

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button onclick="navigate('clients')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px">← Retour aux clients</button>
      <div style="display:flex;gap:10px">
        <button onclick="toggleEditClient()" style="background:${editingClient ? 'var(--red-dim)' : 'var(--surface)'};border:1px solid ${editingClient ? 'rgba(248,113,113,0.3)' : 'var(--border)'};border-radius:8px;padding:7px 16px;color:${editingClient ? 'var(--red)' : 'var(--text-muted)'};font-size:12px;font-weight:700;cursor:pointer">${editingClient ? '✕ Annuler' : '✏️ Modifier'}</button>
        <button onclick="window.print()" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 16px;color:var(--text-muted);font-size:12px;font-weight:700;cursor:pointer">🖨️ Imprimer la fiche</button>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:18px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
        <div style="display:flex;gap:14px;align-items:center">
          ${headerIcon}
          <div>
            <h2 style="margin:0;font-size:20px;font-weight:900;color:var(--text)">${displayName}</h2>
            <div style="color:var(--text-muted);font-size:12px;margin-top:2px">${displaySub}</div>
            <div style="color:var(--text-muted);font-size:12px">${c.adresse || ''} ${c.npa || ''} ${c.ville || ''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">${badge(c.segment || 'Privé', isEntreprise ? '#f59e0b' : '#38bdf8')} ${badge(c.statut || 'prospect', statutColor(c.statut))}</div>
      </div>
      <div class="stat-grid" style="margin-bottom:16px">
        ${statCard('Contrats', contrats.length, '#38bdf8')}
        ${statCard('Rappels ouverts', rappels.filter(r => r.statut === 'ouvert').length, rappels.filter(r => r.statut === 'ouvert').length > 0 ? '#f87171' : '#64748b')}
        ${statCard('CA annuel', caClient(c.id) ? 'CHF ' + caClient(c.id).toLocaleString() : '—', '#f59e0b')}
      </div>
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:${agent ? 'var(--surface-alt)' : 'rgba(248,113,113,0.08)'};border:1px solid ${agent ? 'var(--border)' : 'rgba(248,113,113,0.25)'};border-radius:10px;margin-bottom:${c.apporteur_externe ? '8px' : '0'}">
        ${agent ? avatar(agent, 36) : `<div style="width:36px;height:36px;border-radius:50%;background:rgba(248,113,113,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">⚠</div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Agent interne responsable</div>
          <select onchange="changerAgentClient('${c.id}', this.value)" style="background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 8px;color:var(--text);font-size:13px;font-weight:700;max-width:220px">
            <option value="">— Aucun agent assigné —</option>
            ${allAgents.map(a => `<option value="${a.id}" ${c.apporteur_id === a.id ? 'selected' : ''}>${a.prenom} ${a.nom} (${a.role === 'signataire' ? 'signataire' : 'apporteur'})</option>`).join('')}
          </select>
        </div>
        ${agent && c.mobile ? `<a href="tel:${c.mobile}" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">📞</a>` : ''}
        ${agent && c.email ? `<a href="mailto:${c.email}" style="background:var(--accent-dim);color:var(--accent);border:1px solid var(--accent-border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">✉️</a>` : ''}
      </div>
      ${c.apporteur_externe ? `<div style="display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--surface-alt);border-radius:10px">
        <div style="width:32px;height:32px;border-radius:50%;background:rgba(167,139,250,0.15);border:2px solid rgba(167,139,250,0.4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#a78bfa;flex-shrink:0">${c.apporteur_externe.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
        <div>
          <div style="font-size:12.5px;font-weight:700;color:var(--text)">${c.apporteur_externe}</div>
          <div style="font-size:10.5px;color:var(--text-muted)">🤝 Origine du lead — recommandation externe</div>
        </div>
      </div>` : ''}
    </div>

    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;padding:6px 2px 14px">
      ${postits.map(p => `
        <div class="postit-note" style="background:${p.couleur || '#fde047'};transform:rotate(${p.rotation || 0}deg)">
          <button onclick="deletePostit('${p.id}','${c.id}')" class="postit-close">×</button>
          <textarea class="postit-text" onblur="savePostitContenu('${p.id}', this.value)" placeholder="Écris ici...">${p.contenu || ''}</textarea>
        </div>`).join('')}
      <button onclick="addPostit('${c.id}')" class="postit-add" title="Ajouter un post-it">📌 +</button>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'tab-identite')">Identité</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-prevoyance')">Prévoyance</button>
      ${isEntreprise ? `<button class="tab-btn" onclick="switchTab(this,'tab-collaborateurs')">Collaborateurs (${collaborateurs.length})</button>` : ''}
      <button class="tab-btn" onclick="switchTab(this,'tab-contrats')">Contrats (${contrats.length})</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-factures')">Factures (${factures.length})</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-rappels')">Rappels (${rappels.length})</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-notes')">Notes</button>
    </div>

    <div id="tab-identite">
      ${editingClient ? `
        ${sectionCard(isEntreprise ? 'Identification entreprise' : 'Coordonnées personnelles', isEntreprise ? '#f59e0b' : '#38bdf8', isEntreprise ? `<div class="form-grid">
          <div class="form-field"><label class="form-label">Raison sociale</label><div style="display:flex;gap:6px"><input id="ec-nom" class="form-input" value="${c.nom || ''}" style="flex:1"><button type="button" onclick="rechercheZefix('ec-nom')" title="Rechercher sur Zefix" style="background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:0 12px;color:var(--text-muted);cursor:pointer;font-size:14px">🔍</button></div></div>
          <div class="form-field"><label class="form-label">Secteur d'activité</label><input id="ec-profession" class="form-input" value="${c.profession || ''}"></div>
          <div class="form-field"><label class="form-label">Contact principal</label><input id="ec-prenom" class="form-input" value="${c.prenom || ''}"></div>
          <div class="form-field"><label class="form-label">Nb collaborateurs</label><input id="ec-taux-activite" type="number" class="form-input" value="${c.taux_activite || ''}"></div>
          <div class="form-field"><label class="form-label">Chiffre d'affaires</label><input id="ec-revenu" type="number" class="form-input" value="${c.revenu || ''}"></div>
          <div class="form-field"><label class="form-label">N° AVS (LPP)</label><input id="ec-avs" class="form-input" value="${c.avs || ''}"></div>
        </div>` : `<div class="form-grid">
          <div class="form-field"><label class="form-label">Prénom</label><input id="ec-prenom" class="form-input" value="${c.prenom || ''}"></div>
          <div class="form-field"><label class="form-label">Nom</label><input id="ec-nom" class="form-input" value="${c.nom || ''}"></div>
          <div class="form-field"><label class="form-label">Date de naissance</label><input id="ec-date-naissance" type="date" class="form-input" value="${c.date_naissance || ''}"></div>
          <div class="form-field"><label class="form-label">Nationalité</label><input id="ec-nationalite" class="form-input" value="${c.nationalite || ''}"></div>
          <div class="form-field"><label class="form-label">État civil</label>
            <select id="ec-etat-civil" class="form-input">

async function saveClientNote(clientId) {
  const textarea = document.getElementById('client-note-input');
  const nouvelleNote = textarea.value.trim();
  if (!nouvelleNote) { showError('Écris une note avant l\'enregistrement.'); return; }
  const client = allClients.find(c => c.id === clientId);
  const notesExistantes = client && client.notes ? client.notes + '\n\n' : '';
  const dateAujourdhui = new Date().toLocaleDateString('fr-CH');
  const noteAvecDate = `[${dateAujourdhui}] ${nouvelleNote}`;
  const notesCompletes = notesExistantes + noteAvecDate;

  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }

  const r = await dbPatch('clients', clientId, { notes: notesCompletes });
  if (r && r.error) { showError('Erreur lors de l\'enregistrement de la note: ' + (r.detail || r.status)); if (btn) { btn.textContent = 'Enregistrer'; btn.disabled = false; } return; }

  allClients = await dbGet('clients', 'select=*');
  await showClient(clientId);
  const notesBtn = document.querySelector('.tab-btn[onclick*="tab-notes"]');
  if (notesBtn) switchTab(notesBtn, 'tab-notes');
}

function toggleEditClient() {
  editingClient = !editingClient;

async function changerAgentClient(clientId, agentId) {
  await dbPatch('clients', clientId, { apporteur_id: agentId || null });
  const agent = allAgents.find(a => a.id === agentId);
  logAction('edit_client', 'clients', clientId, `Agent réassigné → ${agent ? agent.prenom + ' ' + agent.nom : 'aucun'}`);
  allClients = await dbGet('clients', 'select=*');
  showClient(clientId);
}

async function saveClientEdit(id, isEntreprise) {
  const body = isEntreprise ? {
    nom: document.getElementById('ec-nom').value.trim(),
    profession: document.getElementById('ec-profession').value.trim(),
    prenom: document.getElementById('ec-prenom').value.trim(),
    taux_activite: Number(document.getElementById('ec-taux-activite').value) || null,
    revenu: Number(document.getElementById('ec-revenu').value) || null,
    avs: document.getElementById('ec-avs').value.trim(),
  } : {
    prenom: document.getElementById('ec-prenom').value.trim(),
    nom: document.getElementById('ec-nom').value.trim(),
    date_naissance: document.getElementById('ec-date-naissance').value || null,
    nationalite: document.getElementById('ec-nationalite').value.trim(),
    etat_civil: document.getElementById('ec-etat-civil').value,
    enfants: Number(document.getElementById('ec-enfants').value) || 0,
    avs: document.getElementById('ec-avs').value.trim(),
    langue: document.getElementById('ec-langue').value,
  };

  // Champs communs (Contact, Bancaire, et Pro pour les particuliers)
  Object.assign(body, {
    adresse: document.getElementById('ec-adresse').value.trim(),
    npa: document.getElementById('ec-npa').value.trim(),
    ville: document.getElementById('ec-ville').value.trim(),
    canton: document.getElementById('ec-canton').value.trim(),
    email: document.getElementById('ec-email').value.trim(),
    tel: document.getElementById('ec-tel').value.trim(),
    mobile: document.getElementById('ec-mobile').value.trim(),
    banque: document.getElementById('ec-banque').value.trim(),
    iban: document.getElementById('ec-iban').value.trim(),
    apporteur_externe: document.getElementById('ec-apporteur-ext') ? (document.getElementById('ec-apporteur-ext').value.trim() || null) : undefined,
  });

  if (!isEntreprise) {
    const profEl = document.getElementById('ec-profession');
    const empEl = document.getElementById('ec-employeur');
    const revEl = document.getElementById('ec-revenu');
    const tauxEl = document.getElementById('ec-taux-activite');
    if (profEl) body.profession = profEl.value.trim();
    if (empEl) body.employeur = empEl.value.trim();
    if (revEl) body.revenu = Number(revEl.value) || null;
    if (tauxEl) body.taux_activite = Number(tauxEl.value) || null;
  }

  if (!body.prenom && !body.nom) { showError('Le nom est obligatoire.'); return; }

  const btn = document.querySelector('.btn-save');
  if (btn) { btn.textContent = 'Enregistrement...'; btn.disabled = true; }

  const r = await dbPatch('clients', id, body);
  if (r && r.error) { showError('Erreur lors de la mise à jour: ' + (r.detail || r.status)); if (btn) { btn.textContent = '💾 Enregistrer les modifications'; btn.disabled = false; } return; }
  logAction('edit_client', 'clients', id, `${body.prenom || ''} ${body.nom || ''}`.trim());

  // Resynchronise le nom dupliqué dans les commissions en attente liées à ce client
  if (body.prenom !== undefined || body.nom !== undefined) {
    const nomComplet = isEntreprise ? body.nom : `${body.prenom} ${body.nom}`;
    const liees = allCommissionsAttente.filter(c => c.client_id === id);
    await Promise.all(liees.map(c => dbPatch('commissions_attente', c.id, { client_nom: nomComplet })));
    allCommissionsAttente = await dbGet('commissions_attente', 'select=*');
  }

  editingClient = false;
  allClients = await dbGet('clients', 'select=*');
  showClient(id);
}

function switchTab(btn, tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['tab-identite','tab-prevoyance','tab-contrats','tab-factures','tab-rappels','tab-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('hidden', id !== tabId);
  });
}

  const OPPS = allOpportunites.filter(o => o.stade !== 'Gagné' && o.stade !== 'Perdu');

  const perdues = allOpportunites.filter(o => o.stade === 'Perdu');
  const total = OPPS.reduce((s,o) => s+(o.montant_potentiel||0), 0);
  const pondere = OPPS.reduce((s,o) => s+Math.round((o.montant_potentiel||0)*(o.probabilite||0)/100), 0);

  function nomClient(o) {

          </select>
        </div>
      </div>`).join('')}
      ${opps.length === 0 ? '<div class="kanban-empty">Aucune</div>' : ''}

  return `
